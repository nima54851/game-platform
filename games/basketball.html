<!DOCTYPE html>
<html lang="zh"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>🏀 投篮大师</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a1a2a;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:monospace;overflow:hidden}
canvas{border-radius:8px;display:block}
#hud{position:fixed;top:16px;left:50%;transform:translateX(-50%);display:flex;gap:24px;z-index:10}
.stat{background:rgba(0,0,0,.7);border:1px solid rgba(255,150,50,.2);padding:8px 20px;border-radius:8px;text-align:center}
.stat .v{font-size:22px;font-weight:900;color:#ff8800;text-shadow:0 0 10px rgba(255,136,0,.6)}
.stat .l{font-size:10px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:2px}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;backdrop-filter:blur(4px)}
#overlay h1{font-size:42px;color:#ff8800;text-shadow:0 0 20px rgba(255,136,0,.6);margin-bottom:8px}
#overlay p{color:rgba(255,255,255,.4);margin-bottom:24px}
#start-btn{background:linear-gradient(90deg,#ff8800,#ff4400);color:#fff;padding:14px 48px;border:none;border-radius:12px;font-size:18px;font-weight:900;cursor:pointer;font-family:monospace;box-shadow:0 0 30px rgba(255,136,0,.4)}
</style></head><body>
<div id="hud">
  <div class="stat"><div class="v" id="s">0</div><div class="l">分数</div></div>
  <div class="stat"><div class="v" id="streak">0</div><div class="l">连中</div></div>
  <div class="stat"><div class="v" id="shots">0/0</div><div class="l">命中率</div></div>
</div>
<div id="overlay">
  <h1>🏀 投篮大师</h1>
  <p>按住鼠标蓄力 · 松开发射 · 调整角度投篮</p>
  <button id="start-btn" onclick="start()">▶ 开始</button>
</div>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const W=Math.min(500,window.innerWidth-20),H=Math.min(600,window.innerHeight-40);
canvas.width=W;canvas.height=H;
let ball={},hoop={x:0,y:0,w:70,h:8,rimL:0,rimR:0},score,streak,made,total,power,aimAngle,charging,frame,particles;
function init(){
  ball={x:W*.3,y:H-100,r:18,vx:0,vy:0,active:false,onCourt:true};
  hoop={x:W*.65,y:H*.28,w:72,h:8};
  hoop.rimL=hoop.x-hoop.w/2;hoop.rimR=hoop.x+hoop.w/2;
  score=0;streak=0;made=0;total=0;power=0;aimAngle=-Math.PI/3;charging=false;particles=[];
  document.getElementById('s').textContent=0;document.getElementById('streak').textContent=0;document.getElementById('shots').textContent='0/0';}
function spawnParticles(x,y,color,count=15){for(let i=0;i<count;i++){const a=Math.random()*Math.PI*2;const sp=2+Math.random()*4;particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,decay:.02+Math.random()*.02,color,r:2+Math.random()*4});}}
canvas.addEventListener('mousedown',e=>{if(!ball.active&&ball.onCourt){charging=true;}});
canvas.addEventListener('mousemove',e=>{if(charging){aimAngle=Math.atan2(ball.y-(e.clientY-canvas.getBoundingClientRect().top),ball.x-(e.clientX-canvas.getBoundingClientRect().left));power=Math.min(22,power+.3);}});
canvas.addEventListener('mouseup',()=>{if(charging&&power>0){ball.vx=Math.cos(aimAngle)*power;ball.vy=Math.sin(aimAngle)*power;ball.active=true;ball.onCourt=false;charging=false;power=0;total++;updateHUD();}});
function update(){
  frame++;
  if(ball.active){
    ball.vy+=.4;ball.x+=ball.vx;ball.y+=ball.vy;
    // Rim collision
    const rdx=ball.x-hoop.x,rdy=ball.y-hoop.y;
    const rimD=hoop.w/2+ball.r;
    if(Math.abs(rdy)<ball.r+5&&Math.abs(rdx)<rimD){
      const rimDist=Math.sqrt(rdx*rdx+rdy*rdy);
      if(rimDist>hoop.w/2-ball.r*0.5){ball.vx*=-.6;ball.vy*=.5;ball.x+=ball.vx*2;}}
    // Score detection
    if(ball.y>hoop.y-hoop.h&&ball.y<hoop.y+hoop.h+20&&ball.x>hoop.rimL+ball.r&&ball.x<hoop.rimR-ball.r){
      if(ball.vy>0){score+=2+streak;made++;streak++;spawnParticles(hoop.x,hoop.y,'#ff8800',25);resetBall();updateHUD();}}
    // Out of bounds
    if(ball.y>H+50||ball.x<-50||ball.x>W+50){spawnParticles(ball.x,Math.min(ball.y,H-20),'#ff4444',10);resetBall();streak=0;updateHUD();}}
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.life-=p.decay;});particles=particles.filter(p=>p.life>0);}
function resetBall(){ball={x:W*.3,y:H-100,r:18,vx:0,vy:0,active:false,onCourt:true};}
function updateHUD(){document.getElementById('s').textContent=score;document.getElementById('streak').textContent=streak;document.getElementById('shots').textContent=total>0?made+'/'+total:'';}
function draw(){
  // Sky
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#0a1a3a');sky.addColorStop(1,'#0a1a2a');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);
  // Court floor
  const court=ctx.createLinearGradient(0,H*.6,H,H);
  court.addColorStop(0,'#1a0a00');court.addColorStop(1,'#2d1500');
  ctx.fillStyle=court;ctx.fillRect(0,H*.7,W,H*.3);
  // Court line
  ctx.strokeStyle='rgba(255,136,0,.3)';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,H*.7);ctx.lineTo(W,H*.7);ctx.stroke();
  // Backboard
  ctx.fillStyle='rgba(200,200,255,.1)';
  ctx.fillRect(hoop.x-40,hoop.y-80,80,75);
  ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=2;
  ctx.strokeRect(hoop.x-40,hoop.y-80,80,75);
  // Hoop
  ctx.fillStyle='#ff4400';ctx.shadowColor='#ff4400';ctx.shadowBlur=15;
  ctx.fillRect(hoop.rimL,hoop.y,hoop.w,hoop.h);
  // Net (simple)
  ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=1;
  for(let i=0;i<6;i++){const nx=hoop.rimL+5+i*(hoop.w-10)/5;ctx.beginPath();ctx.moveTo(nx,hoop.y+hoop.h);ctx.lineTo(hoop.x+(nx-hoop.rimL)*.3,hoop.y+40);ctx.stroke();}
  ctx.shadowBlur=0;
  // Aim line
  if(charging){
    ctx.strokeStyle='rgba(255,136,0,.4)';ctx.lineWidth=2;ctx.setLineDash([8,4]);
    ctx.beginPath();ctx.moveTo(ball.x,ball.y);ctx.lineTo(ball.x+Math.cos(aimAngle)*power*5,ball.y+Math.sin(aimAngle)*power*5);ctx.stroke();ctx.setLineDash([]);
    // Power bar
    const pct=power/22;
    ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(ball.x-20,ball.y-35,40,8);
    const barColor=pct<.5?'#00ff88':pct<.8?'#ffca28':'#ff4444';
    ctx.fillStyle=barColor;ctx.fillRect(ball.x-20,ball.y-35,40*pct,8);}
  // Ball
  if(ball.onCourt||ball.active){
    const bg=ctx.createRadialGradient(ball.x-ball.r*.3,ball.y-ball.r*.3,0,ball.x,ball.y,ball.r);
    bg.addColorStop(0,'#ff8800');bg.addColorStop(1,'#cc4400');
    ctx.fillStyle=bg;ctx.shadowColor='#ff8800';ctx.shadowBlur=ball.active?0:8;
    ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
    // Ball lines
    ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(ball.x-ball.r,ball.y);ctx.lineTo(ball.x+ball.r,ball.y);ctx.stroke();
    ctx.beginPath();ctx.moveTo(ball.x,ball.y-ball.r);ctx.lineTo(ball.x,ball.y+ball.r);ctx.stroke();}
  // Particles
  particles.forEach(p=>{ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();});
  ctx.globalAlpha=1;}
function loop(){update();draw();requestAnimationFrame(loop);}
function start(){document.getElementById('overlay').style.display='none';document.getElementById('overlay').querySelector('h1').textContent='🏀 投篮大师';init();loop();}
document.getElementById('overlay').style.display='flex';init();loop();
</script></body></html>
