<!DOCTYPE html>
<html lang="zh"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>👾 太空侵略者</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;display:flex;justify-content:center;align-items:center;height:100vh;font-family:monospace}
canvas{display:block;border-radius:8px}
#hud{position:fixed;top:16px;left:50%;transform:translateX(-50%);display:flex;gap:24px;z-index:10}
.stat{background:rgba(0,0,0,.7);border:1px solid rgba(0,255,136,.2);padding:8px 20px;border-radius:8px;text-align:center}
.stat .v{font-size:22px;font-weight:900;color:#00ff88;text-shadow:0 0 10px rgba(0,255,136,.6)}
.stat .l{font-size:10px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:2px}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;backdrop-filter:blur(4px)}
#overlay h1{font-size:42px;color:#00ff88;text-shadow:0 0 20px rgba(0,255,136,.6);margin-bottom:8px}
#overlay p{color:rgba(255,255,255,.4);margin-bottom:24px}
#start-btn{background:#00ff88;color:#000;padding:14px 48px;border:none;border-radius:12px;font-size:18px;font-weight:900;cursor:pointer;font-family:monospace;box-shadow:0 0 30px rgba(0,255,136,.4)}
</style></head><body>
<div id="hud">
  <div class="stat"><div class="v" id="s">0</div><div class="l">分数</div></div>
  <div class="stat"><div class="v" id="lives">3</div><div class="l">生命</div></div>
  <div class="stat"><div class="v" id="wave">1</div><div class="l">波次</div></div>
</div>
<div id="overlay">
  <h1>👾 太空侵略者</h1>
  <p>← → 移动 · 空格射击 · 消灭外星人</p>
  <button id="start-btn" onclick="start()">▶ 开始</button>
</div>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const W=Math.min(600,window.innerWidth-20),H=Math.min(500,window.innerHeight-80);
canvas.width=W;canvas.height=H;
const ALIEN_ROWS=4,ALIEN_COLS=8;
let aliens=[],bullets=[],player,bullets2=[],particles=[],score,lives,wave,frame,gameOver;
let alienDir=1,alienDrop=0,alienShootTimer=0,high;
high=parseInt(localStorage.getItem('invaders_hs')||'0');
function init(){
  aliens=[];bullets=[];bullets2=[];particles=[];frame=0;score=0;lives=3;wave=1;alienDir=1;alienDrop=0;alienShootTimer=0;gameOver=false;
  player={x:W/2,y:H-50,w:40,h:20};
  const alienTypes=[['#00ff88','#ff44ff'],['#ff8800','#ff4444'],['#4fc3f7','#ffca28']];
  for(let r=0;r<ALIEN_ROWS;r++)for(let c=0;c<ALIEN_COLS;c++){
    const t=r<1?0:r<2?1:2;
    const cols=alienTypes[t];
    aliens.push({x:50+c*50,y:60+r*45,w:30,h:25,color:cols[0],color2:cols[1],type:t,phase:Math.random()*Math.PI*2});}
  document.getElementById('s').textContent=0;document.getElementById('lives').textContent=3;document.getElementById('wave').textContent=1;}
function spawnParticles(x,y,color,count=15){for(let i=0;i<count;i++){const a=Math.random()*Math.PI*2;const sp=2+Math.random()*4;particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,decay:.03,color,r:2+Math.random()*4});}}
document.addEventListener('keydown',e=>{
  if(e.code==='ArrowLeft'||e.code==='KeyA')player.x=Math.max(20,player.x-8);
  if(e.code==='ArrowRight'||e.code==='KeyD')player.x=Math.min(W-20,player.x+8);
  if(e.code==='Space'){e.preventDefault();bullets2.push({x:player.x,y:player.y-20,vx:0,vy:-10});}
});
function start(){
  document.getElementById('overlay').style.display='none';
  document.getElementById('overlay').querySelector('h1').textContent='👾 太空侵略者';
  init();loop();}
function update(){
  if(gameOver)return;
  frame++;
  // Aliens move
  const speed=2+wave;
  aliens.forEach(a=>{a.x+=alienDir*speed;a.phase+=.05;a.y+=alienDrop;});
  alienDrop=0;
  const minX=Math.min(...aliens.map(a=>a.x)),maxX=Math.max(...aliens.map(a=>a.x+a.w));
  if(maxX>=W-10||minX<=10){alienDir*=-1;alienDrop=10;}
  if(frame%Math.max(20,60-wave*5)===0){aliens.push({x:Math.random()*(W-60),y:-30,w:30,h:25,color:'#ff44ff',color2:'#00ff88',type:1,phase:0});}
  // Alien shoots
  alienShootTimer++;
  if(alienShootTimer>Math.max(30,80-wave*5)&&aliens.length>0){
    alienShootTimer=0;
    const shooter=aliens[Math.floor(Math.random()*aliens.length)];
    bullets.push({x:shooter.x+shooter.w/2,y:shooter.y+shooter.h,vx:(Math.random()-.5)*2,vy:4+wave*.5});}
  // Move bullets
  bullets2.forEach(b=>b.y+=b.vy);
  bullets2=bullets2.filter(b=>b.y>-10);
  bullets.forEach(b=>{b.x+=b.vx;b.y+=b.vy;});
  bullets=bullets.filter(b=>b.y<H);
  // Collision bullets2 vs aliens
  for(let i=bullets2.length-1;i>=0;i--){
    const b=bullets2[i];
    for(let j=aliens.length-1;j>=0;j--){
      const a=aliens[j];
      if(b.x>a.x&&b.x<a.x+a.w&&b.y>a.y&&b.y<a.y+a.h){
        spawnParticles(a.x+a.w/2,a.y+a.h/2,a.color,20);
        score+=10*(3-a.type);aliens.splice(j,1);bullets2.splice(i,1);
        document.getElementById('s').textContent=score;if(score>high){high=score;localStorage.setItem('invaders_hs',high);}break;}}}
  // Alien hits player
  for(const b of bullets){
    if(Math.abs(b.x-player.x)<player.w/2&&Math.abs(b.y-player.y)<player.h/2){
      lives--;document.getElementById('lives').textContent=lives;
      spawnParticles(player.x,player.y,'#ff4444',20);bullets.splice(bullets.indexOf(b),1);
      if(lives<=0){gameOver=true;document.getElementById('overlay').querySelector('h1').textContent='💥 游戏结束';document.getElementById('overlay').style.display='flex';return;}}}
  if(aliens.length===0){wave++;document.getElementById('wave').textContent=wave;for(let r=0;r<ALIEN_ROWS;r++)for(let c=0;c<ALIEN_COLS;c++){aliens.push({x:50+c*50,y:60+r*45,w:30,h:25,color:'#00ff88',color2:'#ff44ff',type:0,phase:Math.random()*Math.PI});}}
  // Particles
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;});particles=particles.filter(p=>p.life>0);}
function draw(){
  ctx.fillStyle='#000008';ctx.fillRect(0,0,W,H);
  // Stars
  ctx.fillStyle='rgba(255,255,255,.4)';
  for(let i=0;i<60;i++){const sx=(i*47)%W,sy=(i*73)%H;ctx.beginPath();ctx.arc(sx,sy,.8,0,Math.PI*2);ctx.fill();}
  // Ground
  ctx.fillStyle='#001100';ctx.fillRect(0,H-30,W,30);
  ctx.strokeStyle='#00ff44';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,H-30);ctx.lineTo(W,H-30);ctx.stroke();
  // Player
  ctx.fillStyle='#00c8ff';ctx.shadowColor='#00c8ff';ctx.shadowBlur=15;
  ctx.beginPath();ctx.moveTo(player.x,player.y-player.h/2);ctx.lineTo(player.x-player.w/2,player.y+player.h/2);ctx.lineTo(player.x+player.w/2,player.y+player.h/2);ctx.closePath();ctx.fill();
  // Engine
  ctx.fillStyle='#ff8800';ctx.beginPath();ctx.arc(player.x,player.y+player.h/2,5+Math.random()*3,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  // Bullets
  bullets2.forEach(b=>{ctx.fillStyle='#00ffff';ctx.shadowColor='#00ffff';ctx.shadowBlur=8;ctx.fillRect(b.x-2,b.y,4,12);ctx.shadowBlur=0;});
  bullets.forEach(b=>{ctx.fillStyle='#ff4444';ctx.shadowColor='#ff4444';ctx.shadowBlur=6;ctx.beginPath();ctx.arc(b.x,b.y,4,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;});
  // Aliens
  aliens.forEach(a=>{
    ctx.shadowColor=a.color;ctx.shadowBlur=10;
    const wobble=Math.sin(a.phase)*3;
    ctx.fillStyle=a.color;
    // Body
    ctx.beginPath();ctx.roundRect(a.x,a.y+wobble,a.w,a.h*.5,4);ctx.fill();
    // Head
    ctx.beginPath();ctx.roundRect(a.x+a.w*.1,a.y+wobble-a.h*.3,a.w*.8,a.h*.35,3);ctx.fill();
    // Eyes
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(a.x+a.w*.3,a.y+wobble-a.h*.1,3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(a.x+a.w*.7,a.y+wobble-a.h*.1,3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#000';
    ctx.beginPath();ctx.arc(a.x+a.w*.3+1,a.y+wobble-a.h*.1+1,1.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(a.x+a.w*.7+1,a.y+wobble-a.h*.1+1,1.5,0,Math.PI*2);ctx.fill();
    // Antenna
    ctx.strokeStyle=a.color;ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(a.x+a.w*.2,a.y+wobble-a.h*.3);ctx.lineTo(a.x+a.w*.1,a.y+wobble-a.h*.5);ctx.stroke();
    ctx.beginPath();ctx.moveTo(a.x+a.w*.8,a.y+wobble-a.h*.3);ctx.lineTo(a.x+a.w*.9,a.y+wobble-a.h*.5);ctx.stroke();
    ctx.shadowBlur=0;});
  // Particles
  particles.forEach(p=>{ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=5;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();});
  ctx.globalAlpha=1;ctx.shadowBlur=0;}
function loop(){update();draw();requestAnimationFrame(loop);}
document.getElementById('overlay').style.display='flex';init();loop();
</script></body></html>
