<!DOCTYPE html>
<html lang="zh"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>👾 太空侵略者</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;display:flex;justify-content:center;align-items:center;height:100vh;font-family:monospace}
canvas{display:block;border-radius:8px}
#hud{position:fixed;top:16px;left:50%;transform:translateX(-50%);display:flex;gap:24px;z-index:10}
.stat{background:rgba(0,0,0,.7);border:1px solid rgba(0,255,136,.2);padding:8px 20px;border-radius:8px;text-align:center}
.stat .v{font-size:22px;font-weight:900;color:#00ff88;text-shadow:0 0 10px rgba(0,255,136,.6)}
.stat .l{font-size:10px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:2px}
#shield-bar{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:10px;z-index:10;background:rgba(0,0,0,.6);padding:6px 16px;border-radius:20px;border:1px solid rgba(0,200,255,.2)}
#shield-label{font-size:11px;color:rgba(255,255,255,.5);letter-spacing:1px}
#shield-track{width:120px;height:10px;background:rgba(255,255,255,.1);border-radius:5px;overflow:hidden}
#shield-fill{height:100%;width:100%;border-radius:5px;background:#00ffcc;transition:width .3s,background .3s;box-shadow:0 0 8px #00ffcc}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;backdrop-filter:blur(4px)}
#overlay h1{font-size:42px;color:#00ff88;text-shadow:0 0 20px rgba(0,255,136,.6);margin-bottom:8px}
#overlay p{color:rgba(255,255,255,.4);margin-bottom:24px}
#start-btn{background:#00ff88;color:#000;padding:14px 48px;border:none;border-radius:12px;font-size:18px;font-weight:900;cursor:pointer;font-family:monospace;box-shadow:0 0 30px rgba(0,255,136,.4)}
</style></head><body>
<div id="hud">
  <div class="stat"><div class="v" id="s">0</div><div class="l">分数</div></div>
  <div class="stat"><div class="v" id="lives">3</div><div class="l">生命</div></div>
  <div class="stat"><div class="v" id="wave">1</div><div class="l">波次</div></div>
</div>
<div id="shield-bar">
  <span id="shield-label">护盾</span>
  <div id="shield-track"><div id="shield-fill"></div></div>
</div>
<div id="overlay">
  <h1>👾 太空侵略者</h1>
  <p>← → 移动 · 空格射击 · 消灭外星人</p>
  <button id="start-btn" onclick="game.start()">▶ 开始</button>
</div>
<canvas id="c"></canvas>
<script>
// ─── Scene Manager ───────────────────────────────────────────────
class SceneManager {
  constructor(ctx, W, H) {
    this.ctx = ctx;
    this.W = W; this.H = H;
    this.stars = [];
    this.buildings = [];
    this.cityLights = [];
    this._buildStars();
    this._buildCity();
  }

  _buildStars() {
    this.stars = [];
    for (let i = 0; i < 160; i++) {
      this.stars.push({
        x: Math.random() * this.W,
        y: Math.random() * (this.H - 80),
        r: Math.random() * 2 + 0.2,
        speed: Math.random() * 0.3 + 0.05,
        phase: Math.random() * Math.PI * 2,
        twinkle: Math.random() > 0.4,
        color: Math.random() > 0.8 ? (Math.random() > 0.5 ? '#aaddff' : '#ffaaaa') : '#ffffff'
      });
    }
  }

  _buildCity() {
    this.buildings = [];
    this.cityLights = [];
    let x = 0;
    while (x < this.W) {
      const bw = 20 + Math.random() * 40;
      const bh = 30 + Math.random() * 60;
      const windows = [];
      for (let wx = 4; wx < bw - 4; wx += 7) {
        for (let wy = 4; wy < bh - 4; wy += 9) {
          if (Math.random() > 0.35) {
            windows.push({ x: wx, y: wy, on: Math.random() > 0.3 });
          }
        }
      }
      this.buildings.push({ x, y: this.H - 30 - bh, w: bw, h: bh, windows });
      this.cityLights.push(...windows.filter(w => w.on).map(w => ({
        x: x + w.x + 2, y: this.H - 30 - bh + w.y + 2, flicker: Math.random() * Math.PI * 2
      })));
      x += bw + Math.random() * 8;
    }
  }

  update(frame) {
    this.stars.forEach(s => {
      if (s.twinkle) s.phase += 0.08;
    });
    this.cityLights.forEach(l => { l.flicker += 0.05; });
  }

  draw(frame) {
    const ctx = this.ctx;
    // Sky gradient
    const sky = ctx.createLinearGradient(0, 0, 0, this.H - 30);
    sky.addColorStop(0, '#000008');
    sky.addColorStop(1, '#0a001a');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, this.W, this.H - 30);

    // Stars with twinkling
    this.stars.forEach(s => {
      const alpha = s.twinkle ? 0.3 + 0.7 * Math.abs(Math.sin(s.phase)) : 0.6;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = s.color;
      ctx.shadowColor = s.color;
      ctx.shadowBlur = s.twinkle ? 4 : 0;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;

    // Nebula wisps
    ctx.globalAlpha = 0.05;
    const neb = ctx.createRadialGradient(this.W * 0.3, this.H * 0.2, 0, this.W * 0.3, this.H * 0.2, 150);
    neb.addColorStop(0, '#8800ff');
    neb.addColorStop(1, 'transparent');
    ctx.fillStyle = neb;
    ctx.fillRect(0, 0, this.W, this.H);

    const neb2 = ctx.createRadialGradient(this.W * 0.7, this.H * 0.15, 0, this.W * 0.7, this.H * 0.15, 120);
    neb2.addColorStop(0, '#0044ff');
    neb2.addColorStop(1, 'transparent');
    ctx.fillStyle = neb2;
    ctx.fillRect(0, 0, this.W, this.H);
    ctx.globalAlpha = 1;

    // Ground
    ctx.fillStyle = '#001100';
    ctx.fillRect(0, this.H - 30, this.W, 30);
    ctx.strokeStyle = '#00ff44';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, this.H - 30);
    ctx.lineTo(this.W, this.H - 30);
    ctx.stroke();

    // Buildings silhouette
    ctx.fillStyle = '#001a00';
    this.buildings.forEach(b => {
      ctx.fillRect(b.x, b.y, b.w, b.h);
    });

    // City window lights
    this.cityLights.forEach(l => {
      const alpha = 0.4 + 0.4 * Math.abs(Math.sin(l.flicker));
      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#ffee88';
      ctx.shadowColor = '#ffaa00';
      ctx.shadowBlur = 4;
      ctx.fillRect(l.x, l.y, 3, 4);
    });
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;

    // Ground line glow
    ctx.strokeStyle = '#00ff44';
    ctx.shadowColor = '#00ff44';
    ctx.shadowBlur = 8;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, this.H - 30);
    ctx.lineTo(this.W, this.H - 30);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }
}

// ─── Particle ───────────────────────────────────────────────────
class Particle {
  constructor(x, y, color, count = 15, speedScale = 1) {
    this.parts = [];
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = (2 + Math.random() * 4) * speedScale;
      this.parts.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        decay: 0.02 + Math.random() * 0.03,
        r: 2 + Math.random() * 4,
        color,
        type: Math.random() > 0.6 ? 'spark' : 'dot'
      });
    }
  }

  update() {
    this.parts.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.05;
      p.vx *= 0.98;
      p.life -= p.decay;
    });
    this.parts = this.parts.filter(p => p.life > 0);
  }

  draw(ctx) {
    this.parts.forEach(p => {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = p.type === 'spark' ? 8 : 4;
      if (p.type === 'spark') {
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(p.x - p.vx * 2, p.y - p.vy * 2);
        ctx.strokeStyle = p.color;
        ctx.lineWidth = 1;
        ctx.stroke();
      } else {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
        ctx.fill();
      }
    });
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
  }

  get alive() { return this.parts.length > 0; }
}

// ─── Entity ─────────────────────────────────────────────────────
class Entity {
  constructor(x, y, w, h) {
    this.x = x; this.y = y; this.w = w; this.h = h;
  }
}

// ─── Enemy (UPGRADED: geometric shapes + HP color coding) ───────
class Enemy extends Entity {
  constructor(x, y, type = 0, wave = 1) {
    super(x, y, 30, 25);
    this.type = type;
    this.wave = wave;
    this.phase = Math.random() * Math.PI * 2;
    this.speed = [3, 2, 1][type] + wave * 0.3;
    this.maxHealth = [1, 2, 3][type];
    this.health = this.maxHealth;
    this.score = [30, 20, 10][type];
    this.alive = true;
  }

  get color() {
    const hp = this.health / this.maxHealth;
    if (hp > 0.66) return ['#00ffff', '#00ff88', '#ff8800'][this.type];
    if (hp > 0.33) return ['#00ccff', '#88ff44', '#ffcc00'][this.type];
    return ['#ff6600', '#ffaa00', '#ff4444'][this.type];
  }
  get color2() {
    const hp = this.health / this.maxHealth;
    if (hp > 0.66) return ['#0088ff', '#ff44ff', '#ff4444'][this.type];
    if (hp > 0.33) return ['#0088cc', '#ff8800', '#ff8800'][this.type];
    return ['#ff3300', '#ff6600', '#cc0000'][this.type];
  }

  update(dir, drop) {
    this.x += dir * this.speed;
    this.y += drop;
    this.phase += 0.06;
  }

  draw(ctx) {
    if (!this.alive) return;
    const wobble = Math.sin(this.phase) * 3;
    const cx = this.x + this.w / 2;
    const cy = this.y + this.h / 2;

    ctx.shadowColor = this.color;
    ctx.shadowBlur = 14;
    ctx.fillStyle = this.color;

    if (this.type === 0) {
      // Scout — sleek triangle fighter
      ctx.beginPath();
      ctx.moveTo(cx, this.y + wobble - 5);
      ctx.lineTo(this.x + this.w, this.y + this.h + wobble);
      ctx.lineTo(this.x, this.y + this.h + wobble);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = this.color2;
      ctx.lineWidth = 2;
      ctx.shadowColor = this.color2;
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.moveTo(this.x - 3, this.y + this.h + wobble);
      ctx.lineTo(this.x + this.w + 3, this.y + this.h + wobble);
      ctx.stroke();
    } else if (this.type === 1) {
      // Soldier — diamond/rhombus geometric soldier
      const hw = this.w / 2, hh = this.h / 2;
      const gy = this.y + wobble;
      // Outer diamond
      ctx.beginPath();
      ctx.moveTo(cx, gy - hh - 6);       // top
      ctx.lineTo(cx + hw + 2, cy + wobble); // right
      ctx.lineTo(cx, gy + hh + 2);        // bottom
      ctx.lineTo(cx - hw - 2, cy + wobble); // left
      ctx.closePath();
      ctx.fill();
      // Inner diamond
      ctx.fillStyle = this.color2;
      ctx.shadowBlur = 0;
      ctx.beginPath();
      ctx.moveTo(cx, gy - hh + 8);
      ctx.lineTo(cx + hw - 6, cy + wobble);
      ctx.lineTo(cx, gy + hh - 8);
      ctx.lineTo(cx - hw + 6, cy + wobble);
      ctx.closePath();
      ctx.fill();
      // HP indicator dots
      ctx.shadowColor = this.color;
      ctx.shadowBlur = 6;
      for (let i = 0; i < this.health; i++) {
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(cx - 5 + i * 10, gy - 2, 2.5, 0, Math.PI * 2);
        ctx.fill();
      }
    } else {
      // Heavy — hexagon tank with HP rings
      const r = this.w / 2;
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2 - Math.PI / 6;
        const px = cx + Math.cos(a) * r;
        const py = cy + wobble + Math.sin(a) * r * 0.7;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
      // HP bar on heavy
      const barW = this.w - 4;
      const barH = 4;
      const barX = this.x + 2;
      const barY = this.y + this.h + wobble + 4;
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(barX, barY, barW, barH);
      const hpRatio = this.health / this.maxHealth;
      ctx.fillStyle = this.color;
      ctx.shadowColor = this.color;
      ctx.shadowBlur = 4;
      ctx.fillRect(barX, barY, barW * hpRatio, barH);
      // Cannon
      ctx.fillStyle = this.color2;
      ctx.shadowColor = this.color2;
      ctx.shadowBlur = 6;
      ctx.fillRect(cx - 3, this.y + wobble - 12, 6, 14);
      // Eyes
      ctx.fillStyle = '#ff4444';
      ctx.shadowColor = '#ff4444';
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.arc(cx - 6, cy + wobble, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(cx + 6, cy + wobble, 3, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.shadowBlur = 0;
  }
}

// ─── Bullet ─────────────────────────────────────────────────────
class Bullet extends Entity {
  constructor(x, y, vx, vy, friendly = true) {
    super(x - 2, y, 4, 12);
    this.x = x; this.y = y;
    this.vx = vx; this.vy = vy;
    this.friendly = friendly;
    this.alive = true;
  }

  update(H) {
    this.x += this.vx;
    this.y += this.vy;
    if (this.y < -10 || this.y > H + 10) this.alive = false;
  }

  draw(ctx) {
    if (!this.alive) return;
    if (this.friendly) {
      ctx.fillStyle = '#00ffff';
      ctx.shadowColor = '#00ffff';
      ctx.shadowBlur = 10;
      ctx.fillRect(this.x - 2, this.y, 4, 14);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(this.x - 1, this.y, 2, 14);
    } else {
      ctx.fillStyle = '#ff4444';
      ctx.shadowColor = '#ff4444';
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.arc(this.x, this.y, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffaa00';
      ctx.beginPath();
      ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
  }
}

// ─── Player ─────────────────────────────────────────────────────
class Player extends Entity {
  constructor(x, y) {
    super(x, y, 40, 20);
    this.x = x; this.y = y;
    this.engineFlicker = 0;
    this.shieldEnergy = 100;
  }

  move(dir, W) {
    const speed = 8;
    this.x = Math.max(20, Math.min(W - 20, this.x + dir * speed));
  }

  draw(ctx, frame, shieldRatio) {
    this.engineFlicker = frame;

    // Shield ring (color changes by energy level)
    const shieldColor = shieldRatio > 0.6 ? '#00ffcc' : shieldRatio > 0.3 ? '#ffaa00' : '#ff4444';
    ctx.beginPath();
    ctx.arc(this.x, this.y, 28, 0, Math.PI * 2);
    ctx.strokeStyle = shieldColor;
    ctx.shadowColor = shieldColor;
    ctx.shadowBlur = 12;
    ctx.globalAlpha = 0.3 + shieldRatio * 0.4;
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;

    // Ship body
    ctx.fillStyle = '#00c8ff';
    ctx.shadowColor = '#00c8ff';
    ctx.shadowBlur = 20;
    ctx.beginPath();
    ctx.moveTo(this.x, this.y - this.h / 2);
    ctx.lineTo(this.x - this.w / 2, this.y + this.h / 2);
    ctx.lineTo(this.x + this.w / 2, this.y + this.h / 2);
    ctx.closePath();
    ctx.fill();

    // Cockpit
    ctx.fillStyle = '#88eeff';
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.ellipse(this.x, this.y - 2, 6, 4, 0, 0, Math.PI * 2);
    ctx.fill();

    // Engine flame
    ctx.fillStyle = '#ff8800';
    ctx.shadowColor = '#ff8800';
    ctx.shadowBlur = 12;
    const flame = 5 + Math.sin(this.engineFlicker * 0.5) * 3 + Math.random() * 2;
    ctx.beginPath();
    ctx.arc(this.x, this.y + this.h / 2, flame, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffff00';
    ctx.beginPath();
    ctx.arc(this.x, this.y + this.h / 2, flame * 0.4, 0, Math.PI * 2);
    ctx.fill();

    ctx.shadowBlur = 0;
  }
}

// ─── Shield Effect ──────────────────────────────────────────────
class ShieldEffect {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.life = 1;
    this.decay = 0.04;
  }

  update() { this.life -= this.decay; }
  draw(ctx) {
    if (this.life <= 0) return;
    ctx.globalAlpha = this.life * 0.5;
    ctx.strokeStyle = '#00ffff';
    ctx.shadowColor = '#00ffff';
    ctx.shadowBlur = 15;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(this.x, this.y, 30 * (1.5 - this.life * 0.5), 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
  }
  get alive() { return this.life > 0; }
}

// ─── Game ───────────────────────────────────────────────────────
class Game {
  constructor() {
    this.canvas = document.getElementById('c');
    this.ctx = this.canvas.getContext('2d');
    this.W = Math.min(600, window.innerWidth - 20);
    this.H = Math.min(500, window.innerHeight - 80);
    this.canvas.width = this.W;
    this.canvas.height = this.H;

    this.ROWS = 4; this.COLS = 8;
    this.particles = [];
    this.shieldEffects = [];
    this.frame = 0;
    this.alienDir = 1;
    this.alienDrop = 0;
    this.alienShootTimer = 0;
    this.high = parseInt(localStorage.getItem('invaders_hs') || '0');

    this.scene = new SceneManager(this.ctx, this.W, this.H);
    this.keys = {};
    this.raf = null;

    document.addEventListener('keydown', e => {
      this.keys[e.code] = true;
      if (e.code === 'Space') { e.preventDefault(); this._shoot(); }
    });
    document.addEventListener('keyup', e => { this.keys[e.code] = false; });

    document.getElementById('overlay').style.display = 'flex';
  }

  init() {
    this.player = new Player(this.W / 2, this.H - 50);
    this.enemies = []; this.playerBullets = []; this.enemyBullets = [];
    this.particles = []; this.shieldEffects = [];
    this.score = 0; this.lives = 3; this.wave = 1;
    this.alienDir = 1; this.alienDrop = 0; this.alienShootTimer = 0;
    this.gameOver = false;
    this.frame = 0;

    for (let r = 0; r < this.ROWS; r++) {
      for (let c = 0; c < this.COLS; c++) {
        const type = r < 1 ? 0 : r < 2 ? 1 : 2;
        this.enemies.push(new Enemy(50 + c * 50, 60 + r * 45, type, this.wave));
      }
    }

    document.getElementById('s').textContent = '0';
    document.getElementById('lives').textContent = '3';
    document.getElementById('wave').textContent = '1';
    this._updateShieldBar(100);
  }

  _updateShieldBar(ratio) {
    const fill = document.getElementById('shield-fill');
    fill.style.width = (ratio * 100) + '%';
    if (ratio > 0.6) {
      fill.style.background = '#00ffcc';
      fill.style.boxShadow = '0 0 8px #00ffcc';
    } else if (ratio > 0.3) {
      fill.style.background = '#ffaa00';
      fill.style.boxShadow = '0 0 8px #ffaa00';
    } else {
      fill.style.background = '#ff4444';
      fill.style.boxShadow = '0 0 8px #ff4444';
    }
  }

  _shoot() {
    if (this.gameOver) return;
    this.playerBullets.push(new Bullet(this.player.x, this.player.y - 20, 0, -12, true));
    this.particles.push(new Particle(this.player.x, this.player.y - 20, '#00ffff', 5, 0.5));
  }

  _spawnEnemy() {
    const type = Math.floor(Math.random() * 3);
    this.enemies.push(new Enemy(Math.random() * (this.W - 60), -30, type, this.wave));
  }

  _spawnExplosion(x, y, color, count = 20) {
    this.particles.push(new Particle(x, y, color, count, 1.2));
  }

  update() {
    if (this.gameOver) return;
    this.frame++;

    if (this.keys['ArrowLeft'] || this.keys['KeyA']) this.player.move(-1, this.W);
    if (this.keys['ArrowRight'] || this.keys['KeyD']) this.player.move(1, this.W);

    const speed = 2 + this.wave;
    this.enemies.forEach(e => e.update(this.alienDir, this.alienDrop));
    this.alienDrop = 0;
    const minX = Math.min(...this.enemies.map(e => e.x));
    const maxX = Math.max(...this.enemies.map(e => e.x + e.w));
    if (maxX >= this.W - 10 || minX <= 10) {
      this.alienDir *= -1;
      this.alienDrop = 10;
    }

    if (this.frame % Math.max(20, 70 - this.wave * 5) === 0) this._spawnEnemy();

    this.alienShootTimer++;
    if (this.alienShootTimer > Math.max(30, 80 - this.wave * 5) && this.enemies.length > 0) {
      this.alienShootTimer = 0;
      const shooter = this.enemies[Math.floor(Math.random() * this.enemies.length)];
      this.enemyBullets.push(new Bullet(
        shooter.x + shooter.w / 2,
        shooter.y + shooter.h,
        (Math.random() - 0.5) * 2,
        4 + this.wave * 0.5,
        false
      ));
    }

    this.playerBullets.forEach(b => b.update(this.H));
    this.playerBullets = this.playerBullets.filter(b => b.alive);
    this.enemyBullets.forEach(b => b.update(this.H));
    this.enemyBullets = this.enemyBullets.filter(b => b.alive);

    for (let bi = this.playerBullets.length - 1; bi >= 0; bi--) {
      const b = this.playerBullets[bi];
      for (let ei = this.enemies.length - 1; ei >= 0; ei--) {
        const e = this.enemies[ei];
        if (!e.alive) continue;
        if (b.x > e.x && b.x < e.x + e.w && b.y > e.y && b.y < e.y + e.h) {
          e.health--;
          this._spawnExplosion(e.x + e.w / 2, e.y + e.h / 2, e.color, 15);
          if (e.health <= 0) {
            this._spawnExplosion(e.x + e.w / 2, e.y + e.h / 2, e.color, 25);
            this._spawnExplosion(e.x + e.w / 2, e.y + e.h / 2, '#ffffff', 10);
            this.score += e.score;
            e.alive = false;
          }
          this.playerBullets.splice(bi, 1);
          document.getElementById('s').textContent = this.score;
          if (this.score > this.high) {
            this.high = this.score;
            localStorage.setItem('invaders_hs', this.high);
          }
          break;
        }
      }
    }
    this.enemies = this.enemies.filter(e => e.alive);

    for (let i = this.enemyBullets.length - 1; i >= 0; i--) {
      const b = this.enemyBullets[i];
      if (Math.abs(b.x - this.player.x) < this.player.w / 2 &&
          Math.abs(b.y - this.player.y) < this.player.h / 2) {
        this.lives--;
        this._spawnExplosion(this.player.x, this.player.y, '#ff4444', 20);
        this.shieldEffects.push(new ShieldEffect(this.player.x, this.player.y));
        this.enemyBullets.splice(i, 1);
        document.getElementById('lives').textContent = this.lives;
        this._updateShieldBar(this.lives / 3);
        if (this.lives <= 0) {
          this.gameOver = true;
          document.getElementById('overlay').querySelector('h1').textContent = '💥 游戏结束';
          document.getElementById('overlay').style.display = 'flex';
          return;
        }
      }
    }

    if (this.enemies.length === 0) {
      this.wave++;
      document.getElementById('wave').textContent = this.wave;
      for (let r = 0; r < this.ROWS; r++) {
        for (let c = 0; c < this.COLS; c++) {
          this.enemies.push(new Enemy(50 + c * 50, 60 + r * 45, 0, this.wave));
        }
      }
      this._spawnExplosion(this.W / 2, this.H / 2, '#00ff88', 50);
    }

    this.particles.forEach(p => p.update());
    this.particles = this.particles.filter(p => p.alive);
    this.shieldEffects.forEach(s => s.update());
    this.shieldEffects = this.shieldEffects.filter(s => s.alive);

    this.scene.update(this.frame);
  }

  draw() {
    const ctx = this.ctx;
    ctx.clearRect(0, 0, this.W, this.H);

    this.scene.draw(this.frame);

    const shieldRatio = this.lives / 3;
    this.player.draw(ctx, this.frame, shieldRatio);

    this.shieldEffects.forEach(s => s.draw(ctx));
    this.playerBullets.forEach(b => b.draw(ctx));
    this.enemyBullets.forEach(b => b.draw(ctx));
    this.enemies.forEach(e => e.draw(ctx));
    this.particles.forEach(p => p.draw(ctx));

    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(0, 0, this.W, 4);
  }

  loop() {
    this.update();
    this.draw();
    this.raf = requestAnimationFrame(() => this.loop());
  }

  start() {
    if (this.raf) cancelAnimationFrame(this.raf);
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('overlay').querySelector('h1').textContent = '👾 太空侵略者';
    this.init();
    this.loop();
  }
}

// Game starts on button click
</script></body></html>
