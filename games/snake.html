<!DOCTYPE html>
<html lang="zh"><head><meta charset="UTF-8"><title>🐍 贪吃蛇</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#050d0a;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;font-family:monospace}canvas{border:2px solid #00ff88;border-radius:8px;box-shadow:0 0 30px rgba(0,255,136,0.3)}#ui{position:fixed;top:20px;left:50%;transform:translateX(-50%);color:#00ff88;font-size:18px;font-weight:700;display:flex;gap:30px;z-index:10}#overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20}#overlay h1{color:#00ff88;font-size:36px;margin-bottom:10px}#overlay p{color:#666;margin-bottom:20px}#overlay button{background:#00ff88;color:#000;font-size:18px;font-weight:700;padding:12px 36px;border:none;border-radius:10px;cursor:pointer;font-family:monospace}#overlay button:hover{background:#00cc6a}</style></head>
<body>
<div id="ui"><span>分数: <b id="score">0</b></span><span>最高: <b id="high">0</b></span></div>
<div id="overlay"><h1>🐍 贪吃蛇</h1><p>↑↓←→ 控制方向 · 吃食物变长</p><button onclick="startGame()">开始游戏</button></div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 400, H = 400, CELL = 20;
canvas.width = W; canvas.height = H;
const COLS = W/CELL, ROWS = H/CELL;
let snake, dir, food, score, gameOver, frame, speed;
let high = parseInt(localStorage.getItem('snake_hs')||'0');
document.getElementById('high').textContent = high;

function init() {
  snake = [{x:5,y:10},{x:4,y:10},{x:3,y:10}];
  dir = {x:1,y:0};
  score = 0; frame = 0; speed = 8;
  placeFood();
  document.getElementById('score').textContent = 0;
}

function placeFood() {
  do { food = {x:Math.floor(Math.random()*COLS), y:Math.floor(Math.random()*ROWS)}; }
  while (snake.some(s=>s.x===food.x&&s.y===food.y));
}

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  gameOver = false;
  init();
  loop();
}

document.addEventListener('keydown', e => {
  const map = {ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},
                w:{x:0,y:-1},s:{x:0,y:1},a:{x:-1,y:0},d:{x:1,y:0}};
  const nd = map[e.key];
  if (nd && (nd.x !== -dir.x || nd.y !== -dir.y)) dir = nd;
  if (e.key===' '&&gameOver) startGame();
});

function update() {
  if (gameOver) return;
  frame++;
  if (frame % (12 - Math.min(speed, 10)) !== 0) return;

  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
  if (head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)) {
    gameOver=true; showOver(); return;
  }
  snake.unshift(head);
  if (head.x===food.x&&head.y===food.y) {
    score++; document.getElementById('score').textContent=score;
    if (score>high){high=score;document.getElementById('high').textContent=high;localStorage.setItem('snake_hs',high);}
    if (score%5===0&&speed<10)speed++;
    placeFood();
  } else { snake.pop(); }
}

function draw() {
  ctx.fillStyle='#050d0a';
  ctx.fillRect(0,0,W,H);

  // Grid
  ctx.strokeStyle='rgba(0,255,136,0.05)';
  for(let i=0;i<=COLS;i++){ctx.beginPath();ctx.moveTo(i*CELL,0);ctx.lineTo(i*CELL,H);ctx.stroke();}
  for(let i=0;i<=ROWS;i++){ctx.beginPath();ctx.moveTo(0,i*CELL);ctx.lineTo(W,i*CELL);ctx.stroke();}

  // Snake
  snake.forEach((s,i)=>{
    const g=ctx.createRadialGradient(s.x*CELL+CELL/2,s.y*CELL+CELL/2,0,s.x*CELL+CELL/2,s.y*CELL+CELL/2,CELL/2);
    g.addColorStop(0,i===0?'#00ff88':'#00cc66');
    g.addColorStop(1,i===0?'#00cc55':'#009944');
    ctx.fillStyle=g;
    ctx.beginPath();
    ctx.roundRect(s.x*CELL+1,s.y*CELL+1,CELL-2,CELL-2,4);
    ctx.fill();
  });

  // Food
  ctx.fillStyle='#ff4466';
  ctx.shadowColor='#ff4466';ctx.shadowBlur=10;
  ctx.beginPath();
  ctx.arc(food.x*CELL+CELL/2,food.y*CELL+CELL/2,CELL/2-2,0,Math.PI*2);
  ctx.fill();
  ctx.shadowBlur=0;
}

function showOver() {
  const ov=document.getElementById('overlay');
  ov.querySelector('h1').textContent='💀 游戏结束';
  ov.querySelector('p').textContent=`最终分数: ${score} · 最高: ${high}`;
  ov.style.display='flex';
}

function loop() {
  if (gameOver) return;
  update(); draw();
  requestAnimationFrame(loop);
}

// Start on load
document.getElementById('overlay').style.display = 'flex';
</script>
</body></html>
