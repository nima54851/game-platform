<!DOCTYPE html>
<html lang="zh"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>🐍 贪吃蛇大作战</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;font-family:monospace}
canvas{display:block;border-radius:8px}
#bg3d{position:fixed;inset:0;z-index:0;pointer-events:none}
#game-wrap{position:relative;z-index:1}
#hud{position:fixed;top:16px;left:50%;transform:translateX(-50%);display:flex;gap:18px;z-index:10}
.stat{background:rgba(0,0,0,0.7);border:1px solid rgba(0,255,136,0.2);padding:7px 18px;border-radius:8px;text-align:center;backdrop-filter:blur(8px)}
.stat .v{font-size:20px;font-weight:900;color:#00ff88;text-shadow:0 0 10px rgba(0,255,136,0.8)}
.stat .l{font-size:9px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1px}
.stat.level .v{color:#ffca28;text-shadow:0 0 10px rgba(255,202,40,.8)}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,0.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;backdrop-filter:blur(4px)}
#overlay h1{font-size:42px;color:#00ff88;text-shadow:0 0 20px rgba(0,255,136,0.8);margin-bottom:8px}
#overlay p{color:rgba(255,255,255,0.5);margin-bottom:30px;font-size:15px}
#overlay .score-big{font-size:72px;font-weight:900;color:#fff;text-shadow:0 0 30px rgba(255,255,255,0.5);margin-bottom:8px}
#overlay .hs{font-size:16px;color:#ffca28;margin-bottom:30px}
#start-btn{background:#00ff88;color:#000;padding:14px 48px;border:none;border-radius:12px;font-size:18px;font-weight:900;cursor:pointer;font-family:monospace;transition:all .2s;box-shadow:0 0 30px rgba(0,255,136,0.4)}
#start-btn:hover{transform:scale(1.05);box-shadow:0 0 50px rgba(0,255,136,0.6)}
#scene-badge{position:fixed;top:70px;left:50%;transform:translateX(-50%);font-size:11px;color:#888;z-index:10;letter-spacing:1px}
</style>
<script src="https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.min.js"></script>
</head><body>
<canvas id="bg3d"></canvas>
<div id="game-wrap">
<div id="hud">
  <div class="stat"><div class="v" id="score">0</div><div class="l">分数</div></div>
  <div class="stat"><div class="v" id="high">0</div><div class="l">最高</div></div>
  <div class="stat level"><div class="v" id="level">1</div><div class="l">等级</div></div>
</div>
<div id="scene-badge">🌙 夜幕</div>
<div id="overlay">
  <h1>🐍 贪吃蛇大作战</h1>
  <p>↑ ↓ ← → 或 W A S D 控制方向 · 吃光球变长</p>
  <div class="score-big" id="end-score" style="display:none"></div>
  <div class="hs" id="end-hs" style="display:none"></div>
  <button id="start-btn" onclick="startGame()">▶ 开始游戏</button>
</div>
</div>
<canvas id="c"></canvas>
<script>
try {
// ═══════════════════════════════════════════════════════════
//  THREE.JS BACKGROUND
// ═══════════════════════════════════════════════════════════
const bgCanvas = document.getElementById('bg3d');
const renderer = new THREE.WebGLRenderer({ canvas: bgCanvas, alpha: true, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene3d = new THREE.Scene();
const camera3d = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera3d.position.set(0, 0, 30);
camera3d.lookAt(0, 0, 0);

// Background particles in 3D
const bgParticleGeo = new THREE.BufferGeometry();
const bgParticleCount = 200;
const bgPositions = new Float32Array(bgParticleCount * 3);
const bgSpeeds = [];
for (let i = 0; i < bgParticleCount; i++) {
  bgPositions[i * 3] = (Math.random() - 0.5) * 60;
  bgPositions[i * 3 + 1] = (Math.random() - 0.5) * 60;
  bgPositions[i * 3 + 2] = (Math.random() - 0.5) * 20 - 10;
  bgSpeeds.push(0.01 + Math.random() * 0.03);
}
bgParticleGeo.setAttribute('position', new THREE.BufferAttribute(bgPositions, 3));
const bgParticleMat = new THREE.PointsMaterial({ color: 0x00ff88, size: 0.15, transparent: true, opacity: 0.6 });
const bgParticles = new THREE.Points(bgParticleGeo, bgParticleMat);
scene3d.add(bgParticles);

// Animated ring geometry
const ringGeo = new THREE.TorusGeometry(12, 0.05, 8, 64);
const ringMat = new THREE.MeshBasicMaterial({ color: 0x00ff88, transparent: true, opacity: 0.3 });
const ring1 = new THREE.Mesh(ringGeo, ringMat);
const ring2 = new THREE.Mesh(new THREE.TorusGeometry(18, 0.03, 8, 64), ringMat.clone());
scene3d.add(ring1, ring2);

let bgFrame3d = 0;
function animateBg3d() {
  bgFrame3d++;
  bgParticles.rotation.z += 0.001;
  bgParticles.rotation.x += 0.0005;
  const pos = bgParticleGeo.attributes.position.array;
  for (let i = 0; i < bgParticleCount; i++) {
    pos[i * 3 + 1] += bgSpeeds[i];
    if (pos[i * 3 + 1] > 30) pos[i * 3 + 1] = -30;
  }
  bgParticleGeo.attributes.position.needsUpdate = true;
  ring1.rotation.x = bgFrame3d * 0.005;
  ring1.rotation.y = bgFrame3d * 0.003;
  ring2.rotation.x = -bgFrame3d * 0.004;
  ring2.rotation.z = bgFrame3d * 0.002;
  renderer.render(scene3d, camera3d);
  requestAnimationFrame(animateBg3d);
}
animateBg3d();

window.addEventListener('resize', () => {
  camera3d.aspect = window.innerWidth / window.innerHeight;
  camera3d.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ═══════════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = Math.min(600, window.innerWidth - 20), H = Math.min(600, window.innerHeight - 60), CELL = 20;
canvas.width = W; canvas.height = H;
const COLS = W / CELL, ROWS = H / CELL;

const SCENES = [
  { name: '🌙 夜幕', sky0: '#030a06', sky1: '#061208', grid: 'rgba(0,255,136,0.04)', snake: '#00ff88', accent: '#00cc55' },
  { name: '🌅 黄昏', sky0: '#1a0808', sky1: '#2a1005', grid: 'rgba(255,150,50,0.04)', snake: '#ff9944', accent: '#ff6600' },
  { name: '🌊 深海', sky0: '#02060f', sky1: '#030f1a', grid: 'rgba(41,182,246,0.04)', snake: '#29b6f6', accent: '#0288d1' },
  { name: '🌿 森林', sky0: '#030f06', sky1: '#061a05', grid: 'rgba(76,175,80,0.04)', snake: '#66bb6a', accent: '#388e3c' },
];

// ═══════════════════════════════════════════════════════════
//  ENTITY CLASSES
// ═══════════════════════════════════════════════════════════
class SnakeSegment {
  constructor(x, y) { this.x = x; this.y = y; this.prevX = x; this.prevY = y; }
}

class Food {
  constructor(x, y, type) {
    this.x = x; this.y = y; this.type = type; this.t = 0; this.active = true;
  }
  tick() { this.t++; }
  get color() { return { normal: '#00ff88', bonus: '#ffca28', speed: '#29b6f6' }[this.type]; }
  get glowColor() { return { normal: 'rgba(0,255,136,0.4)', bonus: 'rgba(255,202,40,0.4)', speed: 'rgba(41,182,246,0.4)' }[this.type]; }
  get radius() { return CELL / 2 * (1 + Math.sin(this.t * 0.1) * 0.2); }
  get points() { return { normal: 10, bonus: 25, speed: 5 }[this.type]; }
}

class Particle {
  constructor(x, y, color) {
    this.x = x; this.y = y; this.color = color;
    const a = Math.random() * Math.PI * 2, sp = 1 + Math.random() * 3;
    this.vx = Math.cos(a) * sp; this.vy = Math.sin(a) * sp;
    this.life = 1; this.decay = 0.02 + Math.random() * 0.02;
    this.r = 2 + Math.random() * 3; this.active = true;
  }
  tick() {
    this.x += this.vx; this.y += this.vy;
    this.vx *= 0.95; this.vy *= 0.95;
    this.life -= this.decay;
    if (this.life <= 0) this.active = false;
  }
  draw() {
    ctx.globalAlpha = this.life;
    ctx.fillStyle = this.color;
    ctx.beginPath(); ctx.arc(this.x, this.y, this.r * this.life, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
  }
}

class SparkParticle {
  constructor(x, y, color) {
    this.x = x; this.y = y; this.color = color;
    const a = Math.random() * Math.PI * 2, sp = 3 + Math.random() * 6;
    this.vx = Math.cos(a) * sp; this.vy = Math.sin(a) * sp - 1;
    this.life = 1; this.decay = 0.015 + Math.random() * 0.015;
    this.r = 1 + Math.random() * 2; this.active = true;
  }
  tick() {
    this.x += this.vx; this.y += this.vy;
    this.vy += 0.05; this.vx *= 0.98;
    this.life -= this.decay;
    if (this.life <= 0) this.active = false;
  }
  draw() {
    ctx.globalAlpha = this.life;
    ctx.fillStyle = this.color;
    ctx.shadowColor = this.color; ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.arc(this.x, this.y, this.r * this.life, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0; ctx.globalAlpha = 1;
  }
}

class SceneDecoration {
  constructor(type, x, y, scale) {
    this.type = type; this.x = x; this.y = y; this.scale = scale; this.active = true;
    this.t = Math.random() * 100; this.swaySpeed = 0.01 + Math.random() * 0.02;
    this.swayAmp = type === 'flower' ? 2 : type === 'tree' ? 1.5 : 0;
  }
  tick() { this.t += this.swaySpeed; }
  draw(scene) {
    const sway = Math.sin(this.t) * this.swayAmp;
    ctx.save();
    ctx.translate(this.x + sway, this.y);
    ctx.scale(this.scale, this.scale);
    ctx.globalAlpha = 0.3;
    ctx.font = `${CELL}px serif`; ctx.textAlign = 'center';
    const emoji = { tree: '🌲', rock: '🪨', flower: '🌸', bush: '🌿' }[this.type] || '🌿';
    ctx.fillText(emoji, 0, 0);
    ctx.restore(); ctx.globalAlpha = 1;
  }
}

// ═══════════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════════
let snake, dir, nextDir, foods, particles, sparkParticles, decorations;
let score, level, frame, speed, gameOver, high, currentScene;

high = parseInt(localStorage.getItem('snake_hs2') || '0');
document.getElementById('high').textContent = high;

function init() {
  snake = [new SnakeSegment(5, 10), new SnakeSegment(4, 10), new SnakeSegment(3, 10)];
  dir = { x: 1, y: 0 }; nextDir = { x: 1, y: 0 };
  score = 0; frame = 0; speed = 6; foods = []; particles = []; sparkParticles = [];
  decorations = []; gameOver = false; level = 1;
  currentScene = SCENES[0];
  document.getElementById('score').textContent = 0;
  document.getElementById('level').textContent = 1;
  document.getElementById('scene-badge').textContent = currentScene.name;
  spawnFood(); spawnFood(); spawnFood();
  for (let i = 0; i < 8; i++) spawnDecoration();
}

function spawnDecoration() {
  const types = ['tree', 'rock', 'flower', 'bush'];
  const type = types[Math.floor(Math.random() * types.length)];
  const x = Math.floor(Math.random() * COLS), y = Math.floor(Math.random() * ROWS);
  decorations.push(new SceneDecoration(type, x * CELL + CELL / 2, y * CELL + CELL / 2, 0.5 + Math.random() * 0.5));
}

function spawnFood() {
  const type = Math.random() < 0.7 ? 'normal' : Math.random() < 0.5 ? 'bonus' : 'speed';
  let pos, tries = 0;
  do {
    pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
    tries++;
  } while ((snake.some(s => s.x === pos.x && s.y === pos.y) || foods.some(f => f.x === pos.x && f.y === pos.y)) && tries < 50);
  if (tries < 50) foods.push(new Food(pos.x, pos.y, type));
}

function burst(x, y, color, count) {
  for (let i = 0; i < count; i++) particles.push(new Particle(x, y, color));
}

function sparkBurst(x, y, color, count) {
  for (let i = 0; i < count; i++) sparkParticles.push(new SparkParticle(x, y, color));
}

document.addEventListener('keydown', e => {
  const map = {
    ArrowUp: { x: 0, y: -1 }, w: { x: 0, y: -1 }, W: { x: 0, y: -1 },
    ArrowDown: { x: 0, y: 1 }, s: { x: 0, y: 1 }, S: { x: 0, y: 1 },
    ArrowLeft: { x: -1, y: 0 }, a: { x: -1, y: 0 }, A: { x: -1, y: 0 },
    ArrowRight: { x: 1, y: 0 }, d: { x: 1, y: 0 }, D: { x: 1, y: 0 },
  };
  const nd = map[e.key];
  if (nd && !(nd.x === -dir.x && nd.y === -dir.y)) nextDir = nd;
  if (e.key === ' ' && gameOver) startGame();
});

function update() {
  if (gameOver) return;
  frame++;
  decorations.forEach(d => d.tick());
  decorations = decorations.filter(d => d.active);
  if (decorations.length < 10 && Math.random() < 0.02) spawnDecoration();

  const dropSpeed = Math.max(4, 14 - Math.min(speed, 12));
  if (frame % dropSpeed !== 0) return;

  dir = { ...nextDir };
  const head = new SnakeSegment(snake[0].x + dir.x, snake[0].y + dir.y);

  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    gameOver = true; burst(head.x * CELL + CELL / 2, head.y * CELL + CELL / 2, '#ef5350', 30); sparkBurst(head.x * CELL + CELL / 2, head.y * CELL + CELL / 2, '#ff8800', 20); showOver(); return;
  }
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    gameOver = true; burst(head.x * CELL + CELL / 2, head.y * CELL + CELL / 2, '#ef5350', 30); sparkBurst(head.x * CELL + CELL / 2, head.y * CELL + CELL / 2, '#ff8800', 20); showOver(); return;
  }
  snake.unshift(head);

  let ate = false;
  for (let fi = foods.length - 1; fi >= 0; fi--) {
    const f = foods[fi];
    if (f.x === head.x && f.y === head.y) {
      ate = true;
      score += f.points;
      const newLevel = Math.floor(score / 30) + 1;
      if (newLevel > level) {
        level = newLevel;
        currentScene = SCENES[Math.min(level - 1, SCENES.length - 1)];
        document.getElementById('scene-badge').textContent = currentScene.name;
        for (let i = 0; i < 20; i++) burst(W / 2, H / 2, currentScene.snake, 5);
        sparkBurst(W / 2, H / 2, '#ffffff', 10);
      }
      if (score > high) { high = score; localStorage.setItem('snake_hs2', high); document.getElementById('high').textContent = high; }
      burst(f.x * CELL + CELL / 2, f.y * CELL + CELL / 2, f.color, 15);
      sparkBurst(f.x * CELL + CELL / 2, f.y * CELL + CELL / 2, '#ffffff', 8);
      foods.splice(fi, 1);
      if (foods.length < 3) spawnFood();
      if (score % 30 === 0 && speed < 12) speed++;
      document.getElementById('score').textContent = score;
      document.getElementById('level').textContent = level;
    }
  }
  if (!ate) snake.pop();
}

function draw() {
  const S = currentScene;
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, S.sky0); bg.addColorStop(1, S.sky1);
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  // Dense grid
  ctx.fillStyle = S.grid;
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    ctx.beginPath(); ctx.arc(c * CELL + CELL / 2, r * CELL + CELL / 2, 1, 0, Math.PI * 2); ctx.fill();
  }

  decorations.forEach(d => d.draw(S));

  foods.forEach(f => {
    f.tick();
    const fx = f.x * CELL + CELL / 2, fy = f.y * CELL + CELL / 2;
    ctx.shadowColor = f.color; ctx.shadowBlur = 15 + f.t * 0.1;
    const g = ctx.createRadialGradient(fx, fy, 0, fx, fy, f.radius);
    g.addColorStop(0, f.color); g.addColorStop(1, f.glowColor);
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(fx, fy, f.radius, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
  });

  snake.forEach((s, i) => {
    const isHead = i === 0;
    const t = i / snake.length;
    const gx = s.x * CELL + CELL / 2, gy = s.y * CELL + CELL / 2;
    const rr = Math.min(CELL / 2 - 1, CELL * (isHead ? 0.55 : 0.5));
    const g = ctx.createRadialGradient(gx - 2, gy - 2, 0, gx, gy, rr);
    if (isHead) { g.addColorStop(0, S.snake); g.addColorStop(1, S.accent); }
    else { const r = Math.floor(255 - t * 80), grn = Math.floor(220 - t * 80); g.addColorStop(0, `rgba(${r},${grn},${Math.floor(100 - t * 50)},1)`); g.addColorStop(1, `rgba(${Math.floor(r * 0.7)},${Math.floor(grn * 0.7)},${Math.floor(60 * 0.7)},1)`); }
    ctx.shadowColor = S.snake; ctx.shadowBlur = isHead ? 12 : 6;
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.roundRect(gx - rr, gy - rr, rr * 2, rr * 2, rr * 0.5); ctx.fill();
    if (isHead) {
      const ex = gx + dir.x * 5, ey = gy + dir.y * 5;
      ctx.shadowBlur = 0; ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(ex - 3, ey - 3, 2.5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(ex + 3, ey + 3, 2.5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(ex - 3 + dir.x, ey - 3 + dir.y, 1.2, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(ex + 3 + dir.x, ey + 3 + dir.y, 1.2, 0, Math.PI * 2); ctx.fill();
    }
    ctx.shadowBlur = 0;
  });

  particles.forEach(p => { p.tick(); p.draw(); });
  particles = particles.filter(p => p.active);
  sparkParticles.forEach(p => { p.tick(); p.draw(); });
  sparkParticles = sparkParticles.filter(p => p.active);
}

function showOver() {
  const ov = document.getElementById('overlay');
  ov.querySelector('h1').textContent = '💀 游戏结束';
  ov.querySelector('p').textContent = '按空格或点击重新开始';
  const es = document.getElementById('end-score'); es.style.display = 'block'; es.textContent = `分数：${score}`;
  const eh = document.getElementById('end-hs'); eh.style.display = 'block'; eh.textContent = `最高分：${high}`;
  ov.style.display = 'flex';
}

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('end-score').style.display = 'none';
  document.getElementById('end-hs').style.display = 'none';
  gameOver = false; init(); loop();
}

function loop() { if (!gameOver) update(); draw(); requestAnimationFrame(loop); }

document.getElementById('overlay').style.display = 'flex';
// Game starts on button click via startGame()
init();
} catch(e) { console.error(e); }
</script></body></html>
