<!DOCTYPE html>
<html lang="zh"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>✈️ 3D空战</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:monospace}
canvas{display:block}
#hud{position:fixed;top:14px;left:50%;transform:translateX(-50%);display:flex;gap:14px;z-index:10;pointer-events:none}
.stat{background:rgba(0,0,0,.75);border:1px solid rgba(255,100,0,.25);padding:7px 18px;border-radius:8px;text-align:center;backdrop-filter:blur(4px)}
.stat .v{font-size:20px;font-weight:900;color:#ff6600;text-shadow:0 0 14px rgba(255,100,0,.8)}
.stat .l{font-size:9px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:2px}
.stat.shield .v{color:#00ffcc;text-shadow:0 0 14px rgba(0,255,200,.8)}
.stat.boost .v{color:#ffcc00;text-shadow:0 0 14px rgba(255,200,0,.8)}
#hp-bar{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);width:220px;z-index:10;pointer-events:none}
#hp-label{font-size:11px;color:#ff6600;text-align:center;margin-bottom:4px;letter-spacing:2px}
#hp-fill-wrap{background:rgba(0,0,0,.7);border:1px solid rgba(255,100,0,.3);border-radius:6px;height:10px;overflow:hidden}
#hp-fill{height:100%;width:100%;border-radius:6px;background:linear-gradient(90deg,#ff0000,#00ff44);transition:width .3s}
#combo{position:fixed;top:70px;left:50%;transform:translateX(-50%);color:#ffcc00;font-size:18px;font-weight:900;opacity:0;transition:opacity .3s;text-shadow:0 0 10px #ffcc00;pointer-events:none;z-index:10}
#combo.show{opacity:1}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;backdrop-filter:blur(8px)}
#overlay h1{font-size:52px;color:#ff6600;text-shadow:0 0 40px rgba(255,100,0,.9);margin-bottom:8px;animation:pulse 2s infinite}
#overlay p{color:rgba(255,255,255,.45);margin-bottom:22px;font-size:15px;letter-spacing:1px;text-align:center}
#start-btn{background:linear-gradient(90deg,#ff6600,#ff2200);color:#fff;padding:14px 50px;border:none;border-radius:14px;font-size:19px;font-weight:900;cursor:pointer;font-family:monospace;box-shadow:0 0 40px rgba(255,100,0,.6),0 4px 0 #aa2200}
#start-btn:hover{transform:scale(1.04);box-shadow:0 0 60px rgba(255,100,0,.9),0 4px 0 #aa2200}
@keyframes pulse{0%,100%{text-shadow:0 0 40px rgba(255,100,0,.9)}50%{text-shadow:0 0 60px rgba(255,100,0,1)}}
#err{color:#ff4444;font-size:14px;margin-top:12px;display:none;text-align:center;max-width:400px}
#ctrl{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.25);font-size:12px;z-index:10;pointer-events:none;letter-spacing:1px}
</style></head><body>
<div id="hud">
  <div class="stat"><div class="v" id="score">0</div><div class="l">得分</div></div>
  <div class="stat"><div class="v" id="kills">0</div><div class="l">击落</div></div>
  <div class="stat"><div class="v" id="wave">1</div><div class="l">波次</div></div>
  <div class="stat" id="hp-stat"><div class="v" id="hp">100</div><div class="l">生命</div></div>
</div>
<div id="combo"></div>
<div id="hp-bar"><div id="hp-label">✈ HP</div><div id="hp-fill-wrap"><div id="hp-fill"></div></div></div>
<div id="overlay">
  <h1>✈️ 3D空战</h1>
  <p>WASD / 方向键 飞行 &nbsp;·&nbsp; 空格 / 点击 射击</p>
  <button id="start-btn" onclick="doStart()">▶ 起飞</button>
  <div id="err"></div>
</div>
<div id="ctrl">WASD 飞行 · 空格/点击 射击 · P 暂停</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.min.js"></script>
<script>
'use strict';

// ─── Renderer ───────────────────────────────────────────────
var renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

// ─── Scene + Camera ─────────────────────────────────────────
var scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x112244, 30, 250);
var camera = new THREE.PerspectiveCamera(65, window.innerWidth/window.innerHeight, 0.1, 600);
camera.position.set(0, 6, 16);

// ─── Sky Dome Shader ───────────────────────────────────────
(function createSky() {
  var geo = new THREE.SphereGeometry(400, 32, 32);
  var mat = new THREE.ShaderMaterial({
    side: THREE.BackSide,
    depthWrite: false,
    uniforms: {
      topColor:    { value: new THREE.Color(0x020818) },
      midColor:    { value: new THREE.Color(0x0a1a3a) },
      horizonColor:{ value: new THREE.Color(0x1a3a6a) },
      sunColor:    { value: new THREE.Color(0x446688) },
      sunDir:      { value: new THREE.Vector3(0.5, 0.3, -0.8).normalize() }
    },
    vertexShader: [
      'varying vec3 vWorldPos;',
      'void main(){',
      '  vWorldPos = (modelMatrix * vec4(position,1.0)).xyz;',
      '  gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);',
      '}'
    ].join('\n'),
    fragmentShader: [
      'uniform vec3 topColor; uniform vec3 midColor; uniform vec3 horizonColor;',
      'uniform vec3 sunColor; uniform vec3 sunDir;',
      'varying vec3 vWorldPos;',
      'void main(){',
      '  vec3 dir = normalize(vWorldPos);',
      '  float h = dir.y;',
      '  vec3 sky;',
      '  if(h > 0.0) sky = mix(horizonColor, midColor, min(h*2.0,1.0));',
      '  else sky = mix(horizonColor, topColor, min(-h*3.0,1.0));',
      '  sky = mix(sky, topColor, max(h,0.0)*2.0);',
      '  float sunDot = max(dot(dir, sunDir), 0.0);',
      '  sky += sunColor * pow(sunDot, 32.0) * 0.5;',
      '  sky += sunColor * pow(sunDot, 4.0) * 0.2;',
      '  gl_FragColor = vec4(sky, 1.0);',
      '}'
    ].join('\n')
  });
  scene.add(new THREE.Mesh(geo, mat));
})();

// ─── Stars ─────────────────────────────────────────────────
(function() {
  var N = 4000;
  var pos = new Float32Array(N*3);
  var col = new Float32Array(N*3);
  for(var i=0; i<N; i++){
    var phi = Math.acos(2*Math.random()-1), theta = Math.random()*Math.PI*2;
    var r = 350 + Math.random()*50;
    pos[i*3]   = r*Math.sin(phi)*Math.cos(theta);
    pos[i*3+1] = Math.abs(r*Math.cos(phi)); // upper hemisphere
    pos[i*3+2] = r*Math.sin(phi)*Math.sin(theta);
    var b = 0.5 + Math.random()*0.5;
    col[i*3]=b*0.8; col[i*3+1]=b*0.85; col[i*3+2]=b;
  }
  var geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color', new THREE.BufferAttribute(col,3));
  var mat = new THREE.PointsMaterial({size:0.7, sizeAttenuation:true, vertexColors:true, transparent:true, opacity:0.9});
  scene.add(new THREE.Points(geo, mat));
})();

// ─── Lighting ───────────────────────────────────────────────
var sun = new THREE.DirectionalLight(0xfff0dd, 2.5);
sun.position.set(40, 60, -80);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.far = 300;
sun.shadow.camera.left = sun.shadow.camera.bottom = -100;
sun.shadow.camera.right = sun.shadow.camera.top = 100;
sun.shadow.bias = -0.0005;
scene.add(sun);
scene.add(new THREE.AmbientLight(0x334466, 0.8));
scene.add(new THREE.HemisphereLight(0x446688, 0x223344, 0.6));

// ─── Ground ───────────────────────────────────────────────
(function() {
  var geo = new THREE.PlaneGeometry(500, 500, 1, 1);
  var mat = new THREE.MeshStandardMaterial({color: 0x1a2a3a, roughness: 0.95, metalness: 0.05});
  var mesh = new THREE.Mesh(geo, mat);
  mesh.rotation.x = -Math.PI/2;
  mesh.position.y = -50;
  mesh.receiveShadow = true;
  scene.add(mesh);

  // Grid
  var grid = new THREE.GridHelper(400, 50, 0x3355aa, 0x1a2a4a);
  grid.position.y = -49.9;
  grid.material.opacity = 0.15;
  grid.material.transparent = true;
  scene.add(grid);
})();

// ─── Mountains (InstancedMesh) ─────────────────────────────
(function() {
  var geo = new THREE.ConeGeometry(1, 1, 6);
  var mat = new THREE.MeshStandardMaterial({color: 0x0d1525, roughness: 0.9, flatShading: true});
  var mesh = new THREE.InstancedMesh(geo, mat, 25);
  mesh.castShadow = true;
  var dummy = new THREE.Object3D();
  for(var i=0; i<25; i++){
    var s = 25 + Math.random()*50;
    dummy.position.set((Math.random()-0.5)*500, -25, (Math.random()-0.5)*300-100);
    dummy.scale.set(s, s, s);
    dummy.rotation.y = Math.random()*Math.PI;
    dummy.updateMatrix();
    mesh.setMatrixAt(i, dummy.matrix);
  }
  scene.add(mesh);
})();

// ─── City Buildings ────────────────────────────────────────
(function() {
  var geo = new THREE.BoxGeometry(1,1,1);
  var mat = new THREE.MeshStandardMaterial({color: 0x0a1525, roughness: 0.9, metalness: 0.1});
  var mesh = new THREE.InstancedMesh(geo, mat, 70);
  mesh.castShadow = true;
  var dummy = new THREE.Object3D();
  for(var i=0; i<70; i++){
    var h = 8+Math.random()*40, w = 4+Math.random()*12;
    dummy.position.set((Math.random()-0.5)*400, -50+h/2, (Math.random()-0.5)*300-60);
    dummy.scale.set(w, h, w);
    dummy.updateMatrix();
    mesh.setMatrixAt(i, dummy.matrix);
  }
  scene.add(mesh);
})();

// ─── Clouds ────────────────────────────────────────────────
var cloudGroup = new THREE.Group();
scene.add(cloudGroup);
(function() {
  var mat = new THREE.MeshStandardMaterial({color:0x223344, transparent:true, opacity:0.18, roughness:1, metalness:0});
  for(var i=0; i<30; i++){
    var cx = (Math.random()-0.5)*300;
    var cy = 10 + Math.random()*60;
    var cz = (Math.random()-0.5)*250;
    for(var j=0; j<5; j++){
      var r = 10+Math.random()*20;
      var m = new THREE.Mesh(new THREE.SphereGeometry(r,8,6), mat.clone());
      m.position.set(cx+(Math.random()-0.5)*30, cy+(Math.random()-0.5)*10, cz+(Math.random()-0.5)*20);
      cloudGroup.add(m);
    }
  }
})();

// ─── Plane Model Factory ────────────────────────────────────
function buildPlane(color1, color2, isPlayer) {
  var group = new THREE.Group();

  var fMat = new THREE.MeshStandardMaterial({color: color1, metalness: 0.5, roughness: 0.35});
  var wMat = new THREE.MeshStandardMaterial({color: color2, metalness: 0.6, roughness: 0.4});
  var glassMat = new THREE.MeshStandardMaterial({color: isPlayer?0x4488ff:0x334455, metalness:0.1, roughness:0.05, transparent:true, opacity:0.75});
  var engMat  = new THREE.MeshStandardMaterial({color: 0x223344, metalness:0.9, roughness:0.2});
  var glowMat = new THREE.MeshStandardMaterial({color:0xff6600, emissive:0xff6600, emissiveIntensity:3, roughness:1});

  // Fuselage
  var fGeo = new THREE.CylinderGeometry(0.22, 0.18, 3.2, 12);
  fGeo.rotateX(Math.PI/2);
  var f = new THREE.Mesh(fGeo, fMat); f.castShadow=true; group.add(f);

  // Nose
  var nGeo = new THREE.ConeGeometry(0.18, 0.7, 10);
  nGeo.rotateX(-Math.PI/2);
  var n = new THREE.Mesh(nGeo, fMat); n.position.z=-1.7; n.castShadow=true; group.add(n);

  // Cockpit glass
  var cGeo = new THREE.SphereGeometry(0.22, 8, 6, 0, Math.PI*2, 0, Math.PI/2);
  var c = new THREE.Mesh(cGeo, glassMat); c.position.set(0,0.18,-0.5); group.add(c);

  // Wings
  var wGeo = new THREE.BoxGeometry(5.5, 0.07, 0.9);
  var w = new THREE.Mesh(wGeo, wMat); w.castShadow=true; group.add(w);

  // Wing tips
  var wtGeo = new THREE.BoxGeometry(0.8, 0.07, 0.45);
  var wt1 = new THREE.Mesh(wtGeo, wMat); wt1.position.set(-3.1,0.12,-0.1); group.add(wt1);
  var wt2 = new THREE.Mesh(wtGeo, wMat); wt2.position.set( 3.1,0.12,-0.1); group.add(wt2);

  // Tail fin (vertical stabilizer)
  var tfGeo = new THREE.BoxGeometry(0.07, 1.1, 0.7);
  var tf = new THREE.Mesh(tfGeo, wMat); tf.position.set(0,0.55,1.2); tf.castShadow=true; group.add(tf);

  // Horizontal stabilizers
  var hsGeo = new THREE.BoxGeometry(2.0, 0.06, 0.55);
  var hs = new THREE.Mesh(hsGeo, wMat); hs.position.set(0,0,1.3); group.add(hs);

  // Engine nacelles
  var eGeo = new THREE.CylinderGeometry(0.19, 0.19, 1.3, 10);
  eGeo.rotateX(Math.PI/2);
  var e1 = new THREE.Mesh(eGeo, engMat); e1.position.set(-1.6,-0.18,-0.2); group.add(e1);
  var e2 = new THREE.Mesh(eGeo, engMat); e2.position.set( 1.6,-0.18,-0.2); group.add(e2);

  // Engine exhaust glow rings
  var eg1 = new THREE.Mesh(new THREE.TorusGeometry(0.19,0.05,8,16), glowMat); eg1.position.set(-1.6,-0.18,0.5); group.add(eg1);
  var eg2 = new THREE.Mesh(new THREE.TorusGeometry(0.19,0.05,8,16), glowMat); eg2.position.set( 1.6,-0.18,0.5); group.add(eg2);

  // Gun barrels
  var wpGeo = new THREE.CylinderGeometry(0.04,0.04,0.9,6);
  wpGeo.rotateZ(Math.PI/2);
  var wpMat = new THREE.MeshStandardMaterial({color:0x333333, metalness:0.9, roughness:0.3});
  var wp1 = new THREE.Mesh(wpGeo, wpMat); wp1.position.set(-1.3,-0.1,-1.05); group.add(wp1);
  var wp2 = new THREE.Mesh(wpGeo, wpMat); wp2.position.set( 1.3,-0.1,-1.05); group.add(wp2);

  return group;
}

// ─── Bullet Factory ────────────────────────────────────────
function buildBullet(color, size) {
  size = size || 0.15;
  var geo = new THREE.SphereGeometry(size, 6, 6);
  var mat = new THREE.MeshStandardMaterial({color:color, emissive:color, emissiveIntensity:2, roughness:1});
  var mesh = new THREE.Mesh(geo, mat);
  return mesh;
}

// ─── Particle Pool (Buffer-based) ─────────────────────────
var MAX_P = 500;
var pPos  = new Float32Array(MAX_P*3);
var pVel  = new Float32Array(MAX_P*3);
var pLife = new Float32Array(MAX_P).fill(-1);
var pMax  = new Float32Array(MAX_P);
var pCol  = new Float32Array(MAX_P*3);
var pGeo  = new THREE.BufferGeometry();
pGeo.setAttribute('position', new THREE.BufferAttribute(pPos,3));
pGeo.setAttribute('color', new THREE.BufferAttribute(pCol,3));
var pMat = new THREE.PointsMaterial({size:0.2, vertexColors:true, transparent:true, opacity:1, blending:THREE.AdditiveBlending, depthWrite:false, sizeAttenuation:true});
var pPoints = new THREE.Points(pGeo, pMat);
scene.add(pPoints);

function emitParticles(x,y,z,vx,vy,vz,r,g,b,life) {
  life = life||40;
  for(var i=0;i<MAX_P;i++){
    if(pLife[i]<=0){
      var i3=i*3;
      pPos[i3]=x;pPos[i3+1]=y;pPos[i3+2]=z;
      pVel[i3]=vx;pVel[i3+1]=vy;pVel[i3+2]=vz;
      pCol[i3]=r;pCol[i3+1]=g;pCol[i3+2]=b;
      pLife[i]=life;pMax[i]=life;
      return;
    }
  }
}
function updateParticles() {
  for(var i=0;i<MAX_P;i++){
    if(pLife[i]>0){
      var i3=i*3;
      pPos[i3]  +=pVel[i3];
      pPos[i3+1]+=pVel[i3+1]-0.05;
      pPos[i3+2]+=pVel[i3+2];
      pVel[i3]*=0.96;pVel[i3+2]*=0.96;
      pLife[i]--;
      pCol[i3]*=0.98;pCol[i3+1]*=0.98;pCol[i3+2]*=0.98;
      pPos[i3+1]=-999;
    }
  }
  pGeo.attributes.position.needsUpdate=true;
  pGeo.attributes.color.needsUpdate=true;
}
function explode(x,y,z,hex,count,spread) {
  count=count||25;spread=spread||3;
  var c=new THREE.Color(hex);
  for(var i=0;i<count;i++){
    var a=Math.random()*Math.PI*2,b=(Math.random()-0.5)*Math.PI;
    var sp=spread*(0.5+Math.random());
    emitParticles(x,y,z,
      Math.cos(a)*Math.cos(b)*sp, Math.sin(b)*sp, Math.sin(a)*Math.cos(b)*sp,
      c.r,c.g,c.b,20+Math.random()*25);
  }
  var light=new THREE.PointLight(hex,15,20);
  light.position.set(x,y,z);scene.add(light);
  setTimeout(function(){scene.remove(light);},100);
}

// ─── Damage Numbers ────────────────────────────────────────
var damageEls=[];
function spawnDmgNum(x,y,z,text,color) {
  var el=document.createElement('div');
  el.textContent=text;
  el.style.cssText='position:fixed;pointer-events:none;font-size:22px;font-weight:900;font-family:monospace;color:'+(color||'#ff4444')+';text-shadow:0 0 8px '+(color||'#ff4444')+';z-index:50;transition:transform 1s ease-out,opacity 1s ease-out;transform:translateY(0);opacity:1;';
  document.body.appendChild(el);
  requestAnimationFrame(function(){
    el.style.transform='translateY(-70px)';
    el.style.opacity='0';
  });
  setTimeout(function(){el.remove();},1050);
}

// ─── Game State ─────────────────────────────────────────────
var score=0,kills=0,gameWave=1,frame=0,gameOver=false,paused=false;
var highScore=parseInt(localStorage.getItem('ss3d_hs')||'0');

// Player state
var player = {
  x:0,y:0,z:0, vx:0,vy:0,
  hp:100, maxHP:100,
  shield:false, boostTimer:0,
  invincible:0, combo:0, comboTimer:0,
  mesh: null,
  get hpRatio(){return Math.max(0,this.hp/this.maxHP);}
};

// Entity lists
var enemies=[], pBullets=[], eBullets=[], powerups=[];
// Mesh pools
var pBulletMeshes=[], eBulletMeshes=[];

// ─── Init ──────────────────────────────────────────────────
function initGame() {
  // Remove old meshes
  if(player.mesh){ scene.remove(player.mesh); player.mesh=null; }
  pBullets.forEach(function(b){ scene.remove(b.mesh); });
  eBullets.forEach(function(b){ scene.remove(b.mesh); });
  enemies.forEach(function(e){ scene.remove(e.mesh); });
  powerups.forEach(function(p){ scene.remove(p.mesh); });

  pBullets=[]; eBullets=[]; enemies=[]; powerups=[];
  pBulletMeshes=[]; eBulletMeshes=[];

  // Create player
  player.x=0; player.y=0; player.z=0;
  player.vx=0; player.vy=0;
  player.hp=100; player.shield=false; player.boostTimer=0;
  player.invincible=0; player.combo=0; player.comboTimer=0;
  player.mesh = buildPlane(0x3a6ab5, 0x224488, true);
  scene.add(player.mesh);

  score=0; kills=0; gameWave=1; frame=0; gameOver=false; paused=false;
  updateHUD();
}

// ─── HUD ───────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('score').textContent=score;
  document.getElementById('kills').textContent=kills;
  document.getElementById('wave').textContent=gameWave;
  document.getElementById('hp').textContent=Math.max(0,player.hp);
  var cls=player.shield?'stat shield':player.boostTimer>0?'stat boost':'stat';
  document.getElementById('hp-stat').className=cls;
  var fill=document.getElementById('hp-fill');
  fill.style.width=(player.hpRatio*100)+'%';
  fill.style.background=player.hpRatio>0.6?'linear-gradient(90deg,#ff0000,#00ff44)':player.hpRatio>0.3?'linear-gradient(90deg,#ff0000,#ff8800)':'#ff0000';
}
function updateCombo() {
  var el=document.getElementById('combo');
  if(player.combo>=3){el.textContent='🔥 '+player.combo+'连击!';el.classList.add('show');}
  else{el.classList.remove('show');}
}

// ─── Controls ───────────────────────────────────────────────
var keys={};
document.addEventListener('keydown',function(e){
  keys[e.code]=true;
  if(e.code==='Space'){e.preventDefault(); doShoot();}
  if(e.code==='KeyP') paused=!paused;
});
document.addEventListener('keyup',function(e){keys[e.code]=false;});
document.addEventListener('click',function(){if(!gameOver&&!paused)doShoot();});

function doShoot() {
  if(gameOver)return;
  for(var side=-1;side<=1;side+=2){
    var mesh=buildBullet(0x00ffff);
    mesh.position.set(player.x+side*0.8, player.y, player.z-2);
    scene.add(mesh);
    pBullets.push({mesh:mesh, vz:-1.2, side:side});
  }
  var flash=new THREE.PointLight(0x00ffff,8,6);
  flash.position.set(player.x,player.y,player.z-2);scene.add(flash);
  setTimeout(function(){scene.remove(flash);},80);
}

// ─── Spawn Enemy ────────────────────────────────────────────
function spawnEnemy() {
  var t=Math.floor(Math.random()*3);
  var configs=[
    {speed:0.06,hp:2,score:100,fireRate:120,scale:0.8,color1:0xcc2222,color2:0x881111},
    {speed:0.08,hp:3,score:200,fireRate:80, scale:1.0,color1:0x884400,color2:0x552200},
    {speed:0.10,hp:5,score:300,fireRate:50, scale:1.3,color1:0x440088,color2:0x220055},
  ];
  var cfg=Object.assign({},configs[t]);
  cfg.hp+=Math.floor(gameWave*0.3);
  var mesh=buildPlane(cfg.color1,cfg.color2,false);
  mesh.rotation.y=Math.PI;
  mesh.scale.setScalar(cfg.scale);
  mesh.position.set((Math.random()-0.5)*40, 3+Math.random()*10, -100-Math.random()*30);
  scene.add(mesh);
  enemies.push({
    mesh:mesh, cfg:cfg,
    shootTimer:Math.random()*cfg.fireRate,
    get canShoot(){return this.shootTimer<=0;}
  });
}

// ─── Enemy Shoot ───────────────────────────────────────────
function enemyShoot(e) {
  var ex=e.mesh.position.x,ey=e.mesh.position.y,ez=e.mesh.position.z;
  var dx=player.x-ex,dy=player.y-ey,dz=player.z-ez;
  var len=Math.sqrt(dx*dx+dy*dy+dz*dz);
  var mesh=buildBullet(0xff4400,0.15);
  mesh.position.set(ex,ey,ez);
  scene.add(mesh);
  eBullets.push({mesh:mesh, vx:dx/len*0.3, vy:dy/len*0.3, vz:dz/len*0.3});
  e.shootTimer=e.cfg.fireRate+Math.random()*e.cfg.fireRate;
}

// ─── Spawn Power-up ────────────────────────────────────────
var puColors={shield:0x00ffcc,boost:0xffcc00,nuke:0xff4444};
function spawnPowerUp(x,y,z) {
  var kinds=['shield','boost','nuke'];
  var kind=kinds[Math.floor(Math.random()*3)];
  var geo=new THREE.OctahedronGeometry(0.6,0);
  var mat=new THREE.MeshStandardMaterial({color:puColors[kind],emissive:puColors[kind],emissiveIntensity:2,roughness:0.5,metalness:0.5,transparent:true,opacity:0.9});
  var mesh=new THREE.Mesh(geo,mat);
  mesh.position.set(x,y,z);scene.add(mesh);
  powerups.push({mesh:mesh,kind:kind,age:0});
}

// ─── Update ────────────────────────────────────────────────
function update() {
  if(gameOver||paused)return;
  frame++;

  if(frame%600===0) gameWave++;
  var spawnRate=Math.max(60,120-gameWave*8);
  if(frame%spawnRate===0&&enemies.length<4+gameWave*2) spawnEnemy();

  // Player movement
  var acc=0.07,top=0.5;
  if(keys['KeyW']||keys['ArrowUp'])   player.vy+=acc;
  if(keys['KeyS']||keys['ArrowDown']) player.vy-=acc;
  if(keys['KeyA']||keys['ArrowLeft']) player.vx-=acc;
  if(keys['KeyD']||keys['ArrowRight'])player.vx+=acc;
  if(keys['ShiftLeft'])player.vy+=acc*0.5;
  if(keys['ControlLeft'])player.vy-=acc*0.5;
  player.vx*=0.9;player.vy*=0.9;
  if(player.boostTimer>0){player.vy+=0.06;player.boostTimer--;}
  player.x=Math.max(-30,Math.min(30,player.x+player.vx));
  player.y=Math.max(-10,Math.min(12,player.y+player.vy));

  player.mesh.position.set(player.x,player.y,player.z);
  player.mesh.rotation.z=(-player.vx*0.6);
  player.mesh.rotation.x=(player.vy*0.3);
  if(player.invincible>0)player.invincible--;

  if(player.comboTimer>0){player.comboTimer--;if(player.comboTimer===0)player.combo=0;}

  // Engine glow pulse
  var pulse=1+0.12*Math.sin(frame*0.2);
  player.mesh.children.forEach(function(c){
    if(c.material&&c.material.emissive&&c.material.emissiveIntensity>1)c.scale.setScalar(pulse);
  });

  // Camera follow
  camera.position.set(player.x*0.3, player.y+6, player.z+16);
  camera.lookAt(player.x,player.y,player.z-10);

  // Player bullets
  for(var i=pBullets.length-1;i>=0;i--){
    var pb=pBullets[i];
    pb.mesh.position.z+=pb.vz;
    if(pb.mesh.position.z<-120){scene.remove(pb.mesh);pBullets.splice(i,1);continue;}
    for(var j=enemies.length-1;j>=0;j--){
      var e=enemies[j];
      var dist=pb.mesh.position.distanceTo(e.mesh.position);
      if(dist<2+e.cfg.scale){
        explode(pb.mesh.position.x,pb.mesh.position.y,pb.mesh.position.z,0xff6600,12);
        scene.remove(pb.mesh);pBullets.splice(i,1);
        e.cfg.hp--;
        if(e.cfg.hp<=0){
          explode(e.mesh.position.x,e.mesh.position.y,e.mesh.position.z,0xff8800,30);
          spawnDmgNum(e.mesh.position.x,e.mesh.position.y,e.mesh.position.z,'+'+e.cfg.score,'#ffcc00');
          if(Math.random()<0.2)spawnPowerUp(e.mesh.position.x,e.mesh.position.y,e.mesh.position.z);
          scene.remove(e.mesh);enemies.splice(j,1);
          player.combo++;player.comboTimer=120;
          score+=e.cfg.score*Math.max(1,player.combo);kills++;
          if(score>highScore){highScore=score;localStorage.setItem('ss3d_hs',highScore);}
        }
        break;
      }
    }
  }

  // Enemy bullets
  for(var k=eBullets.length-1;k>=0;k--){
    var eb=eBullets[k];
    eb.mesh.position.x+=eb.vx;eb.mesh.position.y+=eb.vy;eb.mesh.position.z+=eb.vz;
    if(eb.mesh.position.z>10||eb.mesh.position.z<-150){scene.remove(eb.mesh);eBullets.splice(k,1);continue;}
    var db=eb.mesh.position.distanceTo(player.mesh.position);
    if(db<2.5){
      explode(eb.mesh.position.x,eb.mesh.position.y,eb.mesh.position.z,0xff4400,8);
      scene.remove(eb.mesh);eBullets.splice(k,1);
      if(!player.shield&&player.invincible===0){
        player.hp=Math.max(0,player.hp-10);player.invincible=60;updateHUD();
        if(player.hp<=0){gameOver=true;explode(player.x,player.y,player.z,0xff6600,50);setTimeout(showOver,800);}
      }
    }
  }

  // Enemies
  for(var m=enemies.length-1;m>=0;m--){
    var em=enemies[m];
    em.mesh.position.z+=em.cfg.speed+gameWave*0.003;
    em.mesh.position.x+=(player.x-em.mesh.position.x)*0.01;
    em.mesh.position.y+=(player.y-em.mesh.position.y)*0.008;
    em.shootTimer--;
    if(em.canShoot){enemyShoot(em);}
    if(em.mesh.position.z>20){scene.remove(em.mesh);enemies.splice(m,1);continue;}
    var dem=em.mesh.position.distanceTo(player.mesh.position);
    if(dem<2.5+em.cfg.scale){
      explode(em.mesh.position.x,em.mesh.position.y,em.mesh.position.z,0xff8800,20);
      scene.remove(em.mesh);enemies.splice(m,1);
      if(!player.shield&&player.invincible===0){
        player.hp=Math.max(0,player.hp-25);player.invincible=60;updateHUD();
        if(player.hp<=0){gameOver=true;explode(player.x,player.y,player.z,0xff6600,50);setTimeout(showOver,800);}
      }
    }
  }

  // Power-ups
  for(var n=powerups.length-1;n>=0;n--){
    var pu=powerups[n];
    pu.age++;pu.mesh.rotation.y+=0.1;pu.mesh.rotation.x+=0.05;
    pu.mesh.position.z+=0.1;
    if(pu.mesh.position.z>15){scene.remove(pu.mesh);powerups.splice(n,1);continue;}
    if(pu.mesh.position.distanceTo(player.mesh.position)<3){
      if(pu.kind==='shield')player.shield=true;
      if(pu.kind==='boost'){player.boostTimer=180;player.invincible=180;}
      if(pu.kind==='nuke'){
        enemies.forEach(function(e2){explode(e2.mesh.position.x,e2.mesh.position.y,e2.mesh.position.z,0xff4444,20);score+=e2.cfg.score;scene.remove(e2.mesh);});
        enemies=[];explode(player.x,player.y,player.z,0xff4444,60,8);
      }
      scene.remove(pu.mesh);powerups.splice(n,1);updateHUD();
    }
  }

  // Particles + clouds
  updateParticles();
  cloudGroup.rotation.y+=0.0002;
  updateHUD();updateCombo();
}

function showOver() {
  document.getElementById('overlay').querySelector('h1').textContent='💥 被击落！'+score+'分';
  document.getElementById('overlay').querySelector('p').textContent='最高纪录：'+highScore+'分';
  document.getElementById('start-btn').textContent='🔄 再来';
  document.getElementById('overlay').style.display='flex';
}

// ─── Render Loop ───────────────────────────────────────────
var loopActive=false;
function loop() {
  requestAnimationFrame(loop);
  try {
    update();
    renderer.render(scene, camera);
  } catch(e) {
    console.error(e);
    document.getElementById('err').textContent='Error: '+e.message;
    document.getElementById('err').style.display='block';
  }
}

// ─── Start ─────────────────────────────────────────────────
function doStart() {
  document.getElementById('overlay').style.display='none';
  document.getElementById('start-btn').textContent='▶ 起飞';
  document.getElementById('err').style.display='none';
  initGame();
  if(!loopActive){loopActive=true;loop();}
}

// ─── Resize ────────────────────────────────────────────────
window.addEventListener('resize',function(){
  var w=window.innerWidth,h=window.innerHeight;
  renderer.setSize(w,h);
  camera.aspect=w/h;
  camera.updateProjectionMatrix();
});

// Boot
initGame();
loopActive=true;
loop();
</script></body></html>
