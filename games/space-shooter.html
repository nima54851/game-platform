<!DOCTYPE html>
<html lang="zh">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>✈️ 3D空战</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Courier New',monospace}
canvas{display:block;position:fixed;inset:0;width:100%;height:100%}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.93);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50;backdrop-filter:blur(6px)}
#overlay h1{font-size:clamp(32px,8vw,56px);color:#ff6600;text-shadow:0 0 30px rgba(255,100,0,.8);margin-bottom:6px;letter-spacing:2px}
#overlay p{color:rgba(255,255,255,.45);margin-bottom:28px;font-size:clamp(12px,3vw,15px);letter-spacing:1px;text-align:center}
#start-btn{background:linear-gradient(135deg,#ff6600,#cc2200);color:#fff;padding:clamp(12px,3vw,16px) clamp(36px,10vw,56px);border:none;border-radius:14px;font-size:clamp(15px,4vw,20px);font-weight:900;cursor:pointer;font-family:'Courier New',monospace;box-shadow:0 0 40px rgba(255,80,0,.5),0 5px 0 #991100;transition:transform .1s,box-shadow .1s}
#start-btn:hover{transform:scale(1.05);box-shadow:0 0 60px rgba(255,80,0,.8),0 5px 0 #991100}
#start-btn:active{transform:scale(.97)}
#err-box{color:#ff4444;font-size:13px;margin-top:14px;text-align:center;max-width:380px;display:none;padding:10px 16px;border:1px solid rgba(255,68,68,.3);border-radius:8px}
#hud{position:fixed;top:0;left:0;right:0;padding:10px 16px;display:flex;justify-content:center;gap:clamp(8px,3vw,20px);z-index:40;pointer-events:none;flex-wrap:wrap}
.hd{background:rgba(0,0,0,.7);border:1px solid rgba(255,100,0,.25);padding:6px 16px;border-radius:8px;text-align:center;min-width:70px;backdrop-filter:blur(4px)}
.hd .v{font-size:clamp(16px,4vw,22px);font-weight:900;color:#ff6600;text-shadow:0 0 10px rgba(255,100,0,.7)}
.hd .l{font-size:9px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:2px}
#hp-wrap{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);width:clamp(160px,50vw,240px);z-index:40;pointer-events:none}
#hp-label{font-size:10px;color:#ff6600;text-align:center;margin-bottom:4px;letter-spacing:2px}
#hp-outer{background:rgba(0,0,0,.7);border:1px solid rgba(255,100,0,.3);border-radius:6px;height:10px;overflow:hidden}
#hp-inner{height:100%;width:100%;border-radius:6px;background:linear-gradient(90deg,#ff2200,#00ff44);transition:width .3s}
#combo-pop{position:fixed;top:60px;left:50%;transform:translateX(-50%);color:#ffcc00;font-size:clamp(14px,3vw,20px);font-weight:900;opacity:0;transition:opacity .3s;text-shadow:0 0 12px #ffcc00;pointer-events:none;z-index:40}
#combo-pop.show{opacity:1}
#ctrl-hint{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.2);font-size:11px;pointer-events:none;z-index:40;letter-spacing:1px}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="overlay">
  <h1>✈️ 3D空战</h1>
  <p>WASD / 方向键 飞行 &nbsp;·&nbsp; 空格 / 点击 射击<br>P 暂停</p>
  <button id="start-btn">▶ 起飞</button>
  <div id="err-box"></div>
</div>

<div id="hud">
  <div class="hd"><div class="v" id="score">0</div><div class="l">得分</div></div>
  <div class="hd"><div class="v" id="kills">0</div><div class="l">击落</div></div>
  <div class="hd"><div class="v" id="wave">1</div><div class="l">波次</div></div>
  <div class="hd"><div class="v" id="hp">100</div><div class="l">生命</div></div>
</div>
<div id="combo-pop"></div>
<div id="hp-wrap"><div id="hp-label">✈ HP</div><div id="hp-outer"><div id="hp-inner"></div></div></div>
<div id="ctrl-hint">WASD/方向键 飞行 · 空格/点击 射击 · P 暂停</div>

<script>
// ═══════════════════════════════════════════════════════════
//  ERROR HANDLER
// ═══════════════════════════════════════════════════════════
var errEl = document.getElementById('err-box');
function showErr(msg) {
  errEl.textContent = '⚠ ' + msg;
  errEl.style.display = 'block';
  console.error(msg);
}
window.onerror = function(msg, src, line) {
  showErr(msg + ' (line ' + line + ')');
  return true;
};

// ═══════════════════════════════════════════════════════════
//  CANVAS SETUP
// ═══════════════════════════════════════════════════════════
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ═══════════════════════════════════════════════════════════
//  MATH HELPERS
// ═══════════════════════════════════════════════════════════
var rnd = Math.random, PI = Math.PI, sin = Math.sin, cos = Math.cos, atan2 = Math.atan2, sqrt = Math.sqrt, floor = Math.floor, abs = Math.abs;
function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }

// ═══════════════════════════════════════════════════════════
//  STARFIELD
// ═══════════════════════════════════════════════════════════
var stars = [];
function buildStars() {
  stars = [];
  for (var i = 0; i < 400; i++) {
    stars.push({
      x: rnd() * W, y: rnd() * H * 0.8,
      r: rnd() * 1.5 + 0.2,
      speed: rnd() * 0.3 + 0.1,
      alpha: rnd(),
      phase: rnd() * PI * 2,
      twinkle: rnd() > 0.6
    });
  }
}
function updateStars() {
  stars.forEach(function(s) {
    s.y += s.speed;
    if (s.y > H) { s.y = 0; s.x = rnd() * W; }
    if (s.twinkle) s.phase += 0.06;
  });
}
function drawStars() {
  stars.forEach(function(s) {
    var a = s.twinkle ? 0.3 + 0.7 * abs(sin(s.phase)) : 0.7;
    ctx.globalAlpha = a;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// ═══════════════════════════════════════════════════════════
//  PLANET EARTH
// ═══════════════════════════════════════════════════════════
function drawPlanetEarth(cx, cy, r, frame) {
  // Atmosphere glow
  var atm = ctx.createRadialGradient(cx, cy, r * 0.9, cx, cy, r * 1.35);
  atm.addColorStop(0, 'rgba(60,120,220,0.0)');
  atm.addColorStop(0.6, 'rgba(60,120,220,0.2)');
  atm.addColorStop(1, 'rgba(60,120,220,0)');
  ctx.fillStyle = atm;
  ctx.beginPath();
  ctx.arc(cx, cy, r * 1.35, 0, PI * 2);
  ctx.fill();

  // Planet disc
  var grd = ctx.createRadialGradient(cx - r * 0.3, cy - r * 0.3, 0, cx, cy, r);
  grd.addColorStop(0, '#4a8adc');
  grd.addColorStop(0.5, '#1a4a7a');
  grd.addColorStop(1, '#0a1a2a');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, PI * 2);
  ctx.fill();

  // Land masses
  var numLand = 8;
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, PI * 2);
  ctx.clip();
  for (var i = 0; i < numLand; i++) {
    var lx = cx + cos(i * 0.9 + frame * 0.0001) * r * 0.6;
    var ly = cy + sin(i * 0.9 + frame * 0.0001) * r * 0.6;
    ctx.fillStyle = i % 2 === 0 ? '#2d7a1a' : '#1a5a10';
    ctx.beginPath();
    ctx.arc(lx, ly, r * 0.25 + rnd() * r * 0.15, 0, PI * 2);
    ctx.fill();
  }
  ctx.restore();

  // City lights on night side
  var nightAngle = frame * 0.001;
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, PI * 2);
  ctx.clip();
  for (var j = 0; j < 30; j++) {
    var a = rnd() * PI * 2;
    var d = rnd() * r * 0.85;
    var nx = cx + cos(a) * d;
    var ny = cy + sin(a) * d;
    // Is on night side?
    var localAngle = atan2(ny - cy, nx - cx);
    if (abs(localAngle - nightAngle) < PI * 0.5 || abs(localAngle - nightAngle + PI * 2) < PI * 0.5) {
      ctx.fillStyle = `rgba(255,240,100,${rnd() * 0.6 + 0.2})`;
      ctx.shadowColor = '#ffaa00';
      ctx.shadowBlur = 6;
      ctx.fillRect(nx - 1.5, ny - 1.5, 3, 3);
    }
  }
  ctx.shadowBlur = 0;
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════
//  SKY DOME GRADIENT
// ═══════════════════════════════════════════════════════════
function drawSky(frame) {
  // Deep space gradient
  var sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#000510');
  sky.addColorStop(0.4, '#000a20');
  sky.addColorStop(0.7, '#001030');
  sky.addColorStop(1, '#001a10');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // Nebula clouds
  var neb = frame % 600;
  ctx.globalAlpha = 0.05 + 0.03 * sin(frame * 0.01);
  var nb = ctx.createRadialGradient(W * 0.3 + sin(neb * 0.01) * 20, H * 0.2, 0, W * 0.3, H * 0.2, 200);
  nb.addColorStop(0, '#4400aa');
  nb.addColorStop(1, 'transparent');
  ctx.fillStyle = nb;
  ctx.fillRect(0, 0, W, H);
  var nb2 = ctx.createRadialGradient(W * 0.7, H * 0.15 + cos(neb * 0.008) * 15, 0, W * 0.7, H * 0.15, 150);
  nb2.addColorStop(0, '#003366');
  nb2.addColorStop(1, 'transparent');
  ctx.fillStyle = nb2;
  ctx.fillRect(0, 0, W, H);
  ctx.globalAlpha = 1;

  // Stars
  drawStars();

  // Planet (top right corner)
  var px = W * 0.85, py = H * 0.18, pr = clamp(W * 0.08, 40, 90);
  drawPlanetEarth(px, py, pr, frame);
}

// ═══════════════════════════════════════════════════════════
//  TERRAIN (pseudo-3D scrolling)
// ═══════════════════════════════════════════════════════════
var terrain = [];
function buildTerrain() {
  terrain = [];
  for (var i = 0; i < 60; i++) {
    terrain.push({
      x: rnd() * W,
      y: H * 0.55 + rnd() * H * 0.4,
      w: 20 + rnd() * 60,
      h: 15 + rnd() * 50,
      color: rnd() > 0.5 ? '#0a1a05' : '#051205',
      speed: 1 + rnd() * 2
    });
  }
}
function updateTerrain() {
  terrain.forEach(function(t) {
    t.y += t.speed;
    if (t.y > H + 10) {
      t.y = H * 0.55 + rnd() * 10;
      t.x = rnd() * W;
    }
  });
}
function drawTerrain() {
  terrain.forEach(function(t) {
    ctx.fillStyle = t.color;
    ctx.beginPath();
    // Mountain silhouette
    ctx.moveTo(t.x, t.y + t.h);
    ctx.lineTo(t.x + t.w * 0.5, t.y);
    ctx.lineTo(t.x + t.w, t.y + t.h);
    ctx.closePath();
    ctx.fill();
  });
  // Ground line
  ctx.strokeStyle = '#00ff44';
  ctx.lineWidth = 2;
  ctx.shadowColor = '#00ff44';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.moveTo(0, H * 0.68);
  ctx.lineTo(W, H * 0.68);
  ctx.stroke();
  ctx.shadowBlur = 0;
}

// ═══════════════════════════════════════════════════════════
//  ENGINE EXHAUST TRAIL
// ═══════════════════════════════════════════════════════════
var exhaustParticles = [];
function emitExhaust(x, y, color) {
  for (var i = 0; i < 3; i++) {
    exhaustParticles.push({
      x: x + (rnd() - 0.5) * 6,
      y: y,
      vx: (rnd() - 0.5) * 0.8,
      vy: 2 + rnd() * 3,
      r: 3 + rnd() * 5,
      life: 1,
      decay: 0.04 + rnd() * 0.04,
      color: color
    });
  }
}
function updateExhaust() {
  exhaustParticles.forEach(function(p) {
    p.x += p.vx; p.y += p.vy;
    p.r *= 0.94;
    p.life -= p.decay;
  });
  exhaustParticles = exhaustParticles.filter(function(p) { return p.life > 0; });
}
function drawExhaust() {
  exhaustParticles.forEach(function(p) {
    ctx.globalAlpha = p.life * 0.8;
    var grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
    grd.addColorStop(0, p.color);
    grd.addColorStop(1, 'transparent');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// ═══════════════════════════════════════════════════════════
//  FIGHTER JET DRAW
// ═══════════════════════════════════════════════════════════
function drawFighterJet(x, y, tilt, isPlayer, frame) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(tilt * 0.4);

  // Engine exhaust glow
  var exGlow = ctx.createRadialGradient(0, 18, 0, 0, 18, 20);
  exGlow.addColorStop(0, 'rgba(255,150,0,0.8)');
  exGlow.addColorStop(0.5, 'rgba(255,80,0,0.3)');
  exGlow.addColorStop(1, 'transparent');
  ctx.fillStyle = exGlow;
  ctx.beginPath();
  ctx.arc(0, 18, 20, 0, PI * 2);
  ctx.fill();

  // Engine nozzle pulse
  var pulse = 8 + 4 * sin(frame * 0.3);
  ctx.fillStyle = '#ff8800';
  ctx.shadowColor = '#ff6600';
  ctx.shadowBlur = 15;
  ctx.beginPath();
  ctx.ellipse(0, 14, 6, pulse * 0.5, 0, 0, PI * 2);
  ctx.fill();

  // Fuselage
  ctx.fillStyle = isPlayer ? '#3a6ab5' : '#882222';
  ctx.shadowBlur = 0;
  ctx.beginPath();
  ctx.moveTo(0, -32);  // nose tip
  ctx.lineTo(8, -10);
  ctx.lineTo(9, 12);
  ctx.lineTo(5, 16);
  ctx.lineTo(-5, 16);
  ctx.lineTo(-9, 12);
  ctx.lineTo(-8, -10);
  ctx.closePath();
  ctx.fill();

  // Wings
  ctx.fillStyle = isPlayer ? '#224488' : '#551111';
  ctx.beginPath();
  ctx.moveTo(-7, 0);
  ctx.lineTo(-32, 6);
  ctx.lineTo(-30, 12);
  ctx.lineTo(-7, 8);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(7, 0);
  ctx.lineTo(32, 6);
  ctx.lineTo(30, 12);
  ctx.lineTo(7, 8);
  ctx.closePath();
  ctx.fill();

  // Tail fins
  ctx.fillStyle = isPlayer ? '#224488' : '#551111';
  ctx.beginPath();
  ctx.moveTo(-4, 12);
  ctx.lineTo(-5, 20);
  ctx.lineTo(0, 16);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(4, 12);
  ctx.lineTo(5, 20);
  ctx.lineTo(0, 16);
  ctx.closePath();
  ctx.fill();

  // Cockpit
  ctx.fillStyle = isPlayer ? 'rgba(100,200,255,0.85)' : 'rgba(100,100,200,0.7)';
  ctx.beginPath();
  ctx.ellipse(0, -15, 5, 9, 0, 0, PI * 2);
  ctx.fill();

  // Cockpit highlight
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.beginPath();
  ctx.ellipse(-1, -18, 2, 4, -0.3, 0, PI * 2);
  ctx.fill();

  // Wing tip missiles
  ctx.fillStyle = '#556677';
  ctx.fillRect(-33, 4, 8, 3);
  ctx.fillRect(25, 4, 8, 3);

  // Gun barrels
  ctx.fillStyle = '#222';
  ctx.fillRect(-8, -33, 4, 8);
  ctx.fillRect(4, -33, 4, 8);

  ctx.restore();

  // Emit exhaust particles
  var screenX = x + Math.sin(tilt * 0.4) * 0; // rough approximation
  if (isPlayer && frame % 2 === 0) {
    emitExhaust(x, y + 16, '#ff6600');
    emitExhaust(x - 10, y + 14, '#ff4400');
    emitExhaust(x + 10, y + 14, '#ff4400');
  }
}

// ═══════════════════════════════════════════════════════════
//  BULLET DRAW
// ═══════════════════════════════════════════════════════════
function drawBullet(b) {
  ctx.globalAlpha = 0.95;
  ctx.fillStyle = b.color;
  ctx.shadowColor = b.color;
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.ellipse(b.x, b.y, 4, 10, 0, 0, PI * 2);
  ctx.fill();
  // Inner glow
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.ellipse(b.x, b.y - 2, 2, 5, 0, 0, PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;
}

// ═══════════════════════════════════════════════════════════
//  EXPLOSION PARTICLES
// ═══════════════════════════════════════════════════════════
var explosions = [];
function spawnExplosion(x, y, color, count, frame) {
  count = count || 25;
  var parts = [];
  for (var i = 0; i < count; i++) {
    var a = rnd() * PI * 2;
    var sp = 2 + rnd() * 8;
    parts.push({
      x: x, y: y,
      vx: cos(a) * sp,
      vy: sin(a) * sp - 1,
      r: 3 + rnd() * 7,
      life: 1,
      decay: 0.025 + rnd() * 0.035,
      color: color,
      spark: rnd() > 0.6
    });
  }
  explosions.push({ parts: parts, frame: frame, age: 0 });
}
function updateExplosions() {
  explosions.forEach(function(e) {
    e.age++;
    e.parts.forEach(function(p) {
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.06;
      p.vx *= 0.97;
      p.life -= p.decay;
    });
    e.parts = e.parts.filter(function(p) { return p.life > 0; });
  });
  explosions = explosions.filter(function(e) { return e.parts.length > 0; });
}
function drawExplosions() {
  explosions.forEach(function(e) {
    e.parts.forEach(function(p) {
      ctx.globalAlpha = p.life;
      if (p.spark) {
        ctx.strokeStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 8;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(p.x - p.vx * 2, p.y - p.vy * 2);
        ctx.stroke();
      } else {
        var grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * p.life);
        grd.addColorStop(0, p.color);
        grd.addColorStop(1, 'transparent');
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * p.life, 0, PI * 2);
        ctx.fill();
      }
    });
  });
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
}

// ═══════════════════════════════════════════════════════════
//  DAMAGE NUMBERS
// ═══════════════════════════════════════════════════════════
var dmgNums = [];
function spawnDmg(x, y, text, color) {
  dmgNums.push({ x: x, y: y, vy: -2, text: text, color: color || '#ff4444', life: 1, decay: 0.02 });
}
function updateDmg() {
  dmgNums.forEach(function(d) { d.y += d.vy; d.life -= d.decay; });
  dmgNums = dmgNums.filter(function(d) { return d.life > 0; });
}
function drawDmg() {
  dmgNums.forEach(function(d) {
    ctx.globalAlpha = d.life;
    ctx.fillStyle = d.color;
    ctx.shadowColor = d.color;
    ctx.shadowBlur = 8;
    ctx.font = 'bold 18px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText(d.text, d.x, d.y);
  });
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
}

// ═══════════════════════════════════════════════════════════
//  POWERUP DRAW
// ═══════════════════════════════════════════════════════════
var powerups = [];
function spawnPowerUp(x, y) {
  var kinds = ['shield', 'boost', 'nuke'];
  var kind = kinds[floor(rnd() * 3)];
  var colors = { shield: '#00ffcc', boost: '#ffcc00', nuke: '#ff4444' };
  powerups.push({ x: x, y: y, vy: 1.5, kind: kind, color: colors[kind], age: 0, angle: 0 });
}
function updatePowerUps() {
  powerups.forEach(function(p) {
    p.y += p.vy;
    p.age++;
    p.angle += 0.1;
  });
  powerups = powerups.filter(function(p) { return p.y < H + 20; });
}
function drawPowerUps() {
  powerups.forEach(function(p) {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.angle);

    // Glow
    var grd = ctx.createRadialGradient(0, 0, 0, 0, 0, 22);
    grd.addColorStop(0, p.color);
    grd.addColorStop(1, 'transparent');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(0, 0, 22, 0, PI * 2);
    ctx.fill();

    // Icon
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 12;
    ctx.font = 'bold 16px Courier New';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    var icons = { shield: '🛡', boost: '⚡', nuke: '💥' };
    ctx.fillText(icons[p.kind], 0, 0);

    ctx.restore();
  });
  ctx.shadowBlur = 0;
}

// ═══════════════════════════════════════════════════════════
//  PLAYER
// ═══════════════════════════════════════════════════════════
var player = {
  x: 0, y: 0, vx: 0, vy: 0,
  hp: 100, maxHP: 100,
  shield: false, boostTimer: 0,
  invincible: 0, combo: 0, comboTimer: 0,
  tilt: 0, flashTimer: 0
};

function updatePlayer() {
  var acc = 0.25;
  if (keys['KeyW'] || keys['ArrowUp'])    player.vy += acc;
  if (keys['KeyS'] || keys['ArrowDown'])  player.vy -= acc;
  if (keys['KeyA'] || keys['ArrowLeft'])  player.vx -= acc;
  if (keys['KeyD'] || keys['ArrowRight']) player.vx += acc;
  if (keys['ShiftLeft'])                  player.vy += acc * 0.5;

  player.vx *= 0.88;
  player.vy *= 0.88;
  if (player.boostTimer > 0) { player.vy += 0.2; player.boostTimer--; }

  player.x = clamp(player.x + player.vx, 40, W - 40);
  player.y = clamp(player.y + player.vy, H * 0.1, H * 0.75);

  // Tilt based on horizontal movement
  player.tilt = lerp(player.tilt, player.vx * 0.5, 0.15);

  if (player.invincible > 0) player.invincible--;
  if (player.comboTimer > 0) {
    player.comboTimer--;
    if (player.comboTimer === 0) player.combo = 0;
  }
  if (player.flashTimer > 0) player.flashTimer--;
}

function drawPlayer(frame) {
  if (player.invincible > 0 && player.flashTimer % 8 < 4) return;
  drawFighterJet(player.x, player.y, player.tilt, true, frame);

  // Shield ring
  if (player.shield) {
    ctx.strokeStyle = 'rgba(0,255,200,0.5)';
    ctx.lineWidth = 2;
    ctx.shadowColor = '#00ffcc';
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.arc(player.x, player.y, 30, 0, PI * 2);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }
}

// ═══════════════════════════════════════════════════════════
//  ENEMY
// ═══════════════════════════════════════════════════════════
var enemies = [];
function spawnEnemy(wave) {
  var types = [
    { c1: '#00ccff', c2: '#0088cc', speed: 1.2, hp: 2, score: 100, fireRate: 80, size: 0.9 },
    { c1: '#ffcc00', c2: '#cc8800', speed: 1.0, hp: 3, score: 200, fireRate: 60, size: 1.0 },
    { c1: '#ff4444', c2: '#aa2222', speed: 0.8, hp: 5, score: 300, fireRate: 40, size: 1.2 }
  ];
  var t = types[floor(rnd() * 3)];
  t.hp += floor(wave * 0.4);
  enemies.push({
    x: 50 + rnd() * (W - 100),
    y: -60 - rnd() * 60,
    hp: t.hp, maxHp: t.hp,
    c1: t.c1, c2: t.c2,
    speed: t.speed + wave * 0.06,
    score: t.score,
    fireRate: Math.max(30, t.fireRate - wave * 5),
    size: t.size,
    shootTimer: floor(rnd() * t.fireRate),
    angle: 0,
    wobble: rnd() * PI * 2
  });
}

function updateEnemies(frame) {
  enemies.forEach(function(e) {
    e.y += e.speed;
    e.wobble += 0.06;
    e.x += sin(e.wobble) * 0.8;
    e.shootTimer--;

    // Shoot at player
    if (e.shootTimer <= 0 && e.y > 0 && e.y < H * 0.7) {
      var dx = player.x - e.x, dy = player.y - e.y;
      var len = sqrt(dx * dx + dy * dy);
      pBullets.push({ // enemy bullet
        x: e.x, y: e.y + 20,
        vx: dx / len * 5, vy: dy / len * 5,
        color: '#ff4400', friendly: false
      });
      e.shootTimer = e.fireRate + floor(rnd() * e.fireRate * 0.5);
    }
  });
  // Remove off-screen
  enemies = enemies.filter(function(e) { return e.y < H + 60; });
}

function drawEnemies(frame) {
  enemies.forEach(function(e) {
    var tilt = sin(e.wobble) * 0.15;
    drawFighterJet(e.x, e.y, tilt, false, frame);

    // HP bar
    if (e.hp < e.maxHp) {
      var bw = 30 * e.size;
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(e.x - bw / 2, e.y - 35, bw, 5);
      ctx.fillStyle = e.c1;
      ctx.fillRect(e.x - bw / 2, e.y - 35, bw * (e.hp / e.maxHp), 5);
    }
  });
}

// ═══════════════════════════════════════════════════════════
//  BULLETS
// ═══════════════════════════════════════════════════════════
var pBullets = []; // { x, y, vx, vy, color, friendly }
var shootCooldown = 0;

function doShoot(frame) {
  if (shootCooldown > 0) return;
  shootCooldown = 8;
  [-10, 10].forEach(function(offset) {
    pBullets.push({
      x: player.x + offset, y: player.y - 20,
      vx: 0, vy: -10,
      color: '#00ffff', friendly: true
    });
  });
  // Muzzle flash
  spawnExplosion(player.x, player.y - 22, '#00ffff', 6, frame);
}

function updateBullets() {
  pBullets.forEach(function(b) {
    b.x += b.vx; b.y += b.vy;
  });
  pBullets = pBullets.filter(function(b) {
    return b.x > -10 && b.x < W + 10 && b.y > -10 && b.y < H + 10;
  });
  if (shootCooldown > 0) shootCooldown--;
}

function drawBullets() {
  pBullets.forEach(function(b) {
    drawBullet(b);
  });
}

// ═══════════════════════════════════════════════════════════
//  COLLISION
// ═══════════════════════════════════════════════════════════
function checkCollisions(frame) {
  // Player bullets vs enemies
  for (var bi = pBullets.length - 1; bi >= 0; bi--) {
    var b = pBullets[bi];
    if (!b.friendly) continue;
    for (var ei = enemies.length - 1; ei >= 0; ei--) {
      var e = enemies[ei];
      var dx = b.x - e.x, dy = b.y - e.y;
      if (sqrt(dx * dx + dy * dy) < 25 * e.size) {
        spawnExplosion(b.x, b.y, e.c1, 12, frame);
        pBullets.splice(bi, 1);
        e.hp--;
        if (e.hp <= 0) {
          spawnExplosion(e.x, e.y, e.c1, 35, frame);
          spawnDmg(e.x, e.y - 20, '+' + e.score, '#ffcc00');
          score += e.score * Math.max(1, player.combo);
          kills++;
          if (rnd() < 0.22) spawnPowerUp(e.x, e.y);
          enemies.splice(ei, 1);
          player.combo++;
          player.comboTimer = 120;
          if (score > highScore) {
            highScore = score;
            localStorage.setItem('ss_hs', highScore);
          }
        }
        break;
      }
    }
  }

  // Enemy bullets vs player
  for (var k = pBullets.length - 1; k >= 0; k--) {
    var eb = pBullets[k];
    if (eb.friendly) continue;
    var dp = sqrt((eb.x - player.x) * (eb.x - player.x) + (eb.y - player.y) * (eb.y - player.y));
    if (dp < 22) {
      if (!player.shield && player.invincible === 0) {
        player.hp = Math.max(0, player.hp - 10);
        player.invincible = 40;
        player.flashTimer = 40;
        spawnExplosion(eb.x, eb.y, '#ff4400', 10, frame);
        pBullets.splice(k, 1);
        if (player.hp <= 0) { gameOver = true; spawnExplosion(player.x, player.y, '#ff6600', 50, frame); setTimeout(showOver, 600); }
      } else if (player.shield) {
        pBullets.splice(k, 1);
      }
    }
  }

  // Enemies vs player
  for (var m = enemies.length - 1; m >= 0; m--) {
    var em = enemies[m];
    var dm = sqrt((em.x - player.x) * (em.x - player.x) + (em.y - player.y) * (em.y - player.y));
    if (dm < 28 * em.size) {
      if (!player.shield && player.invincible === 0) {
        player.hp = Math.max(0, player.hp - 25);
        player.invincible = 50;
        player.flashTimer = 50;
        spawnExplosion(em.x, em.y, '#ff8800', 25, frame);
        enemies.splice(m, 1);
        if (player.hp <= 0) { gameOver = true; spawnExplosion(player.x, player.y, '#ff6600', 50, frame); setTimeout(showOver, 600); }
      } else if (player.shield) {
        spawnExplosion(em.x, em.y, '#00ffcc', 20, frame);
        enemies.splice(m, 1);
      }
    }
  }

  // Powerups vs player
  for (var pi = powerups.length - 1; pi >= 0; pi--) {
    var pu = powerups[pi];
    var pp = sqrt((pu.x - player.x) * (pu.x - player.x) + (pu.y - player.y) * (pu.y - player.y));
    if (pp < 30) {
      if (pu.kind === 'shield') player.shield = true;
      if (pu.kind === 'boost') { player.boostTimer = 180; player.invincible = Math.max(player.invincible, 100); }
      if (pu.kind === 'nuke') {
        enemies.forEach(function(e2) { spawnExplosion(e2.x, e2.y, '#ff4444', 22, frame); score += e2.score; });
        enemies = [];
        spawnExplosion(player.x, player.y, '#ff0000', 60, frame);
      }
      powerups.splice(pi, 1);
    }
  }
}

// ═══════════════════════════════════════════════════════════
//  HUD
// ═══════════════════════════════════════════════════════════
function updateHUD() {
  document.getElementById('score').textContent = score;
  document.getElementById('kills').textContent = kills;
  document.getElementById('wave').textContent = wave;
  document.getElementById('hp').textContent = Math.max(0, player.hp);
  document.getElementById('hp-inner').style.width = Math.max(0, player.hp / player.maxHP * 100) + '%';

  var comboEl = document.getElementById('combo-pop');
  if (player.combo >= 3) {
    comboEl.textContent = '🔥 ' + player.combo + '连击!';
    comboEl.classList.add('show');
  } else {
    comboEl.classList.remove('show');
  }
}

// ═══════════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════════
var score = 0, kills = 0, wave = 1, frame = 0, gameOver = false, paused = false;
var highScore = parseInt(localStorage.getItem('ss_hs') || '0');
var started = false;
var keys = {};

// ═══════════════════════════════════════════════════════════
//  CONTROLS
// ═══════════════════════════════════════════════════════════
document.addEventListener('keydown', function(e) {
  keys[e.code] = true;
  if (e.code === 'Space') {
    e.preventDefault();
    if (started && !gameOver && !paused) doShoot(frame);
  }
  if (e.code === 'KeyP' && started) paused = !paused;
});
document.addEventListener('keyup', function(e) { keys[e.code] = false; });
document.addEventListener('click', function() {
  if (started && !gameOver && !paused) doShoot(frame);
});

function showOver() {
  var ov = document.getElementById('overlay');
  ov.querySelector('h1').textContent = '💥 被击落！' + score + '分';
  ov.querySelector('p').textContent = '最高纪录：' + highScore + '分  ·  重新开始';
  document.getElementById('start-btn').textContent = '🔄 再来';
  ov.style.display = 'flex';
  started = false;
}

function resetGame() {
  player.x = W / 2;
  player.y = H * 0.6;
  player.vx = 0; player.vy = 0;
  player.hp = 100; player.shield = false;
  player.boostTimer = 0; player.invincible = 0;
  player.combo = 0; player.comboTimer = 0;
  player.tilt = 0; player.flashTimer = 0;
  enemies = []; pBullets = []; powerups = [];
  explosions = []; dmgNums = []; exhaustParticles = [];
  score = 0; kills = 0; wave = 1; frame = 0;
  gameOver = false; paused = false;
  updateHUD();
}

// ═══════════════════════════════════════════════════════════
//  START BUTTON
// ═══════════════════════════════════════════════════════════
document.getElementById('start-btn').addEventListener('click', function() {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('err-box').style.display = 'none';
  resetGame();
  started = true;
  player.x = W / 2;
  player.y = H * 0.6;
});

// ═══════════════════════════════════════════════════════════
//  INIT SCENE
// ═══════════════════════════════════════════════════════════
function initScene() {
  buildStars();
  buildTerrain();
  player.x = W / 2;
  player.y = H * 0.6;
}

// ═══════════════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════════════
function loop() {
  requestAnimationFrame(loop);
  frame++;

  // Always draw background
  drawSky(frame);
  updateStars();
  drawTerrain();
  updateTerrain();

  // Draw exhaust trail
  drawExhaust();
  updateExhaust();

  if (started && !gameOver && !paused) {
    // Spawn enemies
    var spawnRate = Math.max(50, 100 - wave * 6);
    if (frame % spawnRate === 0 && enemies.length < 5 + wave * 2) spawnEnemy(wave);
    if (frame % 600 === 0) wave++;

    updatePlayer();
    updateEnemies(frame);
    updateBullets();
    checkCollisions(frame);
    updateExplosions();
    updateDmg();
    updatePowerUps();
    updateHUD();
  }

  // Draw game objects
  if (started || gameOver) {
    enemies.forEach(function(e) { drawFighterJet(e.x, e.y, sin(e.wobble) * 0.15, false, frame); });
    drawBullets();
    drawPlayer(frame);
    drawPowerUps();
    drawExplosions();
    drawDmg();
  }

  // Pause overlay
  if (paused && started) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 32px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('⏸ 暂停  —  按 P 继续', W / 2, H / 2);
  }
}

// ═══════════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════════
initScene();
loop();

</script>
