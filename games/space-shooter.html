// ═══════════════════════════════════════════════════════════
//  ENTITY CLASSES
// ═══════════════════════════════════════════════════════════

class Entity {
  constructor(mesh) {
    this.mesh = mesh;
    this.active = true;
    this.age = 0;
  }
  tick() { this.age++; }
  remove() { this.active = false; if(this.mesh.parent) this.mesh.parent.remove(this.mesh); }
}

class Player extends Entity {
  constructor(scene) {
    super(buildPlane(0x3355aa, 0x224488, true));
    this.scene = scene;
    this.vx = 0; this.vy = 0; this.vz = 0;
    this.roll = 0; this.pitch = 0;
    this.maxHP = 100; this.hp = 100;
    this.shield = false; this.boostTimer = 0;
    this.invincible = false; this.invincibleTimer = 0;
    this.flicker = 0;
    this.mesh.castShadow = true;
    scene.add(this.mesh);
  }

  tick() {
    super.tick();
    this.mesh.position.x += this.vx;
    this.mesh.position.y = Math.max(-8, Math.min(12, this.mesh.position.y + this.vy));
    this.mesh.position.z += this.vz;
    this.mesh.position.x = Math.max(-30, Math.min(30, this.mesh.position.x));
    this.roll += ((-this.vx * 0.08) - this.roll) * 0.1;
    this.pitch += (this.vz * 0.04 - this.pitch) * 0.1;
    this.mesh.rotation.z = this.roll;
    this.mesh.rotation.x = this.pitch;
    if (this.invincibleTimer > 0) {
      this.invincibleTimer--;
      this.flicker = Math.floor(this.invincibleTimer / 4) % 2;
      if (this.invincibleTimer === 0) { this.invincible = false; this.flicker = 0; this.mesh.visible = true; }
      else this.mesh.visible = this.flicker === 0;
    }
  }

  hit(dmg) {
    if (this.shield) { this.shield = false; return false; }
    if (this.invincible) return false;
    this.hp -= dmg;
    this.invincible = true;
    this.invincibleTimer = 90;
    return this.hp <= 0;
  }

  giveShield() { this.shield = true; }
  giveBoost() { this.boostTimer = 180; this.invincible = true; this.invincibleTimer = 180; }

  get hpRatio() { return Math.max(0, this.hp / this.maxHP); }
}

class Enemy extends Entity {
  constructor(scene, type, wave) {
    const configs = [
      { speed: 0.06, hp: 2, score: 100, fireRate: 120, scale: 0.8, color1: 0xcc2222, color2: 0x881111 },
      { speed: 0.08, hp: 3, score: 200, fireRate: 80, scale: 1.0, color1: 0x884400, color2: 0x552200 },
      { speed: 0.1,  hp: 5, score: 300, fireRate: 50, scale: 1.3, color1: 0x440088, color2: 0x220055 },
    ];
    const cfg = configs[type % 3];
    super(buildPlane(cfg.color1, cfg.color2, false));
    this.scene = scene;
    this.cfg = cfg;
    this.cfg.hp += Math.floor(wave * 0.3);
    this.maxHP = this.cfg.hp;
    this.shootTimer = Math.random() * cfg.fireRate;
    this.enginePhase = Math.random() * Math.PI * 2;
    this.mesh.scale.setScalar(cfg.scale);
    this.mesh.rotation.y = Math.PI;
    scene.add(this.mesh);
  }

  tick(playerPos, spawnZ = -120) {
    super.tick();
    const spd = this.cfg.speed + Math.floor(gameWave * 0.005);
    this.mesh.position.z += spd;
    if (playerPos) {
      this.mesh.position.x += (playerPos.x - this.mesh.position.x) * 0.008;
      this.mesh.position.y += (playerPos.y - this.mesh.position.y) * 0.005;
    }
    this.shootTimer--;
    this.enginePhase += 0.05;
    if (this.mesh.position.z > 20) this.remove();
  }

  get canShoot() { return this.shootTimer <= 0; }
  doShoot(fireRate) { this.shootTimer = fireRate + Math.random() * fireRate; }
}

class Bullet extends Entity {
  constructor(scene, x, y, z, vx, vy, vz, color, size = 0.12, life = 80) {
    const geo = new THREE.SphereGeometry(size, 6, 6);
    const mat = new THREE.MeshBasicMaterial({ color });
    super(new THREE.Mesh(geo, mat));
    this.scene = scene;
    this.vx = vx; this.vy = vy; this.vz = vz;
    this.life = life; this.maxLife = life;
    this.mesh.position.set(x, y, z);
    scene.add(this.mesh);
  }

  tick() {
    super.tick();
    this.mesh.position.x += this.vx;
    this.mesh.position.y += this.vy;
    this.mesh.position.z += this.vz;
    this.life--;
    if (this.life <= 0 || this.mesh.position.z < -120 || this.mesh.position.z > 30) this.remove();
  }

  distanceTo(pos) { return Math.sqrt((this.mesh.position.x-pos.x)**2+(this.mesh.position.y-pos.y)**2+(this.mesh.position.z-pos.z)**2); }
}

class PowerUp extends Entity {
  constructor(scene, x, y, z, kind) {
    const geo = new THREE.OctahedronGeometry(0.5, 0);
    const colors = { shield: 0x00ffcc, boost: 0xffcc00, nuke: 0xff4444 };
    const mat = new THREE.MeshBasicMaterial({ color: colors[kind] || 0xffffff, wireframe: true });
    super(new THREE.Mesh(geo, mat));
    this.scene = scene;
    this.kind = kind;
    this.mesh.position.set(x, y, z);
    this.vz = 0.1;
    this.rotSpeed = 0.1;
    scene.add(this.mesh);
  }

  tick() {
    super.tick();
    this.mesh.position.z += this.vz;
    this.mesh.rotation.y += this.rotSpeed;
    this.mesh.rotation.x += this.rotSpeed * 0.5;
    if (this.mesh.position.z > 15) this.remove();
  }

  distanceTo(pos) { return Math.sqrt((this.mesh.position.x-pos.x)**2+(this.mesh.position.y-pos.y)**2+(this.mesh.position.z-pos.z)**2); }
}

// ═══════════════════════════════════════════════════════════
//  PARTICLE SYSTEM
// ═══════════════════════════════════════════════════════════
class Particle {
  constructor(scene, x, y, z, vx, vy, vz, color, size = 0.15, life = 40, isDebris = false) {
    const geo = isDebris
      ? new THREE.BoxGeometry(size, size, size * 2)
      : new THREE.SphereGeometry(size, 6, 6);
    const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1 });
    this.mesh = new THREE.Mesh(geo, mat);
    this.scene = scene;
    this.vx = vx; this.vy = vy; this.vz = vz;
    this.life = life; this.maxLife = life;
    this.isDebris = isDebris;
    this.mesh.position.set(x, y, z);
    if (isDebris) { this.rotX = (Math.random() - 0.5) * 0.3; this.rotY = (Math.random() - 0.5) * 0.3; }
    scene.add(this.mesh);
    this.active = true;
  }

  tick() {
    this.mesh.position.x += this.vx;
    this.mesh.position.y += this.vy;
    this.mesh.position.z += this.vz;
    if (this.isDebris) { this.mesh.rotation.x += this.rotX; this.mesh.rotation.y += this.rotY; }
    this.vy -= 0.02;
    this.life--;
    this.mesh.material.opacity = this.life / this.maxLife;
    if (this.life <= 0) { this.remove(); }
  }

  remove() { this.active = false; if (this.mesh.parent) this.mesh.parent.remove(this.mesh); }
}

function explode(scene, x, y, z, color, count = 20, spread = 3) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2, b = (Math.random() - 0.5) * Math.PI;
    const sp = spread * (0.5 + Math.random());
    particles.push(new Particle(
      scene, x, y, z,
      Math.cos(a) * Math.cos(b) * sp, Math.sin(b) * sp, Math.sin(a) * Math.cos(b) * sp,
      color, 0.08 + Math.random() * 0.25, 25 + Math.random() * 20
    ));
  }
  for (let i = 0; i < 5; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = spread * (0.5 + Math.random());
    particles.push(new Particle(
      scene, x, y, z,
      Math.cos(a) * sp, (Math.random() - 0.5) * sp, Math.sin(a) * sp,
      0x333333, 0.2, 15 + Math.random() * 10, true
    ));
  }
  const flash = new THREE.PointLight(color, 20, 20);
  flash.position.set(x, y, z);
  scene.add(flash);
  setTimeout(() => scene.remove(flash), 100);
}

const W = window.innerWidth, H = window.innerHeight;
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(Math.min(W, H * 16 / 9), Math.min(H, W * 9 / 16));
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x001122, 0.008);

const camera = new THREE.PerspectiveCamera(65, 16 / 9, 0.1, 800);
const ASP = Math.min(W, H * 16 / 9), AHT = Math.min(H, W * 9 / 16);
camera.aspect = 16 / 9; camera.updateProjectionMatrix();

// Lights
const ambient = new THREE.AmbientLight(0x112244, 1.5);
scene.add(ambient);
const sunLight = new THREE.DirectionalLight(0xffffff, 2);
sunLight.position.set(50, 100, 50);
sunLight.castShadow = true; sunLight.shadow.mapSize.set(1024, 1024);
scene.add(sunLight);
const rimLight = new THREE.DirectionalLight(0x0066ff, 0.8);
rimLight.position.set(-30, 20, -50);
scene.add(rimLight);

// Sky sphere
const skyGeo = new THREE.SphereGeometry(400, 32, 32);
const skyMat = new THREE.MeshBasicMaterial({ color: 0x000510, side: THREE.BackSide });
scene.add(new THREE.Mesh(skyGeo, skyMat));

// Stars
const starGeo = new THREE.BufferGeometry();
const starVerts = [];

  const phi = Math.acos(2 * Math.random() - 1), theta = 2 * Math.PI * Math.random();
  starVerts.push(300 * Math.sin(phi) * Math.cos(theta), 300 * Math.cos(phi), 300 * Math.sin(phi) * Math.sin(theta));
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.8, sizeAttenuation: true })));

// Clouds
const cloudMat = new THREE.MeshPhongMaterial({ color: 0xaabbcc, transparent: true, opacity: 0.25, depthWrite: false });
const cloudGroup = new THREE.Group();
for (let i = 0; i < 25; i++) {
  const cg = new THREE.SphereGeometry(10 + Math.random() * 20, 8, 6);
  const cm = new THREE.Mesh(cg, cloudMat.clone());
  cm.position.set((Math.random() - 0.5) * 300, 20 + (Math.random() - 0.5) * 60, (Math.random() - 0.5) * 300);
  cloudGroup.add(cm);
}
scene.add(cloudGroup);

// Ground
const gGeo = new THREE.PlaneGeometry(600, 600, 30, 30);
const gMat = new THREE.MeshPhongMaterial({ color: 0x0a1a0a, shininess: 5 });
const ground = new THREE.Mesh(gGeo, gMat);
ground.rotation.x = -Math.PI / 2; ground.position.y = -50; ground.receiveShadow = true;
scene.add(ground);
const grid = new THREE.GridHelper(400, 40, 0x00ff44, 0.05);
grid.position.y = -49.9; grid.material.opacity = 0.1; grid.material.transparent = true;
scene.add(grid);

// Mountains
for (let i = 0; i < 12; i++) {
  const mGeo = new THREE.ConeGeometry(15 + Math.random() * 25, 30 + Math.random() * 40, 5);
  const mMat = new THREE.MeshPhongMaterial({ color: 0x0a0a1a });
  const m = new THREE.Mesh(mGeo, mMat);
  m.position.set((Math.random() - 0.5) * 500, -20, (Math.random() - 0.5) * 500 - 100);
  scene.add(m);
}

// City skyline (buildings on ground)
for (let i = 0; i < 30; i++) {
  const bGeo = new THREE.BoxGeometry(3 + Math.random() * 8, 5 + Math.random() * 25, 3 + Math.random() * 8);
  const bMat = new THREE.MeshPhongMaterial({ color: 0x0a0a1a });
  const b = new THREE.Mesh(bGeo, bMat);
  b.position.set((Math.random() - 0.5) * 400, -50 + (5 + Math.random() * 25) / 2, (Math.random() - 0.5) * 400 - 80);
  scene.add(b);

// 3D Plane model builder
function buildPlane(color1, color2, isPlayer) {
  const g = new THREE.Group();
  const fMat = new THREE.MeshPhongMaterial({ color: color1, shininess: 80, specular: new THREE.Color(isPlayer ? 0xffffff : 0x888888) });
  const wMat = new THREE.MeshPhongMaterial({ color: color2, shininess: 50 });

  // Fuselage
  const fGeo = new THREE.CylinderGeometry(0.22, 0.18, 3.2, 12); fGeo.rotateX(Math.PI / 2);
  const fuselage = new THREE.Mesh(fGeo, fMat); fuselage.castShadow = true; g.add(fuselage);

  // Nose
  const nGeo = new THREE.ConeGeometry(0.18, 0.7, 10); nGeo.rotateX(-Math.PI / 2);
  const nose = new THREE.Mesh(nGeo, fMat); nose.position.z = -1.7; nose.castShadow = true; g.add(nose);

  // Cockpit
  const cGeo = new THREE.SphereGeometry(0.2, 8, 6, 0, Math.PI * 2, 0, Math.PI / 2);
  const cMat = new THREE.MeshPhongMaterial({ color: isPlayer ? 0x4488ff : 0x334455, transparent: true, opacity: 0.7, shininess: 200 });
  const cockpit = new THREE.Mesh(cGeo, cMat); cockpit.position.set(0, 0.18, -0.5); g.add(cockpit);

  // Wings
  const wGeo = new THREE.BoxGeometry(5, 0.06, 0.9);
  const wings = new THREE.Mesh(wGeo, wMat); wings.castShadow = true; g.add(wings);

  // Wing tips
  const wtGeo = new THREE.BoxGeometry(0.6, 0.05, 0.4);
  g.add(Object.assign(new THREE.Mesh(wtGeo, wMat), { position: new THREE.Vector3(-2.7, 0.12, -0.1) }));
  g.add(Object.assign(new THREE.Mesh(wtGeo, wMat), { position: new THREE.Vector3(2.7, 0.12, -0.1) }));

  // Tail fin
  const tfGeo = new THREE.BoxGeometry(0.06, 1.0, 0.6);
  const tailFin = new THREE.Mesh(tfGeo, wMat); tailFin.position.set(0, 0.5, 1.2); tailFin.castShadow = true; g.add(tailFin);

  // Stabilizers
  const hsGeo = new THREE.BoxGeometry(1.8, 0.05, 0.5);
  g.add(Object.assign(new THREE.Mesh(hsGeo, wMat), { position: new THREE.Vector3(0, 0, 1.3) }));

  // Engine nacelles
  const eGeo = new THREE.CylinderGeometry(0.18, 0.18, 1.2, 10); eGeo.rotateX(Math.PI / 2);
  const eMat = new THREE.MeshPhongMaterial({ color: 0x223344, shininess: 80 });
  g.add(Object.assign(new THREE.Mesh(eGeo, eMat), { position: new THREE.Vector3(-1.5, -0.18, -0.2) }));
  g.add(Object.assign(new THREE.Mesh(eGeo, eMat), { position: new THREE.Vector3(1.5, -0.18, -0.2) }));

  // Engine glow
  const egMat = new THREE.MeshBasicMaterial({ color: isPlayer ? 0xff6600 : 0xff4400 });
  const igMat = new THREE.MeshBasicMaterial({ color: 0xffcc00, side: THREE.DoubleSide });
  g.add(Object.assign(new THREE.Mesh(new THREE.TorusGeometry(0.18, 0.04, 8, 16), egMat), { position: new THREE.Vector3(-1.5, -0.18, 0.5) }));
  g.add(Object.assign(new THREE.Mesh(new THREE.TorusGeometry(0.18, 0.04, 8, 16), egMat), { position: new THREE.Vector3(1.5, -0.18, 0.5) }));
  g.add(Object.assign(new THREE.Mesh(new THREE.CircleGeometry(0.15, 12), igMat), { position: new THREE.Vector3(-1.5, -0.18, 0.52) }));
  g.add(Object.assign(new THREE.Mesh(new THREE.CircleGeometry(0.15, 12), igMat), { position: new THREE.Vector3(1.5, -0.18, 0.52) }));

  // Gun hardpoints
  const wpGeo = new THREE.CylinderGeometry(0.04, 0.04, 0.8, 6); wpGeo.rotateZ(Math.PI / 2);
  const wpMat = new THREE.MeshPhongMaterial({ color: 0x333333 });
  g.add(Object.assign(new THREE.Mesh(wpGeo, wpMat), { position: new THREE.Vector3(-1.2, -0.1, -1) }));
  g.add(Object.assign(new THREE.Mesh(wpGeo, wpMat), { position: new THREE.Vector3(1.2, -0.1, -1) }));

  return g;
}

// ═══════════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════════
let player, enemies, playerBullets, enemyBullets, powerups, particles;
let score, kills, gameWave, frame, gameOver, paused;
let mouseX, mouseY, keys;
let highScore = parseInt(localStorage.getItem('shooter_hs') || '0');

function init() {
  if (player) { enemies.forEach(e => e.remove()); playerBullets.forEach(b => b.remove()); enemyBullets.forEach(b => b.remove()); powerups.forEach(p => p.remove()); particles.forEach(p => p.remove()); }
  enemies = []; playerBullets = []; enemyBullets = []; powerups = []; particles = [];
  player = new Player(scene);
  player.mesh.position.set(0, 0, 0);
  score = 0; kills = 0; gameWave = 1; frame = 0; gameOver = false; paused = false;
  mouseX = 0; mouseY = 0; keys = {};
  updateHUD();
}

function updateHUD() {
  document.getElementById('score').textContent = score;
  document.getElementById('kills').textContent = kills;
  document.getElementById('wave').textContent = gameWave;
  document.getElementById('hp').textContent = `❤️ ${Math.max(0, player.hp)}`;
  const hpStat = document.getElementById('hp-stat');
  hpStat.className = player.shield ? 'stat shield' : 'stat';
  const fill = document.getElementById('hp-fill');
  fill.style.width = (player.hpRatio * 100) + '%';
  fill.style.background = player.hpRatio > 0.6 ? 'linear-gradient(90deg,#ff0000,#00ff44)' : player.hpRatio > 0.3 ? 'linear-gradient(90deg,#ff0000,#ff8800)' : '#ff0000';
}

// Camera
function updateCamera() {
  const p = player.mesh.position;
  camera.position.set(p.x * 0.3, p.y + 5, p.z + 14);
  camera.lookAt(p.x, p.y, p.z - 10);
}

// Spawning
function spawnEnemy() {
  const type = Math.floor(Math.random() * 3);
  const ex = (Math.random() - 0.5) * 40, ey = 3 + Math.random() * 10, ez = -100 - Math.random() * 30;
  const e = new Enemy(scene, type, gameWave);
  e.mesh.position.set(ex, ey, ez);
  enemies.push(e);
}

function spawnPowerUp(x, y, z) {
  const kinds = ['shield', 'boost', 'nuke'];
  powerups.push(new PowerUp(scene, x, y, z, kinds[Math.floor(Math.random() * 3)]));
}

// Shooting
function playerShoot() {
  if (gameOver) return;
  const p = player.mesh.position;
  for (let side = -1; side <= 1; side += 2) {
    playerBullets.push(new Bullet(scene, p.x + side * 0.6, p.y, p.z - 2, side * 0.3, 0, -1.2, 0x00ffff));
  }
  // Muzzle flash
  const flash = new THREE.PointLight(0x00ffff, 5, 5);
  flash.position.set(p.x, p.y, p.z - 2);
  scene.add(flash);
  setTimeout(() => scene.remove(flash), 80);
}

function enemyShoot(e) {
  const bx = e.mesh.position.x, by = e.mesh.position.y, bz = e.mesh.position.z;
  const dx = player.mesh.position.x - bx, dy = player.mesh.position.y - by, dz = player.mesh.position.z - bz;
  const len = Math.sqrt(dx * dx + dy * dy + dz * dz);
  enemyBullets.push(new Bullet(scene, bx, by, bz, dx / len * 0.25, dy / len * 0.25, dz / len * 0.25, 0xff4400, 0.15, 100));
}

// Controls
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') { e.preventDefault(); playerShoot(); }
  if (e.code === 'KeyP') paused = !paused;
});
document.addEventListener('keyup', e => { keys[e.code] = false; });
document.addEventListener('mousemove', e => {
  mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
  mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
});
document.addEventListener('click', e => { if (!gameOver && !paused) playerShoot(); });

// Touch
let touchStartX = 0, touchStartY = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; });
document.addEventListener('touchmove', e => {
  const dx = e.touches[0].clientX - touchStartX, dy = e.touches[0].clientY - touchStartY;
  mouseX = dx * 0.02; mouseY = dy * 0.02;
}, { passive: true });
document.addEventListener('touchend', () => { playerShoot(); mouseX = 0; mouseY = 0; });

// Update
function update() {
  if (gameOver || paused) return;
  frame++;

  // Wave
  if (frame % 600 === 0) gameWave++;
  const spawnRate = Math.max(60, 120 - gameWave * 10);
  if (frame % spawnRate === 0 && enemies.length < 5 + gameWave * 2) spawnEnemy();

  // Player movement
  const acc = 0.06, top = 15;
  if (keys['KeyW'] || keys['ArrowUp']) player.vz -= acc;
  if (keys['KeyS'] || keys['ArrowDown']) player.vz += acc;
  if (keys['KeyA'] || keys['ArrowLeft']) player.vx -= acc;
  if (keys['KeyD'] || keys['ArrowRight']) player.vx += acc;
  player.vx += mouseX * 0.008; player.vy += mouseY * 0.005;
  if (keys['ShiftLeft'] || keys['ShiftRight']) player.vy += 0.04;
  if (keys['ControlLeft']) player.vy -= 0.04;
  player.vx *= 0.92; player.vz *= 0.92; player.vy *= 0.9;
  player.vx = Math.max(-top, Math.min(top, player.vx)); player.vz = Math.max(-top, Math.min(top, player.vz));

  // Boost speed
  if (player.boostTimer > 0) {
    player.vz -= 0.08;
    player.boostTimer--;
    if (player.boostTimer === 0) { /* boost ends */ }
  }

  player.tick();

  // Player bullets
  for (let i = playerBullets.length - 1; i >= 0; i--) {
    playerBullets[i].tick();
    if (!playerBullets[i].active) { playerBullets.splice(i, 1); continue; }
    // Hit enemy
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      if (!e.active) continue;
      const d = playerBullets[i].distanceTo(e.mesh.position);
      if (d < 2 + e.cfg.scale) {
        explode(scene, playerBullets[i].mesh.position.x, playerBullets[i].mesh.position.y, playerBullets[i].mesh.position.z, 0xff6600, 12);
        playerBullets[i].remove(); playerBullets.splice(i, 1);
        e.cfg.hp--;
        if (e.cfg.hp <= 0) {
          explode(scene, e.mesh.position.x, e.mesh.position.y, e.mesh.position.z, 0xff8800, 25);
          if (Math.random() < 0.15) spawnPowerUp(e.mesh.position.x, e.mesh.position.y, e.mesh.position.z);
          e.remove(); enemies.splice(j, 1);
          score += e.cfg.score; kills++;
          if (score > highScore) { highScore = score; localStorage.setItem('shooter_hs', highScore); }
        }
        break;
      }
    }
  }

  // Enemy bullets
  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    enemyBullets[i].tick();
    if (!enemyBullets[i].active) { enemyBullets.splice(i, 1); continue; }
    const d = enemyBullets[i].distanceTo(player.mesh.position);
    if (d < 2.5) {
      explode(scene, enemyBullets[i].mesh.position.x, enemyBullets[i].mesh.position.y, enemyBullets[i].mesh.position.z, 0xff4400, 8);
      enemyBullets[i].remove(); enemyBullets.splice(i, 1);
      const dead = player.hit(10);
      updateHUD();
      if (dead) { gameOver = true; explode(scene, player.mesh.position.x, player.mesh.position.y, player.mesh.position.z, 0xff6600, 40); setTimeout(showOver, 800); }
      continue;
    }
  }

  // Enemies
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (!e.active) { enemies.splice(i, 1); continue; }
    e.tick(player.mesh.position);
    if (!e.active) { enemies.splice(i, 1); continue; }
    if (e.canShoot) { enemyShoot(e); e.doShoot(e.cfg.fireRate); }
    // Enemy vs player
    const d = Math.sqrt((e.mesh.position.x - player.mesh.position.x) ** 2 + (e.mesh.position.y - player.mesh.position.y) ** 2 + (e.mesh.position.z - player.mesh.position.z) ** 2);
    if (d < 2.5 + e.cfg.scale) {
      explode(scene, e.mesh.position.x, e.mesh.position.y, e.mesh.position.z, 0xff8800, 20);
      e.remove(); enemies.splice(i, 1);
      const dead = player.hit(25);
      updateHUD();
      if (dead) { gameOver = true; explode(scene, player.mesh.position.x, player.mesh.position.y, player.mesh.position.z, 0xff6600, 40); setTimeout(showOver, 800); }
    }
  }

  // Power-ups
  for (let i = powerups.length - 1; i >= 0; i--) {
    powerups[i].tick();
    if (!powerups[i].active) { powerups.splice(i, 1); continue; }
    if (powerups[i].distanceTo(player.mesh.position) < 3) {
      const kind = powerups[i].kind;
      if (kind === 'shield') player.giveShield();
      if (kind === 'boost') player.giveBoost();
      if (kind === 'nuke') { enemies.forEach(e => { explode(scene, e.mesh.position.x, e.mesh.position.y, e.mesh.position.z, 0xff8800, 15); score += e.cfg.score; e.remove(); }); enemies = []; explode(scene, player.mesh.position.x, player.mesh.position.y, player.mesh.position.z, 0xff4444, 40, 6); }
      powerups[i].remove(); powerups.splice(i, 1);
      updateHUD();
    }
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].tick();
    if (!particles[i].active) particles.splice(i, 1);
  }

  // HUD
  updateHUD();

  // Engine glow pulse
  if (player && player.mesh.children) {
    const engineGlows = player.mesh.children.filter(c => c.material && c.material.color && c.material.color.r > 0.8 && c.material.color.g < 0.3);
    const pulse = 1 + 0.1 * Math.sin(frame * 0.2);
    engineGlows.forEach(g => g.scale.setScalar(pulse));
  }

  cloudGroup.rotation.y += 0.0003;
  updateCamera();
}

function showOver() {
  document.getElementById('overlay').querySelector('h1').textContent = `💥 被击落！${score}分`;
  document.getElementById('overlay').querySelector('p').textContent = `最高纪录：${highScore}分`;
  document.getElementById('overlay').style.display = 'flex';
}

// Render
function loop() { requestAnimationFrame(loop); update(); renderer.render(scene, camera); }
function start() {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('overlay').querySelector('h1').textContent = '✈️ 3D空战';
  init(); loop();
}
window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(Math.min(w, h * 16 / 9), Math.min(h, w * 9 / 16));
  camera.aspect = 16 / 9; camera.updateProjectionMatrix();
});
init(); loop();
</script></body></html>
