<!DOCTYPE html>
<html lang="zh"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>✈️ 3D空战</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:monospace}
#c{position:fixed;top:0;left:0;z-index:1}
#hud{position:fixed;top:14px;left:50%;transform:translateX(-50%);display:flex;gap:14px;z-index:10;pointer-events:none}
.stat{background:rgba(0,0,0,.75);border:1px solid rgba(255,100,0,.25);padding:7px 18px;border-radius:8px;text-align:center;backdrop-filter:blur(4px)}
.stat .v{font-size:20px;font-weight:900;color:#ff6600;text-shadow:0 0 14px rgba(255,100,0,.8)}
.stat .l{font-size:9px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:2px}
.stat.shield .v{color:#00ffcc;text-shadow:0 0 14px rgba(0,255,200,.8)}
.stat.boost .v{color:#ffcc00;text-shadow:0 0 14px rgba(255,200,0,.8)}
#hp-bar{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);width:220px;z-index:10;pointer-events:none}
#hp-label{font-size:11px;color:#ff6600;text-align:center;margin-bottom:4px;letter-spacing:2px}
#hp-fill-wrap{background:rgba(0,0,0,.7);border:1px solid rgba(255,100,0,.3);border-radius:6px;height:10px;overflow:hidden}
#hp-fill{height:100%;width:100%;border-radius:6px;background:linear-gradient(90deg,#ff0000,#00ff44);transition:width .3s}
#combo{position:fixed;top:70px;left:50%;transform:translateX(-50%);color:#ffcc00;font-size:18px;font-weight:900;opacity:0;transition:opacity .3s;text-shadow:0 0 10px #ffcc00;pointer-events:none;z-index:10}
#combo.show{opacity:1}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;backdrop-filter:blur(8px)}
#overlay h1{font-size:52px;color:#ff6600;text-shadow:0 0 40px rgba(255,100,0,.9);margin-bottom:8px;animation:pulse 2s infinite}
#overlay p{color:rgba(255,255,255,.45);margin-bottom:22px;font-size:15px;letter-spacing:1px;text-align:center}
#start-btn{background:linear-gradient(90deg,#ff6600,#ff2200);color:#fff;padding:14px 50px;border:none;border-radius:14px;font-size:19px;font-weight:900;cursor:pointer;font-family:monospace;box-shadow:0 0 40px rgba(255,100,0,.6),0 4px 0 #aa2200}
#start-btn:hover{transform:scale(1.04);box-shadow:0 0 60px rgba(255,100,0,.9),0 4px 0 #aa2200}
@keyframes pulse{0%,100%{text-shadow:0 0 40px rgba(255,100,0,.9)}50%{text-shadow:0 0 60px rgba(255,100,0,1)}}
#err{color:#ff4444;font-size:14px;margin-top:12px;display:none;text-align:center;max-width:400px}
#ctrl{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.25);font-size:12px;z-index:10;pointer-events:none;letter-spacing:1px}
</style></head><body>
<canvas id="c"></canvas>
<div id="hud">
  <div class="stat"><div class="v" id="score">0</div><div class="l">得分</div></div>
  <div class="stat"><div class="v" id="kills">0</div><div class="l">击落</div></div>
  <div class="stat"><div class="v" id="wave">1</div><div class="l">波次</div></div>
  <div class="stat" id="hp-stat"><div class="v" id="hp">100</div><div class="l">生命</div></div>
</div>
<div id="combo"></div>
<div id="hp-bar"><div id="hp-label">✈ HP</div><div id="hp-fill-wrap"><div id="hp-fill"></div></div></div>
<div id="overlay">
  <h1>✈️ 3D空战</h1>
  <p>WASD / 方向键 飞行 &nbsp;·&nbsp; 空格 / 点击 射击</p>
  <button id="start-btn" onclick="doStart()">▶ 起飞</button>
  <div id="err"></div>
</div>
<div id="ctrl">WASD 飞行 · 空格/点击 射击 · P 暂停</div>
<script>
'use strict';
// ─── Canvas Setup ─────────────────────────────────────────────
var W, H, ctx;
var canvas = document.getElementById('c');

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

ctx = canvas.getContext('2d');

// ─── Stars ──────────────────────────────────────────────────
var stars = [];
function initStars() {
  stars = [];
  for (var i = 0; i < 300; i++) {
    stars.push({
      x: Math.random(), y: Math.random(),
      r: 0.5 + Math.random() * 1.5,
      speed: 0.2 + Math.random() * 0.8,
      alpha: 0.4 + Math.random() * 0.6,
      color: ['#fff','#aaddff','#ffeecc','#ffaaff'][Math.floor(Math.random()*4)]
    });
  }
}
initStars();

// ─── Grid Floor (pseudo-3D perspective) ───────────────────
function drawBackground() {
  // Sky gradient
  var grd = ctx.createLinearGradient(0, 0, 0, H);
  grd.addColorStop(0, '#000510');
  grd.addColorStop(1, '#001133');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);

  // Stars
  stars.forEach(function(s) {
    ctx.globalAlpha = s.alpha;
    ctx.fillStyle = s.color;
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Horizon line (city silhouette)
  var horizon = H * 0.55;
  var cx = W / 2, groundTop = horizon;

  // Mountains
  ctx.fillStyle = '#0a0a1a';
  ctx.beginPath();
  ctx.moveTo(0, groundTop);
  var mpts = [[0,0],[0.1,40],[0.2,10],[0.3,60],[0.4,20],[0.5,50],[0.6,15],[0.7,70],[0.8,30],[0.9,45],[1,20],[1,0]];
  mpts.forEach(function(p){ ctx.lineTo(p[0]*W, groundTop - p[1]); });
  ctx.lineTo(W, groundTop);
  ctx.closePath();
  ctx.fill();

  // Grid floor (perspective)
  ctx.save();
  ctx.beginPath();
  ctx.rect(0, groundTop, W, H - groundTop);
  ctx.clip();

  var gridLines = 20;
  var horizonY = groundTop;
  var vanishX = W / 2;

  // Horizontal lines (with perspective spacing)
  for (var i = 0; i <= gridLines; i++) {
    var t = i / gridLines;
    var y = horizonY + Math.pow(t, 1.6) * (H - horizonY);
    var spread = t * 1.5;
    var leftX  = vanishX - (W * spread);
    var rightX = vanishX + (W * spread);
    var alpha = Math.min(1, t * 2) * 0.25;
    ctx.strokeStyle = 'rgba(0,255,100,' + alpha + ')';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(leftX, y);
    ctx.lineTo(rightX, y);
    ctx.stroke();
  }

  // Vertical lines (radial from vanishing point)
  var vLines = 16;
  for (var j = 0; j <= vLines; j++) {
    var s = j / vLines;
    var alpha = 0.12;
    ctx.strokeStyle = 'rgba(0,255,100,' + alpha + ')';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(vanishX, horizonY);
    ctx.lineTo(s * W, H);
    ctx.stroke();
  }
  ctx.restore();

  // City silhouette buildings
  var buildings = [
    [0,20,30,80],[30,15,40,100],[70,25,35,60],[105,10,45,120],
    [150,30,30,70],[180,20,50,90],[230,15,40,110],[270,25,35,75],
    [305,30,40,95],[345,10,50,130],[395,20,35,85],[430,25,45,105],
    [475,15,40,70],[515,30,50,100],[565,20,35,90],[600,25,45,80],
    [645,15,40,115],[685,30,50,65],[725,20,35,95],[760,25,45,110],
    [805,10,40,75],[845,30,50,100],[895,20,35,85],[935,15,45,120]
  ];
  buildings.forEach(function(b) {
    var bx = b[0]/1000*W, by = groundTop - b[3], bw = b[2]/1000*W, bh = b[3];
    // Building body
    ctx.fillStyle = '#080818';
    ctx.fillRect(bx, by, bw, bh);
    // Windows
    for (var wy = by + 5; wy < groundTop - 5; wy += 12) {
      for (var wx = bx + 3; wx < bx + bw - 3; wx += 8) {
        if (Math.random() > 0.3) {
          ctx.fillStyle = 'rgba(255,220,100,' + (0.3 + Math.random()*0.4) + ')';
          ctx.fillRect(wx, wy, 4, 6);
        }
      }
    }
  });
}

// ─── Player Plane (drawn with canvas paths) ───────────────
function drawPlane(x, y, z, color1, color2, scale, isPlayer) {
  var s = scale || 1;
  var screenY = H - 120 - z * 2;
  var px = W/2 + x * 20;
  var py = H/2 - y * 10 + (z - 5) * 1.5;

  ctx.save();
  ctx.translate(px, py);
  ctx.scale(s, s);

  // Shadow / glow
  if (isPlayer) {
    ctx.shadowColor = 'rgba(255,100,0,0.5)';
    ctx.shadowBlur = 20;
  }

  // Fuselage
  ctx.fillStyle = color1;
  ctx.beginPath();
  ctx.ellipse(0, 0, 8, 22, 0, 0, Math.PI*2);
  ctx.fill();

  // Wings
  ctx.fillStyle = color2;
  ctx.beginPath();
  ctx.moveTo(-28, -3);
  ctx.lineTo(28, -3);
  ctx.lineTo(22, 5);
  ctx.lineTo(-22, 5);
  ctx.closePath();
  ctx.fill();

  // Cockpit
  ctx.fillStyle = isPlayer ? 'rgba(100,180,255,0.8)' : 'rgba(100,100,100,0.8)';
  ctx.beginPath();
  ctx.ellipse(0, -6, 5, 10, 0, Math.PI, 0);
  ctx.fill();

  // Engine trails
  ctx.shadowBlur = 0;
  for (var ei = -1; ei <= 1; ei += 2) {
    var eg = ctx.createRadialGradient(ei*12, 18, 0, ei*12, 18, 12);
    eg.addColorStop(0, 'rgba(255,200,50,0.9)');
    eg.addColorStop(0.5, 'rgba(255,80,0,0.4)');
    eg.addColorStop(1, 'rgba(255,0,0,0)');
    ctx.fillStyle = eg;
    ctx.beginPath();
    ctx.ellipse(ei*12, 20, 6, 14 + Math.random()*4, 0, 0, Math.PI*2);
    ctx.fill();
  }

  ctx.restore();
}

// ─── Bullet ─────────────────────────────────────────────────
function drawBullet(b) {
  var px = W/2 + b.x * 20;
  var py = H/2 - b.y * 10 + (b.z - 5) * 1.5;
  var isPlayer = b.vz < 0;
  var c = isPlayer ? '#00ffff' : '#ff6600';
  ctx.save();
  ctx.shadowColor = c;
  ctx.shadowBlur = 8;
  ctx.fillStyle = c;
  ctx.beginPath();
  ctx.arc(px, py, 3 + (isPlayer ? 2 : 1), 0, Math.PI*2);
  ctx.fill();
  // Trail
  var tg = ctx.createLinearGradient(px, py, px - b.vx*8, py - b.vy*8);
  tg.addColorStop(0, c);
  tg.addColorStop(1, 'transparent');
  ctx.strokeStyle = tg;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(px, py);
  ctx.lineTo(px - b.vx*12, py - b.vy*12);
  ctx.stroke();
  ctx.restore();
}

// ─── Explosion Particles ────────────────────────────────────
var particles = [];
function spawnExplosion(x, y, color, count) {
  count = count || 20;
  for (var i = 0; i < count; i++) {
    var a = Math.random() * Math.PI * 2;
    var sp = 1 + Math.random() * 4;
    particles.push({
      x: x, y: y,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp,
      life: 1.0,
      decay: 0.02 + Math.random() * 0.03,
      r: 2 + Math.random() * 4,
      color: color
    });
  }
}
function updateParticles() {
  for (var i = particles.length - 1; i >= 0; i--) {
    var p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.05; // gravity
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}
function drawParticles() {
  particles.forEach(function(p) {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 10;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });
}

// ─── Power-ups ─────────────────────────────────────────────
var powerups = [];
var PU_TYPES = ['shield', 'boost', 'nuke'];
function spawnPowerUp(x, y) {
  powerups.push({
    x: x, y: y,
    type: PU_TYPES[Math.floor(Math.random()*3)],
    age: 0
  });
}
function drawPowerUp(p) {
  var px = W/2 + p.x * 20;
  var py = H/2 - p.y * 10;
  var bob = Math.sin(p.age * 0.1) * 5;
  var colors = {shield:'#00ffcc', boost:'#ffcc00', nuke:'#ff4444'};
  var c = colors[p.type] || '#fff';
  ctx.save();
  ctx.shadowColor = c;
  ctx.shadowBlur = 15;
  ctx.strokeStyle = c;
  ctx.lineWidth = 2;
  ctx.fillStyle = c + '33';
  ctx.beginPath();
  ctx.arc(px, py + bob, 12, 0, Math.PI*2);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = c;
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(p.type === 'shield' ? '🛡' : p.type === 'boost' ? '⚡' : '💥', px, py + bob);
  ctx.restore();
}

// ─── Damage Numbers ─────────────────────────────────────────
var damageEls = [];
function spawnDamageNum(x, y, text, color) {
  var el = document.createElement('div');
  el.textContent = text;
  el.style.cssText = 'position:fixed;pointer-events:none;font-size:20px;font-weight:900;font-family:monospace;color:'+color+';text-shadow:0 0 8px '+color+';z-index:50;transition:transform 1s,opacity 1s;transform:translateY(0);opacity:1;';
  el.style.left = (W/2 + x * 20) + 'px';
  el.style.top  = (H/2 - y * 10) + 'px';
  document.body.appendChild(el);
  requestAnimationFrame(function() {
    el.style.transform = 'translateY(-60px)';
    el.style.opacity = '0';
  });
  setTimeout(function(){ el.remove(); }, 1000);
}

// ─── Cloud ─────────────────────────────────────────────────
var clouds = [];
function initClouds() {
  clouds = [];
  for (var i = 0; i < 8; i++) {
    clouds.push({
      x: Math.random() * W,
      y: 50 + Math.random() * 150,
      w: 60 + Math.random() * 100,
      speed: 0.1 + Math.random() * 0.3,
      alpha: 0.1 + Math.random() * 0.2
    });
  }
}
initClouds();
function drawClouds() {
  clouds.forEach(function(c) {
    ctx.save();
    ctx.globalAlpha = c.alpha;
    ctx.fillStyle = '#334455';
    ctx.beginPath();
    ctx.ellipse(c.x, c.y, c.w, c.w * 0.4, 0, 0, Math.PI*2);
    ctx.ellipse(c.x + c.w*0.3, c.y - c.w*0.1, c.w*0.6, c.w*0.3, 0, 0, Math.PI*2);
    ctx.ellipse(c.x - c.w*0.3, c.y + c.w*0.05, c.w*0.5, c.w*0.25, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
    c.x += c.speed;
    if (c.x - c.w > W) c.x = -c.w;
  });
}

// ─── GAME STATE ─────────────────────────────────────────────
var score = 0, kills = 0, gameWave = 1;
var frame = 0, gameOver = false, paused = false;
var highScore = parseInt(localStorage.getItem('ss_hs') || '0');

// Player
var player = {
  x: 0, y: 0, z: 5,
  vx: 0, vy: 0, vz: 0,
  roll: 0, pitch: 0,
  hp: 100, maxHP: 100,
  shield: false, boostTimer: 0,
  invincible: 0,
  combo: 0, comboTimer: 0,
  get hpRatio() { return Math.max(0, this.hp / this.maxHP); }
};

// Bullets
var pBullets = [];
var eBullets = [];

// Enemies
var enemies = [];

function resetGame() {
  player.x=0; player.y=0; player.z=5;
  player.vx=0; player.vy=0; player.vz=0;
  player.roll=0; player.pitch=0;
  player.hp=100; player.shield=false; player.boostTimer=0;
  player.invincible=0; player.combo=0; player.comboTimer=0;
  pBullets=[]; eBullets=[]; enemies=[]; powerups=[];
  particles=[];
  score=0; kills=0; gameWave=1; frame=0; gameOver=false; paused=false;
  updateHUD();
}

function updateHUD() {
  document.getElementById('score').textContent = score;
  document.getElementById('kills').textContent = kills;
  document.getElementById('wave').textContent   = gameWave;
  document.getElementById('hp').textContent     = Math.max(0, player.hp);
  var cls = player.shield ? 'stat shield' : player.boostTimer>0 ? 'stat boost' : 'stat';
  document.getElementById('hp-stat').className = cls;
  var fill = document.getElementById('hp-fill');
  fill.style.width = (player.hpRatio*100)+'%';
  fill.style.background = player.hpRatio>0.6 ? 'linear-gradient(90deg,#ff0000,#00ff44)'
    : player.hpRatio>0.3 ? 'linear-gradient(90deg,#ff0000,#ff8800)' : '#ff0000';
}
function updateCombo() {
  var el = document.getElementById('combo');
  if (player.combo >= 3) {
    el.textContent = '🔥 ' + player.combo + '连击!';
    el.classList.add('show');
  } else {
    el.classList.remove('show');
  }
}

// ─── Controls ───────────────────────────────────────────────
var keys = {};
document.addEventListener('keydown', function(e) {
  keys[e.code] = true;
  if (e.code === 'Space') { e.preventDefault(); shoot(); }
  if (e.code === 'KeyP') paused = !paused;
});
document.addEventListener('keyup', function(e) { keys[e.code] = false; });
document.addEventListener('click', function() { if (!gameOver && !paused) shoot(); });

function shoot() {
  if (gameOver) return;
  pBullets.push({x: player.x - 2, y: player.y, z: player.z, vx: 0, vy: 0, vz: -1.2});
  pBullets.push({x: player.x + 2, y: player.y, z: player.z, vx: 0, vy: 0, vz: -1.2});
}

// ─── Enemy AI ───────────────────────────────────────────────
function spawnEnemy() {
  var types = ['scout','soldier','tank'];
  var t = Math.floor(Math.random()*3);
  enemies.push({
    x: (Math.random()-0.5)*30, y: 2+Math.random()*8,
    z: -120 - Math.random()*30,
    type: t,
    hp: [2,3,5][t] + Math.floor(gameWave*0.3),
    maxHP: [2,3,5][t] + Math.floor(gameWave*0.3),
    score: [100,200,300][t],
    fireRate: [120,80,50][t],
    fireTimer: Math.random()*120,
    color1: ['#cc2222','#884400','#440088'][t],
    color2: ['#881111','#552200','#220055'][t],
    scale: [0.7,1.0,1.2][t]
  });
}

// ─── Game Update ────────────────────────────────────────────
function update() {
  if (gameOver || paused) return;
  frame++;

  // Wave progression
  if (frame % 600 === 0) gameWave++;
  var spawnRate = Math.max(60, 120 - gameWave*8);
  if (frame % spawnRate === 0 && enemies.length < 4 + gameWave*2) spawnEnemy();

  // Stars drift
  stars.forEach(function(s) {
    s.y += s.speed * 0.001;
    if (s.y > 1) { s.y = 0; s.x = Math.random(); }
  });

  // Player movement
  var acc = 0.08;
  if (keys['KeyW']||keys['ArrowUp'])    player.vy += acc;
  if (keys['KeyS']||keys['ArrowDown'])  player.vy -= acc;
  if (keys['KeyA']||keys['ArrowLeft'])  player.vx -= acc;
  if (keys['KeyD']||keys['ArrowRight']) player.vx += acc;
  if (keys['ShiftLeft']) player.vy += acc;
  if (keys['ControlLeft']) player.vy -= acc;

  player.vx *= 0.9; player.vy *= 0.9; player.vz *= 0.9;
  if (player.boostTimer > 0) { player.vy += 0.06; player.boostTimer--; }
  player.x += player.vx; player.y += player.vy;
  player.x = Math.max(-30, Math.min(30, player.x));
  player.y = Math.max(-10, Math.min(12, player.y));

  player.roll  += ((-player.vx*0.5) - player.roll) * 0.1;
  player.pitch += ((player.vy*0.3) - player.pitch) * 0.1;

  if (player.invincible > 0) player.invincible--;

  // Combo decay
  if (player.comboTimer > 0) {
    player.comboTimer--;
    if (player.comboTimer === 0) player.combo = 0;
  }

  // Player bullets
  for (var i = pBullets.length-1; i >= 0; i--) {
    var pb = pBullets[i];
    pb.x += pb.vx; pb.y += pb.vy; pb.z += pb.vz;
    if (pb.z < -150) { pBullets.splice(i,1); continue; }

    // Hit enemy?
    for (var j = enemies.length-1; j >= 0; j--) {
      var e = enemies[j];
      var dist = Math.sqrt((pb.x-e.x)**2 + (pb.y-e.y)**2 + (pb.z-e.z)**2);
      if (dist < 3) {
        spawnExplosion(W/2+pb.x*20, H/2-pb.y*10, '#ff6600', 10);
        pBullets.splice(i,1);
        e.hp--;
        if (e.hp <= 0) {
          spawnExplosion(W/2+e.x*20, H/2-e.y*10, e.color1, 25);
          spawnDamageNum(e.x, e.y, '+'+e.score, '#ffcc00');
          if (Math.random() < 0.2) spawnPowerUp(e.x, e.y);
          enemies.splice(j,1);
          player.combo++; player.comboTimer = 120;
          score += e.score * Math.max(1, player.combo); kills++;
          if (score > highScore) { highScore = score; localStorage.setItem('ss_hs', highScore); }
        }
        break;
      }
    }
  }

  // Enemy bullets
  for (var k = eBullets.length-1; k >= 0; k--) {
    var eb = eBullets[k];
    eb.x += eb.vx; eb.y += eb.vy; eb.z += eb.vz;
    if (eb.z > 10 || eb.z < -150) { eBullets.splice(k,1); continue; }

    var db = Math.sqrt((eb.x-player.x)**2 + (eb.y-player.y)**2 + (eb.z-player.z)**2);
    if (db < 2.5) {
      spawnExplosion(W/2+eb.x*20, H/2-eb.y*10, '#ff4400', 8);
      eBullets.splice(k,1);
      if (!player.shield && player.invincible === 0) {
        player.hp = Math.max(0, player.hp - 10);
        player.invincible = 60;
        updateHUD();
        if (player.hp <= 0) {
          gameOver = true;
          spawnExplosion(W/2+player.x*20, H/2-player.y*10, '#ff6600', 50);
          setTimeout(showOver, 800);
        }
      }
    }
  }

  // Enemies update
  for (var m = enemies.length-1; m >= 0; m--) {
    var em = enemies[m];
    em.z += 0.06 + gameWave * 0.003;
    em.x += (player.x - em.x) * 0.01;
    em.y += (player.y - em.y) * 0.008;

    em.fireTimer--;
    if (em.fireTimer <= 0) {
      var dx = player.x-em.x, dy = player.y-em.y, dz = player.z-em.z;
      var len = Math.sqrt(dx*dx+dy*dy+dz*dz);
      eBullets.push({
        x: em.x, y: em.y, z: em.z,
        vx: dx/len*0.3, vy: dy/len*0.3, vz: dz/len*0.3
      });
      em.fireTimer = em.fireRate + Math.random()*em.fireRate;
    }

    if (em.z > 15) { enemies.splice(m,1); continue; }

    var dem = Math.sqrt((em.x-player.x)**2+(em.y-player.y)**2+(em.z-player.z)**2);
    if (dem < 2.5 + em.scale) {
      spawnExplosion(W/2+em.x*20, H/2-em.y*10, em.color1, 20);
      enemies.splice(m,1);
      if (!player.shield && player.invincible === 0) {
        player.hp = Math.max(0, player.hp - 25);
        player.invincible = 60;
        updateHUD();
        if (player.hp <= 0) {
          gameOver = true;
          spawnExplosion(W/2+player.x*20, H/2-player.y*10, '#ff6600', 50);
          setTimeout(showOver, 800);
        }
      }
    }
  }

  // Power-ups
  for (var n = powerups.length-1; n >= 0; n--) {
    var pu = powerups[n];
    pu.age++;
    pu.y -= 0.02;
    if (pu.y < -10) { powerups.splice(n,1); continue; }

    var dp = Math.sqrt((pu.x-player.x)**2+(pu.y-player.y)**2);
    if (dp < 3) {
      if (pu.type === 'shield') player.shield = true;
      if (pu.type === 'boost') { player.boostTimer = 180; player.invincible = 180; }
      if (pu.type === 'nuke') {
        enemies.forEach(function(e2) {
          spawnExplosion(W/2+e2.x*20, H/2-e2.y*10, '#ff4444', 20);
          score += e2.score; e2.hp = 0;
        });
        enemies = enemies.filter(function(e2){ return e2.hp > 0; });
        spawnExplosion(W/2+player.x*20, H/2+player.y*10, '#ff4444', 60);
      }
      powerups.splice(n,1);
      updateHUD();
    }
  }

  updateParticles();
  updateHUD();
  updateCombo();
}

function showOver() {
  document.getElementById('overlay').querySelector('h1').textContent = '💥 被击落！' + score + '分';
  document.getElementById('overlay').querySelector('p').textContent  = '最高纪录：' + highScore + '分';
  document.getElementById('start-btn').textContent = '🔄 再来';
  document.getElementById('overlay').style.display = 'flex';
}

// ─── Render ────────────────────────────────────────────────
function render() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  drawClouds();

  // Power-ups
  powerups.forEach(drawPowerUp);

  // Player bullets
  pBullets.forEach(drawBullet);

  // Enemy bullets
  eBullets.forEach(drawBullet);

  // Enemies
  enemies.forEach(function(e) {
    var px = W/2 + e.x*20, py = H/2 - e.y*10 + (e.z-5)*1.5;
    drawPlane(e.x, e.y, e.z, e.color1, e.color2, e.scale, false);
    // HP bar above enemy
    var bw = 30, bh = 4;
    ctx.fillStyle = '#333';
    ctx.fillRect(px-bw/2, py-30*e.scale, bw, bh);
    ctx.fillStyle = '#ff4444';
    ctx.fillRect(px-bw/2, py-30*e.scale, bw*(e.hp/e.maxHP), bh);
  });

  // Player
  if (!gameOver && (player.invincible === 0 || Math.floor(player.invincible/4)%2===0)) {
    drawPlane(player.x, player.y, player.z, '#3355aa', '#224488', 1, true);
  }

  // Particles
  drawParticles();

  // Paused overlay
  if (paused) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ff6600';
    ctx.font = 'bold 48px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('⏸ 暂停', W/2, H/2);
    ctx.font = '18px monospace';
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText('按 P 继续', W/2, H/2 + 50);
  }
}

// ─── Main Loop ─────────────────────────────────────────────
function loop() {
  requestAnimationFrame(loop);
  try {
    update();
    render();
  } catch(e) {
    console.error(e);
    document.getElementById('err').textContent = 'Error: ' + e.message;
    document.getElementById('err').style.display = 'block';
  }
}

function doStart() {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('start-btn').textContent = '▶ 起飞';
  document.getElementById('err').style.display = 'none';
  resetGame();
  loop();
}

// Boot: show loop running (renders background even before start)
loop();
</script></body></html>
