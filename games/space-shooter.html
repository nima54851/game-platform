<!DOCTYPE html>
<html lang="zh"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>✈️ 3D空战 · 空中大作战</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:monospace}
#hud{position:fixed;top:14px;left:50%;transform:translateX(-50%);display:flex;gap:18px;z-index:10;pointer-events:none}
.stat{background:rgba(0,0,0,.7);border:1px solid rgba(255,100,0,.25);padding:7px 18px;border-radius:8px;text-align:center}
.stat .v{font-size:22px;font-weight:900;color:#ff6600;text-shadow:0 0 12px rgba(255,100,0,.7)}
.stat .l{font-size:9px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:2px}
#hp-bar{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);width:220px;z-index:10;pointer-events:none}
#hp-label{font-size:11px;color:#ff6600;text-align:center;margin-bottom:4px;letter-spacing:2px}
#hp-fill-wrap{background:rgba(0,0,0,.7);border:1px solid rgba(255,100,0,.3);border-radius:6px;height:10px;overflow:hidden}
#hp-fill{height:100%;width:100%;border-radius:6px;background:linear-gradient(90deg,#ff0000,#ff8800,#00ff44);transition:width .3s}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;backdrop-filter:blur(6px)}
#overlay h1{font-size:46px;color:#ff6600;text-shadow:0 0 30px rgba(255,100,0,.7);margin-bottom:8px}
#overlay p{color:rgba(255,255,255,.4);margin-bottom:22px;font-size:15px}
#start-btn{background:linear-gradient(90deg,#ff6600,#ff2200);color:#fff;padding:14px 50px;border:none;border-radius:14px;font-size:19px;font-weight:900;cursor:pointer;font-family:monospace;box-shadow:0 0 40px rgba(255,100,0,.5)}
#ctrl-hint{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.3);font-size:12px;z-index:10;pointer-events:none;letter-spacing:1px}
canvas{display:block}
</style></head><body>
<div id="hud">
  <div class="stat"><div class="v" id="score">0</div><div class="l">得分</div></div>
  <div class="stat"><div class="v" id="kills">0</div><div class="l">击落</div></div>
  <div class="stat"><div class="v" id="wave">1</div><div class="l">波次</div></div>
</div>
<div id="hp-bar">
  <div id="hp-label">✈ HP</div>
  <div id="hp-fill-wrap"><div id="hp-fill"></div></div>
</div>
<div id="overlay">
  <h1>✈️ 3D空战</h1>
  <p>WASD 飞行 · 鼠标瞄准 · 空格射击 · 击落敌机</p>
  <button id="start-btn" onclick="start()">▶ 起飞</button>
</div>
<div id="ctrl-hint">WASD 飞行 · 鼠标瞄准 · 空格/点击 射击</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script>
// ─── WebGL Check ───────────────────────────────────────────────
(function checkWebGL(){
  try{const c=document.createElement('canvas');if(!window.WebGLRenderingContext||!c.getContext('webgl')&&!c.getContext('experimental-webgl')){
    document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#f66;font-family:monospace;font-size:20px;text-align:center;padding:20px">⚠️ 您的浏览器不支持 WebGL<br><br><small>请使用 Chrome / Firefox / Edge 最新版</small></div>';}}catch(e){}
})();

const W=window.innerWidth,H=window.innerHeight;
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(W,H);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.2;
document.body.appendChild(renderer.domElement);

const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x001122,.008);

// Camera
const camera=new THREE.PerspectiveCamera(65,16/9,.1,800);
// We'll adjust aspect on resize
renderer.setSize(Math.min(W,H*16/9),Math.min(H,W*9/16));
const ASP=Math.min(W,H*16/9),AHT=Math.min(H,W*9/16);
camera.aspect=16/9;
camera.updateProjectionMatrix();

// Lights
const ambient=new THREE.AmbientLight(0x112244,1.5);
scene.add(ambient);
const sunLight=new THREE.DirectionalLight(0xffffff,2);
sunLight.position.set(50,100,50);
sunLight.castShadow=true;
sunLight.shadow.mapSize.set(1024,1024);
scene.add(sunLight);
const rimLight=new THREE.DirectionalLight(0x0066ff,.8);
rimLight.position.set(-30,20,-50);
scene.add(rimLight);

// ─── Materials ────────────────────────────────────────────────
const mFuselage=new THREE.MeshPhongMaterial({color:0x445566,shininess:60,specular:new THREE.Color(0x88bbff)});
const mWing=new THREE.MeshPhongMaterial({color:0x334455,shininess:40,specular:new THREE.Color(0x6688aa)});
const mEngine=new THREE.MeshPhongMaterial({color:0x223344,shininess:80});
const mGlow=new THREE.MeshBasicMaterial({color:0xff6600});
const mBullet=new THREE.MeshBasicMaterial({color:0x00ffff});
const mTrail=new THREE.MeshBasicMaterial({color:0xff8800,transparent:true,opacity:.3});
const mCloud=new THREE.MeshPhongMaterial({color:0xaabbcc,transparent:true,opacity:.25,depthWrite:false});
const mHit=new THREE.MeshBasicMaterial({color:0xff4400,transparent:true,opacity:.8});

// ─── Build 3D Plane Model ─────────────────────────────────────
function buildPlane(color1,color2,isPlayer){
  const g=new THREE.Group();
  // Fuselage (body)
  const fGeo=new THREE.CylinderGeometry(.22,.18,3.2,12);
  fGeo.rotateX(Math.PI/2);
  const fMat=new THREE.MeshPhongMaterial({color:color1,shininess:80,specular:new THREE.Color(isPlayer?0xffffff:0x888888)});
  const fuselage=new THREE.Mesh(fGeo,fMat);fuselage.castShadow=true;g.add(fuselage);
  // Nose cone
  const nGeo=new THREE.ConeGeometry(.18,.7,10);
  nGeo.rotateX(-Math.PI/2);
  const nose=new THREE.Mesh(nGeo,fMat);nose.position.z=-1.7;nose.castShadow=true;g.add(nose);
  // Cockpit
  const cGeo=new THREE.SphereGeometry(.2,.8,.6,0,Math.PI*2,0,Math.PI/2);
  const cMat=new THREE.MeshPhongMaterial({color:isPlayer?0x4488ff:0x334455,transparent:true,opacity:.7,shininess:200});
  const cockpit=new THREE.Mesh(cGeo,cMat);cockpit.position.set(0,.18,-.5);g.add(cockpit);
  // Wings
  const wGeo=new THREE.BoxGeometry(5,.06,.9);
  const wMat=new THREE.MeshPhongMaterial({color:color2,shininess:50});
  const wings=new THREE.Mesh(wGeo,wMat);wings.castShadow=true;g.add(wings);
  // Wing tips (slight upward angle)
  const wtGeo=new THREE.BoxGeometry(.6,.05,.4);
  const wtL=new THREE.Mesh(wtGeo,wMat);wtL.position.set(-2.7,.12,-.1);g.add(wtL);
  const wtR=new THREE.Mesh(wtGeo,wMat);wtR.position.set(2.7,.12,-.1);g.add(wtR);
  // Tail fins (vertical)
  const tfGeo=new THREE.BoxGeometry(.06,1.0,.6);
  const tailFin=new THREE.Mesh(tfGeo,wMat);tailFin.position.set(0,.5,1.2);tailFin.castShadow=true;g.add(tailFin);
  // Horizontal stabilizers
  const hsGeo=new THREE.BoxGeometry(1.8,.05,.5);
  const hs=new THREE.Mesh(hsGeo,wMat);hs.position.set(0,0,1.3);g.add(hs);
  // Engine nacelles (under wings)
  const eGeo=new THREE.CylinderGeometry(.18,.18,1.2,10);
  eGeo.rotateX(Math.PI/2);
  const eMat=new THREE.MeshPhongMaterial({color:0x223344,shininess:80});
  const eL=new THREE.Mesh(eGeo,eMat);eL.position.set(-1.5,-.18,-.2);eL.castShadow=true;g.add(eL);
  const eR=new THREE.Mesh(eGeo,eMat);eR.position.set(1.5,-.18,-.2);eR.castShadow=true;g.add(eR);
  // Engine glow rings
  const egGeo=new THREE.TorusGeometry(.18,.04,8,16);
  const egMat=new THREE.MeshBasicMaterial({color:isPlayer?0xff6600:0xff4400});
  const egL=new THREE.Mesh(egGeo,egMat);egL.position.set(-1.5,-.18,.5);g.add(egL);
  const egR=new THREE.Mesh(egGeo,egMat);egR.position.set(1.5,-.18,.5);g.add(egR);
  // Engine inner glow
  const igGeo=new THREE.CircleGeometry(.15,12);
  const igMat=new THREE.MeshBasicMaterial({color:0xffcc00,side:THREE.DoubleSide});
  const igL=new THREE.Mesh(igGeo,igMat);igL.position.set(-1.5,-.18,.52);g.add(igL);
  const igR=new THREE.Mesh(igGeo,igMat);igR.position.set(1.5,-.18,.52);g.add(igR);
  // Weapon hardpoints
  const wpGeo=new THREE.CylinderGeometry(.04,.04,.8,6);
  wpGeo.rotateZ(Math.PI/2);
  const wpMat=new THREE.MeshPhongMaterial({color:0x333333});
  const wp1=new THREE.Mesh(wpGeo,wpMat);wp1.position.set(-1.2,-.1,-1);g.add(wp1);
  const wp2=new THREE.Mesh(wpGeo,wpMat);wp2.position.set(1.2,-.1,-1);g.add(wp2);
  return g;
}

// Build enemy variants
function buildEnemyPlane(type){
  const colors={0:['#cc2222','#881111'],1:['#884400','#552200'],2:['#440088','#220055']};
  const [c1,c2]=colors[type%3];
  return buildPlane(c1,c2,false);
}

// ─── Scene Elements ────────────────────────────────────────────
// Sky sphere
const skyGeo=new THREE.SphereGeometry(400,32,32);
const skyMat=new THREE.MeshBasicMaterial({color:0x000510,side:THREE.BackSide});
scene.add(new THREE.Mesh(skyGeo,skyMat));
// Stars
const starGeo=new THREE.BufferGeometry();
const starVerts=[];
for(let i=0;i<4000;i++){
  const phi=Math.acos(2*Math.random()-1);
  const theta=2*Math.PI*Math.random();
  starVerts.push(300*Math.sin(phi)*Math.cos(theta),300*Math.cos(phi),300*Math.sin(phi)*Math.sin(theta));
}
starGeo.setAttribute('position',new THREE.Float32BufferAttribute(starVerts,3));
const starMat=new THREE.PointsMaterial({color:0xffffff,size:.8,sizeAttenuation:true});
scene.add(new THREE.Points(starGeo,starMat));
// Clouds
const cloudGroup=new THREE.Group();
for(let i=0;i<25;i++){
  const cg=new THREE.SphereGeometry(10+Math.random()*20,8,6);
  const cm=new THREE.Mesh(cg,mCloud.clone());
  cm.position.set((Math.random()-.5)*300,20+(Math.random()-.5)*60,(Math.random()-.5)*300);
  cloudGroup.add(cm);
}
scene.add(cloudGroup);
// Ground plane (distant)
const gGeo=new THREE.PlaneGeometry(600,600,30,30);
const gMat=new THREE.MeshPhongMaterial({color:0x0a1a0a,shininess:5});
const ground=new THREE.Mesh(gGeo,gMat);
ground.rotation.x=-Math.PI/2;
ground.position.y=-50;
ground.receiveShadow=true;
scene.add(ground);
// Grid on ground
const grid=new THREE.GridHelper(400,40,0x00ff44,.05);
grid.position.y=-49.9;
grid.material.opacity=.1;
grid.material.transparent=true;
scene.add(grid);
// Distant mountains
for(let i=0;i<12;i++){
  const mGeo=new THREE.ConeGeometry(15+Math.random()*25,30+Math.random()*40,5);
  const mMat=new THREE.MeshPhongMaterial({color:0x0a0a1a,shininess:0});
  const m=new THREE.Mesh(mGeo,mMat);
  m.position.set((Math.random()-.5)*500,-20,(Math.random()-.5)*500-100);
  scene.add(m);
}

// ─── Game State ────────────────────────────────────────────────
let player,enemies=[],bullets=[],particles=[],trails=[],enemyBullets=[];
let score=0,kills=0,wave=1,hp=100,frame=0,gameOver=false;
let mouseX=0,mouseY=0,keys={};
const shootCooldown=0;

const ENEMY_TYPES=[
  {speed:.06,hp:2,score:100,fireRate:120,scale:.8},
  {speed:.08,hp:3,score:200,fireRate:80,scale:1.0},
  {speed:.1,hp:5,score:300,fireRate:50,scale:1.3},
];

function init(){
  enemies.forEach(e=>scene.remove(e.mesh));
  bullets.forEach(b=>scene.remove(b.mesh));
  particles.forEach(p=>scene.remove(p.mesh));
  trails.forEach(t=>scene.remove(t.mesh));
  enemyBullets.forEach(b=>scene.remove(b.mesh));
  [enemies,bullets,particles,trails,enemyBullets]=[[],[],[],[],[]];
  if(player)scene.remove(player.mesh);
  player={mesh:buildPlane(0x3355aa,0x224488,true),vx:0,vy:0,vz:0,roll:0,yaw:0,pitch:0,shootTimer:0};
  player.mesh.scale.set(1,1,1);
  player.mesh.position.set(0,0,0);
  player.mesh.castShadow=true;
  scene.add(player.mesh);
  score=0;kills=0;wave=1;hp=100;frame=0;gameOver=false;
  document.getElementById('score').textContent=0;document.getElementById('kills').textContent=0;document.getElementById('wave').textContent=1;
  updateHP();
}
function updateHP(){
  const fill=document.getElementById('hp-fill');
  fill.style.width=hp+'%';
  fill.style.background=hp>60?'linear-gradient(90deg,#ff0000,#00ff44)':hp>30?'linear-gradient(90deg,#ff0000,#ff8800)':'linear-gradient(90deg,#ff0000,#ff0000)';
}

// Camera follow
function updateCamera(){
  if(!player)return;
  const px=player.mesh.position.x,py=player.mesh.position.y,pz=player.mesh.position.z;
  camera.position.set(px*0.3,py+5,pz+14);
  camera.lookAt(px,py,pz-10);
}

// ─── Spawn ─────────────────────────────────────────────────────
function spawnEnemy(){
  const et=Math.floor(Math.random()*3);
  const cfg=ENEMY_TYPES[et];
  const ex=(Math.random()-.5)*40,ey=3+(Math.random()-0)*10,ez=-100-Math.random()*30;
  const mesh=buildEnemyPlane(et);
  mesh.scale.setScalar(cfg.scale);
  mesh.position.set(ex,ey,ez);
  mesh.rotation.y=Math.PI; // Face player
  scene.add(mesh);
  enemies.push({mesh,type:et,cfg,hp:cfg.hp,shootTimer:Math.random()*cfg.fireRate,vx:0,vy:0,roll:0,enginePhase:Math.random()*Math.PI*2});
}

// ─── Bullets ───────────────────────────────────────────────────
function shoot(){
  if(gameOver)return;
  const p=player.mesh;
  const bx=p.position.x,by=p.position.y,bz=p.position.z-2;
  for(let side=-1;side<=1;side+=2){
    const geo=new THREE.SphereGeometry(.12,6,6);
    const mat=new THREE.MeshBasicMaterial({color:0x00ffff});
    const mesh=new THREE.Mesh(geo,mat);
    mesh.position.set(bx+side*.6,by,bz);
    scene.add(mesh);
    // Muzzle flash
    const flash=new THREE.PointLight(0x00ffff,5,5);
    flash.position.copy(mesh.position);
    scene.add(flash);
    setTimeout(()=>scene.remove(flash),80);
    bullets.push({mesh,vx:side*.3,vy:0,vz:-1.2,life:80});
  }
}

function enemyShoot(e){
  const bx=e.mesh.position.x,by=e.mesh.position.y,bz=e.mesh.position.z;
  const geo=new THREE.SphereGeometry(.15,6,6);
  const mat=new THREE.MeshBasicMaterial({color:0xff4400});
  const mesh=new THREE.Mesh(geo,mat);
  mesh.position.set(bx,by,bz);
  scene.add(mesh);
  const dx=player.mesh.position.x-bx,dy=player.mesh.position.y-by,dz=player.mesh.position.z-bz;
  const len=Math.sqrt(dx*dx+dy*dy+dz*dz);
  enemyBullets.push({mesh,vx:dx/len*.25,vy:dy/len*.25,vz:dz/len*.25,life:100});
}

// ─── Explosions ───────────────────────────────────────────────
function explode(x,y,z,color,count=20){
  for(let i=0;i<count;i++){
    const geo=new THREE.SphereGeometry(.08+Math.random()*.25,6,6);
    const mat=new THREE.MeshBasicMaterial({color,transparent:true,opacity:1});
    const mesh=new THREE.Mesh(geo,mat);
    mesh.position.set(x,y,z);
    scene.add(mesh);
    const speed=2+Math.random()*4;
    const a=Math.random()*Math.PI*2,b=(Math.random()-.5)*Math.PI;
    particles.push({mesh,vx:Math.cos(a)*Math.cos(b)*speed,vy:Math.sin(b)*speed,vz:Math.sin(a)*Math.cos(b)*speed,life:1,decay:.025,color});
  }
  // Flash
  const flash=new THREE.PointLight(color,20,20);
  flash.position.set(x,y,z);
  scene.add(flash);
  setTimeout(()=>scene.remove(flash),100);
  // Debris
  for(let i=0;i<5;i++){
    const dGeo=new THREE.BoxGeometry(.2,.2,.4);
    const dMat=new THREE.MeshPhongMaterial({color:0x333333});
    const d=new THREE.Mesh(dGeo,dMat);
    d.position.set(x,y,z);
    scene.add(d);
    const speed=3+Math.random()*3;
    const a=Math.random()*Math.PI*2;
    particles.push({mesh:d,vx:Math.cos(a)*speed,vy:(Math.random()-.5)*speed,vz:Math.sin(a)*speed,life:1,decay:.015,rotSpeed:(Math.random()-.5)*.3,isDebris:true});
  }
}

// ─── Controls ──────────────────────────────────────────────────
document.addEventListener('keydown',e=>{keys[e.code]=true;if(e.code==='Space'){e.preventDefault();shoot();}});
document.addEventListener('keyup',e=>{keys[e.code]=false;});
document.addEventListener('mousemove',e=>{mouseX=(e.clientX/window.innerWidth-.5)*2;mouseY=(e.clientY/window.innerHeight-.5)*2;});
document.addEventListener('click',e=>{if(!gameOver)shoot();});

// Touch controls
let touchStartX=0,touchStartY=0;
document.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;});
document.addEventListener('touchmove',e=>{
  const dx=e.touches[0].clientX-touchStartX,dy=e.touches[0].clientY-touchStartY;
  mouseX=dx*.02;mouseY=dy*.02;
},{passive:true});
document.addEventListener('touchend',()=>{shoot();mouseX=0;mouseY=0;});

// ─── Update ───────────────────────────────────────────────────
function update(){
  if(gameOver)return;
  frame++;
  // Wave spawning
  if(frame%Math.max(60,120-wave*10)===0&&enemies.length<5+wave*2)spawnEnemy();
  if(frame%600===0)wave++;
  document.getElementById('wave').textContent=wave;

  // Player movement
  const acc=.06,top=15;
  if(keys['KeyW']||keys['ArrowUp'])player.vz-=acc;
  if(keys['KeyS']||keys['ArrowDown'])player.vz+=acc;
  if(keys['KeyA']||keys['ArrowLeft'])player.vx-=acc;
  if(keys['KeyD']||keys['ArrowRight'])player.vx+=acc;
  // Mouse influence
  player.vx+=mouseX*.008;player.vy+=mouseY*.005;
  // Mouse Y movement
  if(keys['ShiftLeft']||keys['ShiftRight'])player.vy+=.04;
  if(keys['ControlLeft'])player.vy-=.04;
  player.vx*=.92;player.vz*=.92;player.vy*=.9;
  player.vx=Math.max(-top,Math.min(top,player.vx));
  player.vz=Math.max(-top,Math.min(top,player.vz));
  player.mesh.position.x+=player.vx;
  player.mesh.position.y=Math.max(-8,Math.min(12,player.mesh.position.y+player.vy));
  player.mesh.position.z+=player.vz;
  player.mesh.position.x=Math.max(-30,Math.min(30,player.mesh.position.x));

  // Player rotation (bank into turns)
  player.roll+=((-player.vx*.08)-player.roll)*.1;
  player.pitch+=(player.vz*.04-player.pitch)*.1;
  player.mesh.rotation.z=player.roll;
  player.mesh.rotation.x=player.pitch;

  // Bullet update
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    b.mesh.position.x+=b.vx;b.mesh.position.y+=b.vy;b.mesh.position.z+=b.vz;b.life--;
    if(b.life<=0||b.mesh.position.z<-120){scene.remove(b.mesh);bullets.splice(i,1);}
  }
  // Enemy bullet update
  for(let i=enemyBullets.length-1;i>=0;i--){
    const b=enemyBullets[i];
    b.mesh.position.x+=b.vx;b.mesh.position.y+=b.vy;b.mesh.position.z+=b.vz;b.life--;
    // Hit player
    const dx=b.mesh.position.x-player.mesh.position.x,dy=b.mesh.position.y-player.mesh.position.y,dz=b.mesh.position.z-player.mesh.position.z;
    if(Math.sqrt(dx*dx+dy*dy+dz*dz)<2.5){
      explode(b.mesh.position.x,b.mesh.position.y,b.mesh.position.z,0xff4400,8);
      scene.remove(b.mesh);enemyBullets.splice(i,1);hp-=10;updateHP();
      if(hp<=0){gameOver=true;explode(player.mesh.position.x,player.mesh.position.y,player.mesh.position.z,0xff6600,40);setTimeout(showOver,800);}continue;
    }
    if(b.life<=0||b.mesh.position.z>20){scene.remove(b.mesh);enemyBullets.splice(i,1);}
  }
  // Bullet vs enemy
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    for(let j=enemies.length-1;j>=0;j--){
      const e=enemies[j];
      const dx=b.mesh.position.x-e.mesh.position.x,dy=b.mesh.position.y-e.mesh.position.y,dz=b.mesh.position.z-e.mesh.position.z;
      if(Math.sqrt(dx*dx+dy*dy+dz*dz)<2+e.cfg.scale){
        explode(b.mesh.position.x,b.mesh.position.y,b.mesh.position.z,0xff6600,12);
        scene.remove(b.mesh);bullets.splice(i,1);
        e.hp--;
        if(e.hp<=0){
          explode(e.mesh.position.x,e.mesh.position.y,e.mesh.position.z,0xff8800,25);
          scene.remove(e.mesh);enemies.splice(j,1);
          score+=e.cfg.score;kills++;
          document.getElementById('score').textContent=score;document.getElementById('kills').textContent=kills;
        }
        break;
      }
    }
  }
  // Enemy update
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    e.mesh.position.z+=e.cfg.speed;
    e.mesh.position.x+=(player.mesh.position.x-e.mesh.position.x)*.008;
    e.mesh.position.y+=(player.mesh.position.y-e.mesh.position.y)*.005;
    e.shootTimer--;
    if(e.shootTimer<=0){e.shootTimer=e.cfg.fireRate+Math.random()*e.cfg.fireRate;enemyShoot(e);}
    if(e.mesh.position.z>20){scene.remove(e.mesh);enemies.splice(i,1);continue;}
    // Collision with player
    const dx=e.mesh.position.x-player.mesh.position.x,dy=e.mesh.position.y-player.mesh.position.y,dz=e.mesh.position.z-player.mesh.position.z;
    if(Math.sqrt(dx*dx+dy*dy+dz*dz)<2.5+e.cfg.scale){
      explode(e.mesh.position.x,e.mesh.position.y,e.mesh.position.z,0xff8800,20);
      scene.remove(e.mesh);enemies.splice(i,1);hp-=25;updateHP();
      if(hp<=0){gameOver=true;explode(player.mesh.position.x,player.mesh.position.y,player.mesh.position.z,0xff6600,40);setTimeout(showOver,800);}
    }
  }
  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.mesh.position.x+=p.vx;p.mesh.position.y+=p.vy;p.mesh.position.z+=p.vz;
    if(p.rotSpeed){p.mesh.rotation.x+=p.rotSpeed;p.mesh.rotation.y+=p.rotSpeed;}
    p.life-=p.decay;
    if(p.mesh.material)p.mesh.material.opacity=p.life;
    if(p.life<=0){scene.remove(p.mesh);particles.splice(i,1);}
  }
  // Engine glow pulse
  if(player&&player.mesh.children){
    const engineGlows=player.mesh.children.filter(c=>c.material&&c.material.color&&c.material.color.r>.8&&c.material.color.g<.3);
    const pulse=1+.1*Math.sin(frame*.2);
    engineGlows.forEach(g=>g.scale.setScalar(pulse));
  }
  // Cloud drift
  cloudGroup.rotation.y+=.0003;
  updateCamera();
}
function showOver(){
  document.getElementById('overlay').querySelector('h1').textContent='💥 被击落！'+score+'分';
  document.getElementById('overlay').style.display='flex';
}

// ─── Render Loop ───────────────────────────────────────────────
function loop(){requestAnimationFrame(loop);update();renderer.render(scene,camera);}
function start(){
  document.getElementById('overlay').style.display='none';
  document.getElementById('overlay').querySelector('h1').textContent='✈️ 3D空战';
  init();loop();
}
window.addEventListener('resize',()=>{
  const w=window.innerWidth,h=window.innerHeight;
  const ASP=Math.min(w,h*16/9),AHT=Math.min(h,w*9/16);
  renderer.setSize(ASP,AHT);
  camera.aspect=16/9;camera.updateProjectionMatrix();
});
init();
// Ambient background
(function ambientLoop(){
  if(!gameOver&&player){
    enemies.forEach(e=>{e.enginePhase=(e.enginePhase||0)+.05;});
  }
  requestAnimationFrame(ambientLoop);
})();
loop();
</script></body></html>
