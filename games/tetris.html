<!DOCTYPE html>
<html lang="zh"><head><meta charset="UTF-8"><title>🧱 俄罗斯方块</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0a0f;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;font-family:monospace}canvas{border-radius:8px;box-shadow:0 0 30px rgba(0,212,255,0.2)}#ui{position:fixed;top:16px;left:50%;transform:translateX(-50%);display:flex;gap:24px;color:#e2e8f0;font-size:15px;z-index:10}#ui span{background:rgba(255,255,255,0.05);padding:6px 16px;border-radius:8px;border:1px solid rgba(255,255,255,0.1)}</style></head>
<body>
<div id="ui"><span>分数: <b id="s">0</b></span><span>最高: <b id="h">0</b></span><span>等级: <b id="lv">1</b></span></div>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c');const ctx=canvas.getContext('2d');
const COLS=10,ROWS=20,CELL=24,PAD=4;
const W=COLS*CELL+PAD*2+120,H=ROWS*CELL+PAD*2;
canvas.width=W;canvas.height=H;

const PIECES=[
  {s:[[1,1,1,1]],c:'#00d4ff'},
  {s:[[1,1],[1,1]],c:'#f59e0b'},
  {s:[[0,1,0],[1,1,1]],c:'#a855f7'},
  {s:[[1,0,0],[1,1,1]],c:'#10b981'},
  {s:[[0,0,1],[1,1,1]],c:'#ef4444'},
  {s:[[1,1,0],[0,1,1]],c:'#06b6d4'},
  {s:[[0,1,1],[1,1,0]],c:'#f97316'},
];

let board,piece,nextPiece,px,py,score,high,level,frame;
high=parseInt(localStorage.getItem('tetris_hs')||'0');
document.getElementById('h').textContent=high;

function initBoard(){board=Array.from({length:ROWS},()=>Array(COLS).fill(0));}
function randomPiece(){const i=Math.floor(Math.random()*PIECES.length);return{...PIECES[i],rot:0};}

function spawn(){
  piece=nextPiece||randomPiece();nextPiece=randomPiece();
  px=Math.floor((COLS-piece.s[0].length)/2);py=0;
  if(collide()){gameOver();}
}

function collide(offsetX=0,offsetY=0,shape=piece.s){
  for(let r=0;r<shape.length;r++)for(let c=0;c<shape[r].length;c++){
    if(shape[r][c]){const nx=px+c+offsetX,ny=py+r+offsetY;
      if(nx<0||nx>=COLS||ny>=ROWS||(ny>=0&&board[ny][nx]))return true;}
  }return false;
}

function lock(){
  for(let r=0;r<piece.s.length;r++)for(let c=0;c<piece.s[r].length;c++){
    if(piece.s[r][c]&&py+r>=0)board[py+r][px+c]=piece.c;
  }
  clearLines();
  spawn();
}

function clearLines(){
  let lines=0;
  for(let r=ROWS-1;r>=0;r--){
    if(board[r].every(v=>v)){board.splice(r,1);board.unshift(Array(COLS).fill(0));lines++;r++;}
  }
  if(lines){score+=[0,100,300,600,1200][lines]||1200;level=Math.floor(score/1000)+1;
    document.getElementById('s').textContent=score;document.getElementById('lv').textContent=level;
    if(score>high){high=score;document.getElementById('h').textContent=high;localStorage.setItem('tetris_hs',high);}
  }
}

function rotate(){
  const ns=piece.s[0].map((_,i)=>piece.s.map(row=>row[i]).reverse());
  const oldS=piece.s;piece.s=ns;
  if(collide())piece.s=oldS;
}

function gameOver(){
  ctx.fillStyle='rgba(0,0,0,0.8)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#ef4444';ctx.font='bold 24px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('💀 游戏结束',W/2,H/2-20);
  ctx.fillStyle='#888';ctx.font='16px monospace';
  ctx.fillText('分数: '+score+' · 按 R 重来',W/2,H/2+20);
}

function draw(){
  ctx.fillStyle='#0a0a0f';ctx.fillRect(0,0,W,H);
  // Board
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const x=PAD+c*CELL,y=PAD+r*CELL;
    ctx.fillStyle='#111';
    ctx.beginPath();ctx.roundRect(x,y,CELL-1,CELL-1,3);ctx.fill();
    if(board[r][c]){ctx.fillStyle=board[r][c];ctx.beginPath();ctx.roundRect(x,y,CELL-1,CELL-1,3);ctx.fill();}
  }
  // Ghost
  if(piece){
    let ghostY=py;while(!collide(0,ghostY-py+1))ghostY++;
    for(let r=0;r<piece.s.length;r++)for(let c=0;c<piece.s[r].length;c++){
      if(piece.s[r][c]){ctx.fillStyle='rgba(255,255,255,0.08)';ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=1;
        const x=PAD+(px+c)*CELL,y=PAD+(ghostY+r)*CELL;
        ctx.beginPath();ctx.roundRect(x,y,CELL-1,CELL-1,3);ctx.fill();ctx.stroke();}
    }
    for(let r=0;r<piece.s.length;r++)for(let c=0;c<piece.s[r].length;c++){
      if(piece.s[r][c]&&py+r>=0){
        ctx.fillStyle=piece.c;ctx.shadowColor=piece.c;ctx.shadowBlur=8;
        const x=PAD+(px+c)*CELL,y=PAD+(py+r)*CELL;
        ctx.beginPath();ctx.roundRect(x,y,CELL-1,CELL-1,3);ctx.fill();ctx.shadowBlur=0;
      }
    }
  }
  // Next
  const nx=W-110,ny=PAD+20;
  ctx.fillStyle='rgba(255,255,255,0.05)';ctx.font='12px monospace';ctx.fillStyle='#666';ctx.textAlign='left';
  ctx.fillText('NEXT',nx,ny+10);
  if(nextPiece){
    for(let r=0;r<nextPiece.s.length;r++)for(let c=0;c<nextPiece.s[r].length;c++){
      if(nextPiece.s[r][c]){ctx.fillStyle=nextPiece.c;
        ctx.beginPath();ctx.roundRect(nx+c*20,ny+24+r*20,18,18,3);ctx.fill();}
    }
  }
}

let dropTimer=0,playing=true;
function update(){
  if(!playing)return;
  dropTimer++;
  const dropSpeed=Math.max(2,20-level*2);
  if(dropTimer>=dropSpeed){
    dropTimer=0;
    if(!collide(0,1))py++;
    else{lock();}
    draw();
  }
}

function loop(){update();requestAnimationFrame(loop);}
document.addEventListener('keydown',e=>{
  if(!playing)return;
  if(e.key==='ArrowLeft'&&!collide(-1)){px--;draw();}
  else if(e.key==='ArrowRight'&&!collide(1)){px++;draw();}
  else if(e.key==='ArrowDown'&&!collide(0,1)){py++;score+=1;document.getElementById('s').textContent=score;draw();}
  else if(e.key==='ArrowUp'||e.key===' ')rotate();
  else if(e.key==='r'||e.key==='R'){initBoard();score=0;level=1;document.getElementById('s').textContent=0;document.getElementById('lv').textContent=1;nextPiece=null;spawn();draw();}
});

initBoard();spawn();draw();loop();
</script>
</body></html>
