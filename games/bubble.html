<!DOCTYPE html>
<html lang="zh"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>🫧 泡泡龙</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:monospace;overflow:hidden}
canvas{border-radius:8px;display:block}
#hud{position:fixed;top:16px;left:50%;transform:translateX(-50%);display:flex;gap:24px;z-index:10}
.stat{background:rgba(0,0,0,.7);border:1px solid rgba(200,100,255,.2);padding:8px 20px;border-radius:8px;text-align:center}
.stat .v{font-size:22px;font-weight:900;color:#cc66ff;text-shadow:0 0 10px rgba(200,100,255,.6)}
.stat .l{font-size:10px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:2px}
#next{width:36px;height:36px;border-radius:50%;border:none;font-size:20px;cursor:default}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;backdrop-filter:blur(4px)}
#overlay h1{font-size:42px;color:#cc66ff;text-shadow:0 0 20px rgba(200,100,255,.6);margin-bottom:8px}
#overlay p{color:rgba(255,255,255,.4);margin-bottom:24px}
#start-btn{background:linear-gradient(90deg,#cc66ff,#9900cc);color:#fff;padding:14px 48px;border:none;border-radius:12px;font-size:18px;font-weight:900;cursor:pointer;font-family:monospace;box-shadow:0 0 30px rgba(200,100,255,.4)}
</style></head><body>
<div id="hud">
  <div class="stat"><div class="v" id="s">0</div><div class="l">分数</div></div>
  <div class="stat"><div class="v" id="h">0</div><div class="l">最高</div></div>
  <div class="stat"><div class="v" id="bubbles-left">0</div><div class="l">剩余</div></div>
</div>
<div id="overlay">
  <h1>🫧 泡泡龙</h1>
  <p>瞄准点击发射 · 同色3个以上泡泡消除</p>
  <button id="start-btn" onclick="start()">▶ 开始</button>
</div>
<canvas id="c"></canvas>
<script>
// ============================================================
// CLASSES
// ============================================================
class Bubble {
  constructor(x, y, vx, vy, r, color) {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy;
    this.r = r; this.color = color; this.active = true;
  }
  update(W) {
    this.x += this.vx; this.y += this.vy;
    if (this.x < this.r || this.x > W - this.r) this.vx *= -1;
    if (this.y < this.r) { this.active = false; return true; }
    return false;
  }
  draw(ctx) {
    const g = ctx.createRadialGradient(this.x - this.r * 0.3, this.y - this.r * 0.3, 0, this.x, this.y, this.r);
    g.addColorStop(0, this.color); g.addColorStop(1, 'rgba(0,0,0,0.3)');
    ctx.shadowColor = this.color; ctx.shadowBlur = 10;
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath(); ctx.arc(this.x - this.r * 0.3, this.y - this.r * 0.3, this.r * 0.25, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
  }
  hitTest(gx, gy, r) {
    return Math.sqrt((this.x - gx) ** 2 + (this.y - gy) ** 2) < (this.r + r) * 1.1;
  }
}

class Particle {
  constructor(x, y, color) {
    this.x = x; this.y = y; this.color = color;
    const a = Math.random() * Math.PI * 2, sp = 1 + Math.random() * 4;
    this.vx = Math.cos(a) * sp; this.vy = Math.sin(a) * sp;
    this.life = 1; this.decay = 0.03; this.r = 2 + Math.random() * 4;
  }
  update() {
    this.x += this.vx; this.y += this.vy; this.vy += 0.1;
    this.life -= this.decay;
  }
  draw(ctx) {
    ctx.globalAlpha = Math.max(0, this.life);
    ctx.fillStyle = this.color; ctx.shadowColor = this.color; ctx.shadowBlur = 5;
    ctx.beginPath(); ctx.arc(this.x, this.y, this.r * this.life, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0; ctx.globalAlpha = 1;
  }
  isDead() { return this.life <= 0; }
}

class Star {
  constructor(W, H) {
    this.x = Math.random() * W; this.y = Math.random() * H * 0.7;
    this.r = 0.5 + Math.random() * 1.5;
    this.twinkleSpeed = 0.02 + Math.random() * 0.05;
    this.offset = Math.random() * Math.PI * 2;
  }
  draw(ctx, frame) {
    const alpha = 0.3 + 0.7 * Math.abs(Math.sin(frame * this.twinkleSpeed + this.offset));
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// GAME
// ============================================================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = Math.min(480, window.innerWidth - 20), H = Math.min(640, window.innerHeight - 40);
canvas.width = W; canvas.height = H;

const COLS = 12, ROW_H = 32, R = 14;
const COLORS = ['#ff4444', '#4fc3f7', '#66bb6a', '#ffca28', '#ab47bc', '#ff8800'];
let grid, cur, next, score, high, over, bubbles, particles, stars, frame;
high = parseInt(localStorage.getItem('bubble_hs') || '0');
document.getElementById('h').textContent = high;
let aimAngle = -Math.PI / 2;

function init() {
  grid = []; frame = 0;
  cur = COLORS[Math.floor(Math.random() * COLORS.length)];
  next = COLORS[Math.floor(Math.random() * COLORS.length)];
  score = 0; over = false; bubbles = []; particles = [];
  stars = Array.from({ length: 60 }, () => new Star(W, H));
  document.getElementById('s').textContent = 0;
  for (let r = 0; r < 3; r++) {
    grid[r] = [];
    const offset = r % 2 === 1 ? R : 0;
    const cnt = r % 2 === 1 ? COLS - 1 : COLS;
    for (let c = 0; c < cnt; c++) {
      grid[r][c] = { color: COLORS[Math.floor(Math.random() * COLORS.length)], x: offset + c * R * 2 + R, y: r * ROW_H + ROW_H / 2 };
    }
  }
  let total = 0; grid.forEach(row => row && row.forEach(b => b && total++));
  document.getElementById('bubbles-left').textContent = total;
}

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const shooterY = H - 50;
  aimAngle = Math.atan2(shooterY - (e.clientY - rect.top), W / 2 - (e.clientX - rect.left));
});
canvas.addEventListener('click', shoot);

function shoot() {
  if (over) return;
  const spd = 12, shooterY = H - 50;
  bubbles.push(new Bubble(W / 2, shooterY, Math.cos(aimAngle) * spd, Math.sin(aimAngle) * spd, R, cur));
  cur = next; next = COLORS[Math.floor(Math.random() * COLORS.length)];
}

function snapBubble(x, y, color) {
  let best = null, minD = Infinity;
  for (let r = 0; r < grid.length + 1; r++) {
    for (let c = 0; c < (r % 2 === 1 ? (grid[r] || []).length || COLS - 1 : COLS); c++) {
      const row = grid[r] || [];
      const bx = (r % 2 === 1 ? R : 0) + c * R * 2 + R;
      const by = r * ROW_H + ROW_H / 2;
      const d = Math.sqrt((x - bx) ** 2 + (y - by) ** 2);
      if (d < minD) { minD = d; best = { r, c, bx, by }; }
    }
  }
  if (!best) return;
  if (!grid[best.r]) grid[best.r] = [];
  grid[best.r][best.c] = { color, x: best.bx, y: best.by };
  const matches = findMatches(best.r, best.c, color);
  if (matches.length >= 3) {
    matches.forEach(({ r, c }) => {
      if (grid[r] && grid[r][c]) {
        spawnExplosion(grid[r][c].x, grid[r][c].y, color);
        grid[r][c] = null;
        score += 10;
      }
    });
    score += 20;
    // Drop floating bubbles
    const connected = new Set();
    const top = grid[0] || [];
    const queue = [];
    top.forEach((b, c) => { if (b) queue.push([0, c]); });
    while (queue.length) {
      const [r, c] = queue.shift();
      const key = `${r},${c}`;
      if (connected.has(key)) continue;
      const br = grid[r];
      if (br && br[c]) {
        connected.add(key);
        const nb = [[r + 1, c], [r + 1, c - 1], [r + 1, c + 1]];
        nb.forEach(([nr, nc]) => {
          const nb2 = grid[nr];
          if (nb2 && nb2[nc]) queue.push([nr, nc]);
        });
      }
    }
    for (let r = 0; r < grid.length; r++) {
      for (let c = 0; c < (grid[r] || []).length; c++) {
        if (grid[r][c] && !connected.has(`${r},${c}`)) {
          spawnExplosion(grid[r][c].x, grid[r][c].y, grid[r][c].color);
          grid[r][c] = null;
          score += 30;
        }
      }
    }
  }
  // Expand grid if needed
  while (grid.length && grid[grid.length - 1].some(b => b !== null)) {
    const r = grid.length;
    grid[r] = [];
    const offset = r % 2 === 1 ? R : 0;
    const cnt = r % 2 === 1 ? COLS - 1 : COLS;
    for (let c = 0; c < cnt; c++) {
      grid[r][c] = { color: COLORS[Math.floor(Math.random() * COLORS.length)], x: offset + c * R * 2 + R, y: r * ROW_H + ROW_H / 2 };
    }
  }
  let totalBubbles = 0;
  grid.forEach(row => row && row.forEach(b => b && totalBubbles++));
  document.getElementById('bubbles-left').textContent = totalBubbles;
  document.getElementById('s').textContent = score;
  if (score > high) { high = score; document.getElementById('h').textContent = high; localStorage.setItem('bubble_hs', high); }
  if (totalBubbles === 0) {
    over = true;
    document.getElementById('overlay').querySelector('h1').textContent = '🎉 通关！';
    document.getElementById('overlay').style.display = 'flex';
  }
}

function findMatches(startR, startC, color) {
  const visited = new Set(), result = [], queue = [[startR, startC]];
  while (queue.length) {
    const [r, c] = queue.shift();
    const key = `${r},${c}`;
    if (visited.has(key)) continue;
    const row = grid[r];
    if (!row || !row[c] || row[c].color !== color) continue;
    visited.add(key);
    result.push({ r, c });
    [[r - 1, c], [r + 1, c], [r, c - 1], [r, c + 1]].forEach(([nr, nc]) => queue.push([nr, nc]));
  }
  return result;
}

function spawnExplosion(x, y, color) {
  for (let i = 0; i < 14; i++) particles.push(new Particle(x, y, color));
  // Extra ring particles
  for (let i = 0; i < 8; i++) {
    const a = (i / 8) * Math.PI * 2;
    particles.push(new Particle(x, y, '#ffffff'));
    particles[particles.length - 1].vx = Math.cos(a) * 6;
    particles[particles.length - 1].vy = Math.sin(a) * 6;
    particles[particles.length - 1].r = 1.5;
    particles[particles.length - 1].decay = 0.05;
  }
}

function update() {
  frame++;
  const shooterY = H - 50;
  for (const b of bubbles) {
    if (!b.active) continue;
    const done = b.update(W);
    if (done) { snapBubble(b.x, R, cur); continue; }
    for (let r = 0; r < grid.length; r++) {
      for (let c = 0; c < (grid[r] || []).length; c++) {
        const g = grid[r][c];
        if (!g) continue;
        if (b.hitTest(g.x, g.y, R)) { b.active = false; snapBubble(b.x, b.y, cur); break; }
      }
    }
  }
  bubbles = bubbles.filter(b => b.active);
  particles.forEach(p => p.update());
  particles = particles.filter(p => !p.isDead());
}

function draw() {
  ctx.fillStyle = '#06060f'; ctx.fillRect(0, 0, W, H);
  // Star field
  stars.forEach(s => s.draw(ctx, frame));
  // Nebula glow
  const neb = ctx.createRadialGradient(W * 0.3, H * 0.2, 0, W * 0.3, H * 0.2, 200);
  neb.addColorStop(0, 'rgba(100,0,150,0.15)'); neb.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = neb; ctx.fillRect(0, 0, W, H);
  const neb2 = ctx.createRadialGradient(W * 0.7, H * 0.6, 0, W * 0.7, H * 0.6, 180);
  neb2.addColorStop(0, 'rgba(0,80,150,0.1)'); neb2.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = neb2; ctx.fillRect(0, 0, W, H);
  // Grid bubbles
  grid.forEach((row, r) => {
    if (!row) return;
    row.forEach((b, c) => {
      if (!b) return;
      const g = ctx.createRadialGradient(b.x - b.r * 0.3, b.y - b.r * 0.3, 0, b.x, b.y, b.r);
      g.addColorStop(0, b.color); g.addColorStop(1, 'rgba(0,0,0,0.3)');
      ctx.shadowColor = b.color; ctx.shadowBlur = 8;
      ctx.fillStyle = g; ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.beginPath(); ctx.arc(b.x - b.r * 0.3, b.y - b.r * 0.3, b.r * 0.25, 0, Math.PI * 2); ctx.fill();
    });
  });
  // Active bubbles
  bubbles.forEach(b => b.draw(ctx));
  // Aim line
  const shooterY = H - 50;
  ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1.5; ctx.setLineDash([6, 4]);
  ctx.beginPath(); ctx.moveTo(W / 2, shooterY);
  ctx.lineTo(W / 2 + Math.cos(aimAngle) * 200, shooterY + Math.sin(aimAngle) * 200); ctx.stroke();
  ctx.setLineDash([]);
  // Current bubble
  const g = ctx.createRadialGradient(W / 2 - R * 0.3, shooterY - R * 0.3, 0, W / 2, shooterY, R);
  g.addColorStop(0, cur); g.addColorStop(1, 'rgba(0,0,0,0.3)');
  ctx.fillStyle = g; ctx.shadowColor = cur; ctx.shadowBlur = 15;
  ctx.beginPath(); ctx.arc(W / 2, shooterY, R, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0;
  // Next bubble
  const ng = ctx.createRadialGradient(W - 50 - R * 0.3, H - 30 - R * 0.3, 0, W - 50, H - 30, R);
  ng.addColorStop(0, next); ng.addColorStop(1, 'rgba(0,0,0,0.3)');
  ctx.fillStyle = ng; ctx.beginPath(); ctx.arc(W - 50, H - 30, R, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.font = '10px monospace'; ctx.fillText('NEXT', W - 60, H - 48);
  // Particles
  particles.forEach(p => p.draw(ctx));
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
function start() {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('overlay').querySelector('h1').textContent = '🫧 泡泡龙';
  init(); loop();
}
document.getElementById('overlay').style.display = 'flex'; init(); loop();
</script></body></html>
