<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>球球吞噬战 Blob Battle IO</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a1a; }
  canvas { display: block; cursor: none; }

  #overlay {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(10,10,26,0.92);
    z-index: 10;
    font-family: 'Segoe UI', 'PingFang SC', sans-serif;
  }
  #overlay h1 {
    font-size: 3.2rem;
    font-weight: 900;
    letter-spacing: 0.08em;
    background: linear-gradient(135deg, #00e5ff, #ff00c8, #ffcc00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.4rem;
    text-shadow: none;
  }
  #overlay .subtitle {
    color: rgba(255,255,255,0.5);
    font-size: 1rem;
    letter-spacing: 0.15em;
    margin-bottom: 2.5rem;
    text-transform: uppercase;
  }
  .instructions {
    display: flex; gap: 2rem; margin-bottom: 2.5rem;
  }
  .inst-item {
    text-align: center; color: rgba(255,255,255,0.75);
    font-size: 0.85rem; line-height: 1.6;
  }
  .inst-item .icon { font-size: 2rem; margin-bottom: 0.3rem; }
  #start-btn {
    padding: 0.9rem 3.5rem;
    font-size: 1.2rem;
    font-weight: 800;
    letter-spacing: 0.12em;
    color: #fff;
    background: linear-gradient(135deg, #00e5ff, #7b2fff);
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 0 40px rgba(0,229,255,0.45), 0 0 80px rgba(123,47,255,0.2);
    transition: transform 0.18s, box-shadow 0.18s;
    text-transform: uppercase;
  }
  #start-btn:hover {
    transform: scale(1.07);
    box-shadow: 0 0 60px rgba(0,229,255,0.65), 0 0 120px rgba(123,47,255,0.35);
  }
  #start-btn:active { transform: scale(0.97); }

  #hud {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    display: none;
    gap: 2rem;
    font-family: 'Segoe UI', 'PingFang SC', sans-serif;
    color: #fff;
    font-size: 0.95rem;
    pointer-events: none;
    z-index: 5;
  }
  .hud-item {
    display: flex; flex-direction: column; align-items: center;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    padding: 8px 20px;
    backdrop-filter: blur(8px);
  }
  .hud-label { font-size: 0.65rem; color: rgba(255,255,255,0.45); letter-spacing: 0.12em; text-transform: uppercase; }
  .hud-value { font-size: 1.3rem; font-weight: 800; color: #fff; }

  #minimap {
    position: fixed; bottom: 18px; right: 18px;
    width: 150px; height: 150px;
    background: rgba(0,0,0,0.55);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    display: none;
    pointer-events: none;
    z-index: 5;
  }
  #minimap-label {
    position: fixed; bottom: 174px; right: 18px;
    font-size: 0.6rem; color: rgba(255,255,255,0.3);
    letter-spacing: 0.1em; text-transform: uppercase;
    display: none; pointer-events: none; z-index: 5;
  }

  #death-overlay {
    position: fixed; inset: 0;
    display: none;
    flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(10,10,26,0.88);
    z-index: 20;
    font-family: 'Segoe UI', 'PingFang SC', sans-serif;
  }
  #death-overlay h2 {
    font-size: 2.5rem; font-weight: 900; color: #ff4466;
    letter-spacing: 0.08em; margin-bottom: 0.5rem;
    text-shadow: 0 0 30px rgba(255,68,102,0.6);
  }
  #death-score {
    font-size: 1.1rem; color: rgba(255,255,255,0.6);
    margin-bottom: 2rem; letter-spacing: 0.05em;
  }
  #restart-btn {
    padding: 0.85rem 3rem;
    font-size: 1.1rem; font-weight: 800;
    letter-spacing: 0.12em; color: #fff;
    background: linear-gradient(135deg, #ff4466, #ff8800);
    border: none; border-radius: 50px; cursor: pointer;
    box-shadow: 0 0 40px rgba(255,68,102,0.4);
    transition: transform 0.18s, box-shadow 0.18s;
    text-transform: uppercase;
  }
  #restart-btn:hover {
    transform: scale(1.07);
    box-shadow: 0 0 60px rgba(255,68,102,0.6);
  }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="overlay">
  <h1>球球吞噬战</h1>
  <div class="subtitle">Blob Battle IO</div>
  <div class="instructions">
    <div class="inst-item">
      <div class="icon">🎯</div>
      <div>移动鼠标<br>控制方向</div>
    </div>
    <div class="inst-item">
      <div class="icon">⬇</div>
      <div>吞噬比你小的球<br>获得质量</div>
    </div>
    <div class="inst-item">
      <div class="icon">⚠</div>
      <div>远离比你大的球<br>否则会被吃掉</div>
    </div>
  </div>
  <button id="start-btn" onclick="start()">▶ 开始</button>
</div>

<div id="hud">
  <div class="hud-item"><span class="hud-label">得分</span><span class="hud-value" id="hud-score">0</span></div>
  <div class="hud-item"><span class="hud-label">质量</span><span class="hud-value" id="hud-mass">10</span></div>
  <div class="hud-item"><span class="hud-label">存活</span><span class="hud-value" id="hud-time">0s</span></div>
  <div class="hud-item"><span class="hud-label">排名</span><span class="hud-value" id="hud-rank">#1</span></div>
</div>
<canvas id="minimap"></canvas>
<div id="minimap-label">地图</div>

<div id="death-overlay">
  <h2>游戏结束</h2>
  <div id="death-score">得分: 0 | 存活: 0s</div>
  <button id="restart-btn" onclick="restartGame()">再来一局</button>
</div>

<script>
// ─────────────────────────────────────────────
// CANVAS SETUP
// ─────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const mmCanvas = document.getElementById('minimap');
const mmCtx = mmCanvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  mmCanvas.width = 150;
  mmCanvas.height = 150;
}
resize();
window.addEventListener('resize', resize);

// ─────────────────────────────────────────────
// CONSTANTS
// ─────────────────────────────────────────────
const WORLD_W = 2400;
const WORLD_H = 2400;
const NEON_PALETTE = [
  '#00e5ff','#ff00c8','#ff4466','#ffcc00',
  '#00ff9d','#9d00ff','#ff8800','#39ff14',
  '#ff1493','#00bfff','#ffd700','#ff6b35',
];
const GRID_COLOR = 'rgba(255,255,255,0.045)';
const BG_COLOR = '#0a0a1a';

// ─────────────────────────────────────────────
// GAME STATE
// ─────────────────────────────────────────────
let player, blobs, particles, deathParticles;
let camera = { x: 0, y: 0 };
let mouseX = 0, mouseY = 0;
let score = 0;
let gameTime = 0;
let gameRunning = false;
let lastTime = 0;
let pulseTime = 0;
let frameId = null;

// ─────────────────────────────────────────────
// UTILITIES
// ─────────────────────────────────────────────
function rand(min, max) { return Math.random() * (max - min) + min; }
function randInt(min, max) { return Math.floor(rand(min, max + 1)); }
function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

function massToRadius(mass) {
  return Math.sqrt(mass) * 3.2;
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return { r, g, b };
}

function lighten(hex, amt) {
  const { r, g, b } = hexToRgb(hex);
  return `rgb(${clamp(r+amt,0,255)},${clamp(g+amt,0,255)},${clamp(b+amt,0,255)})`;
}

// ─────────────────────────────────────────────
// PLAYER
// ─────────────────────────────────────────────
function createPlayer() {
  return {
    x: WORLD_W / 2,
    y: WORLD_H / 2,
    vx: 0,
    vy: 0,
    mass: 10,
    color: '#00e5ff',
    name: '你',
    trail: [],
    alive: true,
  };
}

// ─────────────────────────────────────────────
// AI BLOBS
// ─────────────────────────────────────────────
function createBlob(id, forceMass) {
  const mass = forceMass || rand(5, 55);
  const r = massToRadius(mass);
  const color = NEON_PALETTE[id % NEON_PALETTE.length];
  const angle = Math.random() * Math.PI * 2;
  const speed = rand(35, 80) / Math.sqrt(r);
  return {
    id,
    x: rand(r, WORLD_W - r),
    y: rand(r, WORLD_H - r),
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    mass,
    color,
    wanderAngle: angle,
    wanderTimer: rand(1, 4),
    behavior: Math.random() < 0.3 ? 'aggressive' : 'neutral',
    alive: true,
  };
}

function spawnBlob() {
  blobs = blobs.filter(b => b.alive);
  const id = Date.now() + Math.random();
  const mass = rand(4, 45);
  blobs.push(createBlob(id, mass));
}

// ─────────────────────────────────────────────
// PARTICLES
// ─────────────────────────────────────────────
function spawnParticles(x, y, color, count, bigMass) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i + rand(-0.3, 0.3);
    const speed = rand(60, 200) * (bigMass ? 2 : 1);
    const life = rand(0.4, 1.2);
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life, maxLife: life,
      color,
      size: rand(2, 6),
    });
  }
}

function spawnTrailParticle() {
  if (!player.alive) return;
  const p = {
    x: player.x + rand(-5, 5),
    y: player.y + rand(-5, 5),
    vx: -player.vx * 0.05 + rand(-5, 5),
    vy: -player.vy * 0.05 + rand(-5, 5),
    life: rand(0.3, 0.7),
    maxLife: 0.6,
    color: player.color,
    size: rand(2, 4),
  };
  particles.push(p);
}

function spawnDeathBurst() {
  for (let i = 0; i < 60; i++) {
    const angle = (Math.PI * 2 / 60) * i;
    const speed = rand(50, 350);
    const life = rand(0.5, 1.8);
    deathParticles.push({
      x: player.x,
      y: player.y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life, maxLife: life,
      color: player.color,
      size: rand(4, 14),
      friction: 0.94,
    });
  }
}

// ─────────────────────────────────────────────
// COLLISION
// ─────────────────────────────────────────────
function checkCollisions() {
  if (!player.alive) return;

  for (let i = blobs.length - 1; i >= 0; i--) {
    const blob = blobs[i];
    if (!blob.alive) continue;

    const d = dist(player, blob);
    const sumR = massToRadius(player.mass) + massToRadius(blob.mass);

    if (d < sumR * 0.75) {
      if (player.mass > blob.mass * 1.08) {
        // Player eats blob
        const gain = blob.mass * 0.7;
        player.mass += gain;
        score += Math.round(blob.mass * 10);
        spawnParticles(blob.x, blob.y, blob.color, 14, false);
        blob.alive = false;
        blobs.splice(i, 1);
        spawnBlob();
      } else if (blob.mass > player.mass * 1.08) {
        // Player dies
        playerDeath(blob);
        return;
      }
    }
  }

  // AI vs AI
  for (let i = blobs.length - 1; i >= 0; i--) {
    for (let j = blobs.length - 1; j > i; j--) {
      const a = blobs[i], b = blobs[j];
      if (!a.alive || !b.alive) continue;
      const d = dist(a, b);
      const sumR = massToRadius(a.mass) + massToRadius(b.mass);
      if (d < sumR * 0.72) {
        if (a.mass > b.mass * 1.1) {
          a.mass += b.mass * 0.5;
          b.alive = false;
          spawnParticles(b.x, b.y, b.color, 10, false);
        } else if (b.mass > a.mass * 1.1) {
          b.mass += a.mass * 0.5;
          a.alive = false;
          spawnParticles(a.x, a.y, a.color, 10, false);
        }
      }
    }
  }
}

function playerDeath(byBlob) {
  player.alive = false;
  spawnDeathBurst();
  setTimeout(() => {
    document.getElementById('death-score').textContent =
      `得分: ${score} | 存活: ${Math.floor(gameTime)}s`;
    document.getElementById('death-overlay').style.display = 'flex';
  }, 1400);
}

// ─────────────────────────────────────────────
// UPDATE
// ─────────────────────────────────────────────
function updatePlayer(dt) {
  if (!player.alive) return;

  // World coords
  const worldMouseX = mouseX - canvas.width / 2 + camera.x;
  const worldMouseY = mouseY - canvas.height / 2 + camera.y;

  const dx = worldMouseX - player.x;
  const dy = worldMouseY - player.y;
  const angle = Math.atan2(dy, dx);
  const dist = Math.hypot(dx, dy);
  const r = massToRadius(player.mass);
  const speed = Math.max(30, 220 / Math.sqrt(r / 10)) * dt;

  player.vx = lerp(player.vx, Math.cos(angle) * speed, 0.12);
  player.vy = lerp(player.vy, Math.sin(angle) * speed, 0.12);
  player.x += player.vx;
  player.y += player.vy;

  // Clamp to world
  player.x = clamp(player.x, r, WORLD_W - r);
  player.y = clamp(player.y, r, WORLD_H - r);

  // Trail
  if (Math.random() < 0.6) {
    spawnTrailParticle();
  }
  player.trail.push({ x: player.x, y: player.y, t: 0 });
  if (player.trail.length > 30) player.trail.shift();
  player.trail.forEach(p => p.t += dt);
}

function updateBlobs(dt) {
  for (const blob of blobs) {
    if (!blob.alive) continue;
    const r = massToRadius(blob.mass);
    const maxSpd = Math.max(20, 70 / Math.sqrt(r / 10));
    const pr = massToRadius(player.mass);

    if (blob.behavior === 'aggressive' && player.alive) {
      const d = dist(blob, player);
      if (blob.mass > player.mass * 1.15 && d < 500) {
        const angle = Math.atan2(player.y - blob.y, player.x - blob.x);
        blob.vx = lerp(blob.vx, Math.cos(angle) * maxSpd * 1.4, 0.04);
        blob.vy = lerp(blob.vy, Math.sin(angle) * maxSpd * 1.4, 0.04);
      }
    }

    blob.wanderTimer -= dt;
    if (blob.wanderTimer <= 0) {
      blob.wanderAngle += rand(-1.2, 1.2);
      blob.wanderTimer = rand(1, 3.5);
    }

    blob.vx = lerp(blob.vx, Math.cos(blob.wanderAngle) * maxSpd, 0.05);
    blob.vy = lerp(blob.vy, Math.sin(blob.wanderAngle) * maxSpd, 0.05);
    blob.x += blob.vx * dt;
    blob.y += blob.vy * dt;

    // Bounce off walls
    if (blob.x < r) { blob.x = r; blob.vx = Math.abs(blob.vx); blob.wanderAngle = Math.PI - blob.wanderAngle; }
    if (blob.x > WORLD_W - r) { blob.x = WORLD_W - r; blob.vx = -Math.abs(blob.vx); blob.wanderAngle = Math.PI - blob.wanderAngle; }
    if (blob.y < r) { blob.y = r; blob.vy = Math.abs(blob.vy); blob.wanderAngle = -blob.wanderAngle; }
    if (blob.y > WORLD_H - r) { blob.y = WORLD_H - r; blob.vy = -Math.abs(blob.vy); blob.wanderAngle = -blob.wanderAngle; }
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= 0.93;
    p.vy *= 0.93;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (let i = deathParticles.length - 1; i >= 0; i--) {
    const p = deathParticles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= p.friction;
    p.vy *= p.friction;
    p.life -= dt;
    if (p.life <= 0) deathParticles.splice(i, 1);
  }
}

function updateCamera(dt) {
  if (!player.alive) return;
  const targetX = player.x;
  const targetY = player.y;
  camera.x = lerp(camera.x, targetX, 0.08);
  camera.y = lerp(camera.y, targetY, 0.08);
}

function updateHUD() {
  document.getElementById('hud-score').textContent = score;
  document.getElementById('hud-mass').textContent = Math.floor(player.mass);
  document.getElementById('hud-time').textContent = Math.floor(gameTime) + 's';
  const rank = blobs.filter(b => b.alive && b.mass > player.mass).length + 1;
  document.getElementById('hud-rank').textContent = '#' + rank;
}

// ─────────────────────────────────────────────
// DRAW HELPERS
// ─────────────────────────────────────────────
function drawGrid() {
  const gs = 80;
  const offX = -(camera.x % gs);
  const offY = -(camera.y % gs);
  ctx.strokeStyle = GRID_COLOR;
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let x = offX; x < canvas.width + gs; x += gs) {
    ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height);
  }
  for (let y = offY; y < canvas.height + gs; y += gs) {
    ctx.moveTo(0, y); ctx.lineTo(canvas.width, y);
  }
  ctx.stroke();
}

function drawWorldBorder() {
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.18)';
  ctx.lineWidth = 3;
  const x1 = -camera.x;
  const y1 = -camera.y;
  ctx.strokeRect(x1, y1, WORLD_W, WORLD_H);
  ctx.restore();
}

function drawBlob(b, isPlayer) {
  const sx = b.x - camera.x;
  const sy = b.y - camera.y;
  const r = massToRadius(b.mass);
  const intensity = clamp(0.55 + b.mass / 120, 0.55, 1.0);
  const rgb = hexToRgb(b.color);

  // Glow shadow
  ctx.save();
  ctx.shadowBlur = isPlayer ? (30 + Math.sin(pulseTime * 4) * 12) : (18 + r * 0.4);
  ctx.shadowColor = b.color;

  // Outer ring for bigger blobs
  if (r > 20) {
    ctx.beginPath();
    ctx.arc(sx, sy, r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},0.25)`;
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Main gradient fill
  const grd = ctx.createRadialGradient(sx, sy, 0, sx, sy, r);
  grd.addColorStop(0, `rgba(${clamp(rgb.r+60,0,255)},${clamp(rgb.g+60,0,255)},${clamp(rgb.b+60,0,255)},${intensity})`);
  grd.addColorStop(0.5, b.color);
  grd.addColorStop(1, `rgba(${rgb.r},${rgb.g},${rgb.b},0)`);
  ctx.beginPath();
  ctx.arc(sx, sy, r, 0, Math.PI * 2);
  ctx.fillStyle = grd;
  ctx.fill();
  ctx.restore();

  // Inner shine
  ctx.save();
  ctx.globalAlpha = 0.3 * intensity;
  const shine = ctx.createRadialGradient(sx - r * 0.25, sy - r * 0.25, 0, sx, sy, r);
  shine.addColorStop(0, 'rgba(255,255,255,0.9)');
  shine.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.beginPath();
  ctx.arc(sx, sy, r * 0.8, 0, Math.PI * 2);
  ctx.fillStyle = shine;
  ctx.fill();
  ctx.restore();

  // Label
  if (r > 14) {
    ctx.save();
    ctx.font = `bold ${Math.min(r * 0.55, 16)}px 'Segoe UI', sans-serif`;
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowBlur = 6;
    ctx.shadowColor = 'rgba(0,0,0,0.8)';
    ctx.fillText(isPlayer ? '你' : (b.name || ''), sx, sy);
    ctx.restore();
  }
}

function drawTrail() {
  for (let i = 0; i < player.trail.length; i++) {
    const p = player.trail[i];
    const alpha = (i / player.trail.length) * 0.35;
    const r = massToRadius(player.mass) * 0.25 * (i / player.trail.length);
    const sx = p.x - camera.x;
    const sy = p.y - camera.y;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = player.color;
    ctx.shadowBlur = 10;
    ctx.shadowColor = player.color;
    ctx.beginPath();
    ctx.arc(sx, sy, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function drawParticles() {
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    const sx = p.x - camera.x;
    const sy = p.y - camera.y;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.shadowBlur = 8;
    ctx.shadowColor = p.color;
    ctx.beginPath();
    ctx.arc(sx, sy, p.size * alpha, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  for (const p of deathParticles) {
    const alpha = p.life / p.maxLife;
    const sx = p.x - camera.x;
    const sy = p.y - camera.y;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.shadowBlur = 15;
    ctx.shadowColor = p.color;
    ctx.beginPath();
    ctx.arc(sx, sy, p.size * alpha, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function drawCursor() {
  const sx = mouseX;
  const sy = mouseY;
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.55)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.arc(sx, sy, 12, 0, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(sx - 16, sy);
  ctx.lineTo(sx - 6, sy);
  ctx.moveTo(sx + 6, sy);
  ctx.lineTo(sx + 16, sy);
  ctx.moveTo(sx, sy - 16);
  ctx.lineTo(sx, sy - 6);
  ctx.moveTo(sx, sy + 6);
  ctx.lineTo(sx, sy + 16);
  ctx.stroke();
  ctx.restore();
}

function drawMinimap() {
  const scale = 150 / Math.max(WORLD_W, WORLD_H);
  mmCtx.clearRect(0, 0, 150, 150);
  mmCtx.fillStyle = 'rgba(0,0,0,0.4)';
  mmCtx.fillRect(0, 0, 150, 150);

  // Draw blobs
  for (const blob of blobs) {
    if (!blob.alive) continue;
    const r = massToRadius(blob.mass) * scale;
    const mx = blob.x * scale;
    const my = blob.y * scale;
    mmCtx.fillStyle = blob.color;
    mmCtx.globalAlpha = 0.75;
    mmCtx.beginPath();
    mmCtx.arc(mx, my, Math.max(r, 1.5), 0, Math.PI * 2);
    mmCtx.fill();
  }

  // Draw player
  if (player.alive) {
    const px = player.x * scale;
    const py = player.y * scale;
    const pr = Math.max(massToRadius(player.mass) * scale, 2);
    mmCtx.globalAlpha = 1;
    mmCtx.fillStyle = player.color;
    mmCtx.beginPath();
    mmCtx.arc(px, py, pr, 0, Math.PI * 2);
    mmCtx.fill();
    mmCtx.strokeStyle = '#fff';
    mmCtx.lineWidth = 1;
    mmCtx.stroke();
  }

  mmCtx.globalAlpha = 1;
}

// ─────────────────────────────────────────────
// DRAW
// ─────────────────────────────────────────────
function draw() {
  ctx.fillStyle = BG_COLOR;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawGrid();
  drawWorldBorder();

  // Sort blobs by size so big ones render on top
  const sorted = [...blobs].sort((a, b) => a.mass - b.mass);
  for (const blob of sorted) {
    if (blob.alive) drawBlob(blob, false);
  }

  if (player.alive) {
    drawTrail();
    drawBlob(player, true);
  }

  drawParticles();
  drawCursor();
  drawMinimap();
}

// ─────────────────────────────────────────────
// GAME LOOP
// ─────────────────────────────────────────────
function loop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  pulseTime += dt;
  gameTime += dt;

  updatePlayer(dt);
  updateBlobs(dt);
  checkCollisions();
  updateParticles(dt);
  updateCamera(dt);
  if (player.alive) updateHUD();

  draw();
  frameId = requestAnimationFrame(loop);
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
function init() {
  player = createPlayer();
  blobs = [];
  particles = [];
  deathParticles = [];
  score = 0;
  gameTime = 0;
  pulseTime = 0;
  camera.x = player.x;
  camera.y = player.y;

  for (let i = 0; i < 18; i++) {
    blobs.push(createBlob(i, rand(5, 55)));
  }

  document.getElementById('hud').style.display = 'flex';
  document.getElementById('minimap').style.display = 'block';
  document.getElementById('minimap-label').style.display = 'block';

  lastTime = performance.now();
  if (frameId) cancelAnimationFrame(frameId);
  frameId = requestAnimationFrame(loop);
}

// ─────────────────────────────────────────────
// START / RESTART
// ─────────────────────────────────────────────
function start() {
  document.getElementById('overlay').style.display = 'none';
  init();
}

function restartGame() {
  document.getElementById('death-overlay').style.display = 'none';
  init();
}

// ─────────────────────────────────────────────
// INPUT
// ─────────────────────────────────────────────
canvas.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  mouseX = e.touches[0].clientX;
  mouseY = e.touches[0].clientY;
}, { passive: false });

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  mouseX = e.touches[0].clientX;
  mouseY = e.touches[0].clientY;
}, { passive: false });

// ─────────────────────────────────────────────
// IDLE STATE (draw something before start)
// ─────────────────────────────────────────────
(function idleLoop() {
  if (gameRunning) return;
  ctx.fillStyle = BG_COLOR;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  drawGrid();
  requestAnimationFrame(idleLoop);
})();

// start() is called by button onclick
</script>
