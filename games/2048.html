<!DOCTYPE html>
<html lang="zh"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>🔢 2048 数字挑战</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0812;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;font-family:monospace}
#hud{position:fixed;top:16px;left:50%;transform:translateX(-50%);display:flex;gap:16px;z-index:10}
.stat{background:rgba(0,0,0,0.7);border:1px solid rgba(240,147,51,0.2);padding:8px 20px;border-radius:8px;text-align:center;backdrop-filter:blur(8px)}
.stat .v{font-size:22px;font-weight:900;color:#f0934c;text-shadow:0 0 10px rgba(240,147,51,0.6)}
.stat .l{font-size:10px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1px}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;backdrop-filter:blur(4px)}
#overlay h1{font-size:42px;background:linear-gradient(90deg,#f0934c,#f0934c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:900;margin-bottom:8px}
#overlay p{color:rgba(255,255,255,0.5);margin-bottom:24px;font-size:14px}
#start-btn{background:linear-gradient(90deg,#f0934c,#f0934c);color:#000;padding:14px 48px;border:none;border-radius:12px;font-size:18px;font-weight:900;cursor:pointer;font-family:monospace;transition:all .2s;box-shadow:0 0 30px rgba(240,147,51,0.4)}
#start-btn:hover{transform:scale(1.05);box-shadow:0 0 50px rgba(240,147,51,0.6)}
</style></head><body>
<div id="hud">
  <div class="stat"><div class="v" id="s">0</div><div class="l">分数</div></div>
  <div class="stat"><div class="v" id="h">0</div><div class="l">最高</div></div>
</div>
<div id="overlay">
  <h1>🔢 2048</h1>
  <p>↑ ↓ ← → 滑动合并方块，挑战2048！</p>
  <button id="start-btn" onclick="startGame()">▶ 开始挑战</button>
</div>
<canvas id="c"></canvas>
<script>
try {
// ============================================================
// TILE COLOR PALETTE WITH GRADIENTS
// ============================================================
const COLORS = {
  2:    { bg: '#eee4da', fg: '#776e65', glow: 'rgba(238,228,218,0.5)', grad: ['#eee4da','#ddd0c0'] },
  4:    { bg: '#ede0c8', fg: '#776e65', glow: 'rgba(237,224,200,0.5)', grad: ['#ede0c8','#dcd0b0'] },
  8:    { bg: '#f2b179', fg: '#f9f6f2', glow: 'rgba(242,177,121,0.6)', grad: ['#f2c080','#e89850'] },
  16:   { bg: '#f59563', fg: '#f9f6f2', glow: 'rgba(245,149,99,0.6)',  grad: ['#f5a870','#e08040'] },
  32:   { bg: '#f67c5f', fg: '#f9f6f2', glow: 'rgba(246,124,95,0.7)',  grad: ['#f68c70','#e06040'] },
  64:   { bg: '#f65e3b', fg: '#f9f6f2', glow: 'rgba(246,94,59,0.8)',   grad: ['#f67050','#e04020'] },
  128:  { bg: '#edcf72', fg: '#f9f6f2', glow: 'rgba(237,207,114,0.8)', grad: ['#f0d880','#e0c050'] },
  256:  { bg: '#edcc61', fg: '#f9f6f2', glow: 'rgba(237,204,97,0.8)',  grad: ['#f0d870','#e0c040'] },
  512:  { bg: '#edc850', fg: '#f9f6f2', glow: 'rgba(237,200,80,0.9)',  grad: ['#f0d860','#e0b030'] },
  1024: { bg: '#edc53f', fg: '#f9f6f2', glow: 'rgba(237,197,63,1.0)',  grad: ['#f0d850','#e0b020'] },
  2048: { bg: '#edc22e', fg: '#f9f6f2', glow: 'rgba(255,215,0,1.0)',   grad: ['#ffd700','#e0b000'] },
  4096: { bg: '#3c3a32', fg: '#f9f6f2', glow: 'rgba(255,200,50,0.8)', grad: ['#4c4a3a','#2c2a22'] },
  8192: { bg: '#1a1a2e', fg: '#f9f6f2', glow: 'rgba(100,100,255,0.8)', grad: ['#2a2a4e','#0a0a1e'] },
};

// ============================================================
// CLASSES
// ============================================================
class Tile {
  constructor(i, j, value) {
    this.i = i; this.j = j; this.value = value;
    this.animAlpha = 1; this.animScale = 0.3;
    this.merged = false; this.age = 0;
    this.mergeScale = 1; // merge pop animation
  }
  update() {
    this.animAlpha = Math.max(0, this.animAlpha - 0.08);
    this.animScale += (1.0 - this.animScale) * 0.25;
    if (this.merged) {
      this.mergeScale += (1.25 - this.mergeScale) * 0.3;
      if (this.mergeScale > 1.2) this.mergeScale += (1.0 - this.mergeScale) * 0.4;
    }
    this.age++;
  }
  popMerge() { this.merged = true; this.mergeScale = 0.7; }
  isDone() { return this.animAlpha <= 0; }
}

class MergeParticle {
  constructor(x, y, color) {
    this.x = x; this.y = y; this.color = color;
    const a = Math.random() * Math.PI * 2; const sp = 1 + Math.random() * 3;
    this.vx = Math.cos(a) * sp; this.vy = Math.sin(a) * sp;
    this.life = 1; this.decay = 0.04 + Math.random() * 0.02; this.r = 3 + Math.random() * 4;
  }
  update() { this.x += this.vx; this.y += this.vy; this.vy += 0.05; this.life -= this.decay; }
  draw(ctx) {
    ctx.globalAlpha = Math.max(0, this.life);
    ctx.fillStyle = this.color; ctx.shadowColor = this.color; ctx.shadowBlur = 6;
    ctx.beginPath(); ctx.arc(this.x, this.y, this.r * this.life, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0; ctx.globalAlpha = 1;
  }
  isDead() { return this.life <= 0; }
}

// Confetti for 2048 win
class Confetti {
  constructor(canvasW, canvasH) {
    this.x = Math.random() * canvasW;
    this.y = -10;
    this.vy = 2 + Math.random() * 3;
    this.vx = (Math.random() - 0.5) * 2;
    this.rotation = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 0.2;
    this.w = 6 + Math.random() * 8; this.h = 4 + Math.random() * 5;
    this.color = ['#ffd700','#ff6600','#ff4488','#44ff88','#4488ff','#ff44ff','#ffffff'][Math.floor(Math.random() * 7)];
    this.life = 1; this.decay = 0.004 + Math.random() * 0.004;
    this.active = true; this.canvasH = canvasH;
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    this.rotation += this.rotSpeed;
    this.vy += 0.02; this.vx *= 0.99;
    this.life -= this.decay;
    if (this.life <= 0 || this.y > this.canvasH + 20) this.active = false;
  }
  draw(ctx) {
    ctx.save();
    ctx.globalAlpha = this.life;
    ctx.translate(this.x, this.y); ctx.rotate(this.rotation);
    ctx.fillStyle = this.color; ctx.shadowColor = this.color; ctx.shadowBlur = 4;
    ctx.fillRect(-this.w / 2, -this.h / 2, this.w, this.h);
    ctx.restore();
  }
}

// ============================================================
// GAME
// ============================================================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const SIZE = 4;
const TILE = Math.min(80, (Math.min(window.innerWidth, window.innerHeight) - 80) / SIZE);
const GAP = 10, PAD = 16;
const W = H = SIZE * TILE + (SIZE - 1) * GAP + PAD * 2;
canvas.width = W; canvas.height = H;

let grid, score, high, won, animTiles, mergeParticles, confetti;
high = parseInt(localStorage.getItem('2048_hs2') || '0');
document.getElementById('h').textContent = high;

function init() {
  grid = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
  score = 0; won = false; animTiles = []; mergeParticles = []; confetti = [];
  addTile(); addTile();
}

function addTile() {
  const z = [];
  for (let i = 0; i < SIZE; i++) for (let j = 0; j < SIZE; j++) if (!grid[i][j]) z.push({ i, j });
  if (!z.length) return;
  const p = z[Math.floor(Math.random() * z.length)];
  grid[p.i][p.j] = Math.random() < 0.9 ? 2 : 4;
  animTiles.push(new Tile(p.i, p.j, grid[p.i][p.j]));
}

function slide(row) {
  let arr = row.filter(x => x !== 0), newRow = [], merged = [];
  for (let i = 0; i < arr.length; i++) {
    if (i < arr.length - 1 && arr[i] === arr[i + 1]) {
      newRow.push(arr[i] * 2); merged.push(newRow.length - 1);
      score += arr[i] * 2; i++;
    } else { newRow.push(arr[i]); }
  }
  while (newRow.length < SIZE) newRow.push(0);
  return { row: newRow, moved: JSON.stringify(row) !== JSON.stringify(newRow), merged };
}

function rotate(g) {
  const n = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
  for (let i = 0; i < SIZE; i++) for (let j = 0; j < SIZE; j++) n[i][j] = g[j][SIZE - 1 - i];
  return n;
}

function rotateBack(g) {
  const n = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
  for (let i = 0; i < SIZE; i++) for (let j = 0; j < SIZE; j++) n[j][SIZE - 1 - i] = g[i][j];
  return n;
}

function spawnMergeParticles(x, y, value) {
  for (let i = 0; i < 12; i++) mergeParticles.push(new MergeParticle(x, y, '#ffcc44'));
}

function move(dir) {
  let g = JSON.parse(JSON.stringify(grid));
  for (let k = 0; k < dir; k++) g = rotate(g);
  let moved = false, mergedCells = [];
  for (let i = 0; i < SIZE; i++) {
    const r = slide(g[i]);
    if (r.moved) moved = true;
    g[i] = r.row;
    r.merged.forEach(mc => mergedCells.push({ i, j: mc }));
  }
  for (let k = 0; k < (4 - dir) % 4; k++) g = rotateBack(g);
  // Transform merged cell coords back
  mergedCells = mergedCells.map(({ i, j }) => {
    let ni = i, nj = j;
    for (let k = 0; k < (4 - dir) % 4; k++) { const tmp = ni; ni = nj; nj = SIZE - 1 - tmp; }
    return { ni, nj };
  });

  if (moved) {
    grid = g;
    addTile();
    // Mark merged tiles for pop animation
    mergedCells.forEach(({ ni, nj }) => {
      const tile = animTiles.find(t => t.i === ni && t.j === nj && t.age > 2);
      if (tile) tile.popMerge();
      const tx = PAD + GAP + nj * (TILE + GAP), ty = PAD + GAP + ni * (TILE + GAP);
      spawnMergeParticles(tx + TILE / 2, ty + TILE / 2, '#ffcc44');
    });
    document.getElementById('s').textContent = score;
    if (score > high) { high = score; document.getElementById('h').textContent = high; localStorage.setItem('2048_hs2', high); }
  }
  draw();
  if (!won && grid.some(r => r.some(v => v >= 2048))) {
    won = true;
    // Spawn confetti
    for (let i = 0; i < 80; i++) confetti.push(new Confetti(W, H));
    setTimeout(() => {
      document.getElementById('overlay').querySelector('h1').textContent = '🎉 2048达成！';
      document.getElementById('overlay').style.display = 'flex';
    }, 1200);
  }
  checkOver();
}

function checkOver() {
  for (let i = 0; i < SIZE; i++) for (let j = 0; j < SIZE; j++) if (grid[i][j] === 0) return;
  for (let i = 0; i < SIZE; i++) for (let j = 0; j < SIZE - 1; j++) if (grid[i][j] === grid[i][j + 1]) return;
  for (let j = 0; j < SIZE; j++) for (let i = 0; i < SIZE - 1; i++) if (grid[i][j] === grid[i + 1][j]) return;
  document.getElementById('overlay').querySelector('h1').textContent = '💀 结束';
  document.getElementById('overlay').querySelector('p').textContent = '没有可合并的方块了 · 分数：' + score;
  document.getElementById('overlay').style.display = 'flex';
}

let frameCount = 0;
function draw() {
  frameCount++;
  ctx.fillStyle = '#0a0812'; ctx.fillRect(0, 0, W, H);

  // Background grid glow (animated light sweep)
  const sweepX = (frameCount * 0.8) % (W * 2);
  for (let i = 0; i < SIZE; i++) for (let j = 0; j < SIZE; j++) {
    const x = PAD + GAP + j * (TILE + GAP), y = PAD + GAP + i * (TILE + GAP);
    ctx.fillStyle = '#1a1420'; ctx.beginPath(); ctx.roundRect(x, y, TILE, TILE, 8); ctx.fill();
  }

  // Animated light sweep across background
  const sweepPos = sweepX < W ? sweepX : W * 2 - sweepX;
  const sweepGrad = ctx.createLinearGradient(sweepPos - 60, 0, sweepPos + 60, 0);
  sweepGrad.addColorStop(0, 'rgba(240,147,51,0)');
  sweepGrad.addColorStop(0.5, 'rgba(240,147,51,0.06)');
  sweepGrad.addColorStop(1, 'rgba(240,147,51,0)');
  ctx.fillStyle = sweepGrad; ctx.fillRect(0, 0, W, H);

  // Ambient glow spots
  const g1 = ctx.createRadialGradient(W * 0.2, H * 0.3, 0, W * 0.2, H * 0.3, 150);
  g1.addColorStop(0, 'rgba(240,147,51,0.06)'); g1.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g1; ctx.fillRect(0, 0, W, H);
  const g2 = ctx.createRadialGradient(W * 0.8, H * 0.7, 0, W * 0.8, H * 0.7, 150);
  g2.addColorStop(0, 'rgba(200,100,255,0.06)'); g2.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g2; ctx.fillRect(0, 0, W, H);

  // Spawn animation tiles
  animTiles.forEach(t => {
    t.update();
    const x = PAD + GAP + t.j * (TILE + GAP), y = PAD + GAP + t.i * (TILE + GAP);
    const col = COLORS[t.value] || { bg: '#3c3a32', fg: '#f9f6f2', grad: ['#3c3a32','#2c2a22'] };
    ctx.save();
    ctx.globalAlpha = t.animAlpha;
    ctx.translate(x + TILE / 2, y + TILE / 2);
    ctx.scale(t.animScale, t.animScale);
    ctx.shadowColor = '#ffffff'; ctx.shadowBlur = 20;
    const tg = ctx.createLinearGradient(-TILE/2, -TILE/2, TILE/2, TILE/2);
    tg.addColorStop(0, col.grad[0]); tg.addColorStop(1, col.grad[1]);
    ctx.fillStyle = tg;
    ctx.beginPath(); ctx.roundRect(-TILE / 2, -TILE / 2, TILE, TILE, 8); ctx.fill();
    ctx.shadowBlur = 0; ctx.restore();
  });
  animTiles = animTiles.filter(t => !t.isDone());

  // Static tiles with gradient + merge pop
  for (let i = 0; i < SIZE; i++) for (let j = 0; j < SIZE; j++) {
    const v = grid[i][j]; if (!v) continue;
    const x = PAD + GAP + j * (TILE + GAP), y = PAD + GAP + i * (TILE + GAP);
    const col = COLORS[v] || { bg: '#3c3a32', fg: '#f9f6f2', glow: 'rgba(60,58,50,0.5)', grad: ['#3c3a32','#2c2a22'] };
    // Find if this tile was just merged
    const mergeAnim = animTiles.find(t => t.i === i && t.j === j && t.merged);
    const popScale = mergeAnim ? mergeAnim.mergeScale : 1;
    ctx.save();
    ctx.translate(x + TILE / 2, y + TILE / 2);
    ctx.scale(popScale, popScale);
    // Glow
    ctx.shadowColor = col.glow; ctx.shadowBlur = v >= 128 ? 25 : 12;
    // Tile gradient
    const tg = ctx.createLinearGradient(-TILE/2, -TILE/2, TILE/2, TILE/2);
    tg.addColorStop(0, col.grad[0]); tg.addColorStop(1, col.grad[1]);
    ctx.fillStyle = tg;
    ctx.beginPath(); ctx.roundRect(-TILE / 2, -TILE / 2, TILE, TILE, 8); ctx.fill();
    // Top highlight strip
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.beginPath(); ctx.roundRect(-TILE/2 + 3, -TILE/2 + 3, TILE - 6, TILE / 4, [6, 6, 0, 0]); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = col.fg;
    const fs = v > 999 ? 24 : v > 99 ? 30 : 40;
    ctx.font = `bold ${fs}px monospace`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(v, 0, 1);
    ctx.restore();
  }

  // Merge particles
  mergeParticles.forEach(p => p.update());
  mergeParticles.forEach(p => p.draw(ctx));
  mergeParticles = mergeParticles.filter(p => !p.isDead());

  // Confetti
  confetti.forEach(c => { c.update(); c.draw(ctx); });
  confetti = confetti.filter(c => c.active);

  // 2048 golden shimmer on background when won
  if (won && confetti.length > 0) {
    const shimmer = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W * 0.7);
    shimmer.addColorStop(0, 'rgba(255,215,0,0.08)');
    shimmer.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = shimmer; ctx.fillRect(0, 0, W, H);
  }

  if (!won || confetti.length > 0) requestAnimationFrame(draw);
}

document.addEventListener('keydown', e => {
  const m = { ArrowUp: [1], ArrowDown: [3], ArrowLeft: [0], ArrowRight: [2] };
  if (m[e.key]) move(m[e.key][0]);
});

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('overlay').querySelector('h1').textContent = '🔢 2048';
  document.getElementById('overlay').querySelector('p').textContent = '↑ ↓ ← → 滑动合并方块，挑战2048！';
  draw();
}
document.getElementById('overlay').style.display = 'flex';
init();
draw();
} catch(e) { console.error(e); }
</script></body></html>
