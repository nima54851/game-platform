<!DOCTYPE html>
<html lang="zh"><head><meta charset="UTF-8"><title>⭕ 井字棋</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;backdrop-filter:blur(6px)}
#overlay h1{font-size:42px;margin-bottom:8px;text-shadow:0 0 20px rgba(255,255,255,.3)}
#overlay p{color:rgba(255,255,255,.4);margin-bottom:24px}
#start-btn{background:#fff;color:#000;padding:14px 48px;border:none;border-radius:12px;font-size:18px;font-weight:900;cursor:pointer;font-family:monospace;box-shadow:0 0 30px rgba(255,255,255,.2)}
body{background:#0a0e1a;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;font-family:monospace}
#ui{position:fixed;top:20px;left:50%;transform:translateX(-50%);color:#e2e8f0;font-size:18px;z-index:10;text-align:center;display:flex;gap:16px;align-items:center}
canvas{border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,0.5)}
.btn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#888;padding:6px 16px;border-radius:8px;cursor:pointer;font-family:monospace;transition:all .2s}
.btn:hover{background:rgba(255,255,255,0.12);color:#ccc}
</style></head><body>
<div id="overlay">
  <h1>⭕ 井字棋</h1>
  <p>点击格子落子 · 先连成3个获胜</p>
  <button id="start-btn" onclick="doStart()">▶ 开始</button>
</div>
<div id="ui">
  <span id="turn">⭕ 先手</span>
  <span id="status"></span>
  <button class="btn" onclick="reset()">重新开始</button>
</div>
<canvas id="c"></canvas>
<script>
// ═══════════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 360, H = 360, CELL = W / 3;
canvas.width = W; canvas.height = H;

// ═══════════════════════════════════════════════════════════
//  ENTITY CLASSES
// ═══════════════════════════════════════════════════════════

class GridCell {
  constructor(index) {
    this.index = index;
    this.row = Math.floor(index / 3);
    this.col = index % 3;
    this.cx = this.col * CELL + CELL / 2;
    this.cy = this.row * CELL + CELL / 2;
    this.value = null; // null | 'O' | 'X'
    this.scale = 0; // animation
    this.winner = false;
  }

  tick() {
    if (this.value && this.scale < 1) {
      this.scale += (1 - this.scale) * 0.25;
    }
  }

  draw() {
    if (!this.value || this.scale < 0.01) return;
    const s = this.scale;
    ctx.save();
    ctx.translate(this.cx, this.cy);
    ctx.scale(s, s);

    if (this.value === 'O') {
      // Circle with glow
      ctx.shadowColor = '#00d4ff'; ctx.shadowBlur = this.winner ? 20 : 8;
      ctx.strokeStyle = this.winner ? '#ffd700' : '#00d4ff';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.arc(0, 0, CELL * 0.3, 0, Math.PI * 2);
      ctx.stroke();
    } else if (this.value === 'X') {
      ctx.shadowColor = '#ff6b6b'; ctx.shadowBlur = this.winner ? 20 : 8;
      ctx.strokeStyle = this.winner ? '#ffd700' : '#ff6b6b';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(-CELL * 0.3, -CELL * 0.3); ctx.lineTo(CELL * 0.3, CELL * 0.3);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(CELL * 0.3, -CELL * 0.3); ctx.lineTo(-CELL * 0.3, CELL * 0.3);
      ctx.stroke();
    }
    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

class Particle {
  constructor(x, y, color) {
    this.x = x; this.y = y; this.color = color;
    const a = Math.random() * Math.PI * 2;
    const sp = 2 + Math.random() * 3;
    this.vx = Math.cos(a) * sp; this.vy = Math.sin(a) * sp;
    this.life = 1; this.decay = 0.025;
    this.r = 2 + Math.random() * 3;
  }

  tick() {
    this.x += this.vx; this.y += this.vy;
    this.vx *= 0.93; this.vy *= 0.93;
    this.life -= this.decay;
  }

  draw() {
    ctx.globalAlpha = this.life;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r * this.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

class HoverHint {
  constructor(x, y, value) {
    this.x = x; this.y = y; this.value = value; this.alpha = 0;
  }
}

// ═══════════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════════
let cells, turn, gameOver, winner, particles, hover;
let hoverX = -1, hoverY = -1;

function init() {
  cells = Array.from({ length: 9 }, (_, i) => new GridCell(i));
  turn = 'O'; gameOver = false; winner = null; particles = []; hover = null;
  document.getElementById('turn').textContent = '⭕ 先手';
  document.getElementById('status').textContent = '';
}

function burst(x, y, color, count) {
  for (let i = 0; i < count; i++) particles.push(new Particle(x, y, color));
}

function check() {
  const w = [[0, 1, 2], [3, 4, 5], [6, 7, 8], [0, 3, 6], [1, 4, 7], [2, 5, 8], [0, 4, 8], [2, 4, 6]];
  for (const [a, b, c] of w) {
    if (cells[a].value && cells[a].value === cells[b].value && cells[a].value === cells[c].value) {
      cells[a].winner = cells[b].winner = cells[c].winner = true;
      burst(cells[a].cx, cells[a].cy, cells[a].value === 'O' ? '#00d4ff' : '#ff6b6b', 15);
      return cells[a].value;
    }
  }
  if (cells.every(c => c.value)) return 'draw';
  return null;
}

function updateUI() {
  if (winner && winner !== 'draw') {
    document.getElementById('turn').textContent = '';
    document.getElementById('status').textContent = winner === 'O' ? '⭕ 获胜!' : '❌ 获胜!';
    document.getElementById('status').style.color = winner === 'O' ? '#00d4ff' : '#ff6b6b';
  } else if (winner === 'draw') {
    document.getElementById('turn').textContent = '';
    document.getElementById('status').textContent = '平局!';
    document.getElementById('status').style.color = '#888';
  } else {
    document.getElementById('turn').textContent = (turn === 'O' ? '⭕' : '❌') + ' 的回合';
    document.getElementById('status').textContent = '';
    document.getElementById('status').style.color = '';
  }
}

// ═══════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════
function draw() {
  // Background
  ctx.fillStyle = '#0a0e1a'; ctx.fillRect(0, 0, W, H);

  // Subtle vignette
  const vig = ctx.createRadialGradient(W/2, H/2, 50, W/2, H/2, W * 0.7);
  vig.addColorStop(0, 'rgba(0,0,0,0)'); vig.addColorStop(1, 'rgba(0,0,0,0.3)');
  ctx.fillStyle = vig; ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = 'rgba(0,212,255,0.25)'; ctx.lineWidth = 3;
  for (let i = 1; i < 3; i++) {
    ctx.beginPath(); ctx.moveTo(i * CELL, 0); ctx.lineTo(i * CELL, H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i * CELL); ctx.lineTo(W, i * CELL); ctx.stroke();
  }

  // Hover hint
  if (!gameOver && hoverX >= 0 && hoverY >= 0) {
    const ci = hoverY * 3 + hoverX;
    if (!cells[ci].value) {
      ctx.globalAlpha = 0.2;
      ctx.strokeStyle = turn === 'O' ? '#00d4ff' : '#ff6b6b';
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(cells[ci].cx, cells[ci].cy, CELL * 0.3, 0, Math.PI * 2); ctx.stroke();
      ctx.globalAlpha = 1;
    }
  }

  // Cells
  cells.forEach(c => { c.tick(); c.draw(); });

  // Particles
  particles.forEach(p => { p.tick(); p.draw(); });
  particles = particles.filter(p => p.life > 0);

  // Game over overlay
  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.45)'; ctx.fillRect(0, 0, W, H);
    if (winner && winner !== 'draw') {
      ctx.fillStyle = winner === 'O' ? '#00d4ff' : '#ff6b6b';
    } else {
      ctx.fillStyle = '#888';
    }
    ctx.font = 'bold 36px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = ctx.fillStyle; ctx.shadowBlur = 15;
    ctx.fillText(winner === 'draw' ? '平局！' : (winner === 'O' ? '⭕ 获胜！' : '❌ 获胜！'), W / 2, H / 2);
    ctx.shadowBlur = 0;
  }

  requestAnimationFrame(draw);
}

// ═══════════════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════════════
canvas.addEventListener('click', e => {
  if (gameOver) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width, scaleY = canvas.height / rect.height;
  const mx = (e.clientX - rect.left) * scaleX, my = (e.clientY - rect.top) * scaleY;
  const col = Math.floor(mx / CELL), row = Math.floor(my / CELL);
  const idx = row * 3 + col;
  if (col < 0 || col >= 3 || row < 0 || row >= 3 || cells[idx].value) return;

  cells[idx].value = turn;
  burst(cells[idx].cx, cells[idx].cy, turn === 'O' ? '#00d4ff' : '#ff6b6b', 10);
  const w = check();
  if (w) { gameOver = true; winner = w; updateUI(); }
  else { turn = turn === 'O' ? 'X' : 'O'; updateUI(); }
});

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width, scaleY = canvas.height / rect.height;
  const mx = (e.clientX - rect.left) * scaleX, my = (e.clientY - rect.top) * scaleY;
  hoverX = Math.floor(mx / CELL); hoverY = Math.floor(my / CELL);
});

canvas.addEventListener('mouseleave', () => { hoverX = -1; hoverY = -1; });

function reset() { init(); }

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
var started = false;
function doStart() {
  started = true;
  document.getElementById('overlay').style.display = 'none';
  init();
}
init();
draw();
</script></body></html>
