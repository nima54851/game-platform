<!DOCTYPE html>
<html lang="zh"><head><meta charset="UTF-8"><title>⚫ 五子棋</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e1a;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;font-family:monospace}
canvas{border-radius:8px;box-shadow:0 0 30px rgba(0,0,0,0.5)}
#ui{position:fixed;top:16px;left:50%;transform:translateX(-50%);color:#e2e8f0;font-size:16px;z-index:10;display:flex;gap:20px;align-items:center}
#ui span{background:rgba(255,255,255,0.05);padding:6px 16px;border-radius:8px;border:1px solid rgba(255,255,255,0.1)}
.stone{width:12px;height:12px;border-radius:50%;display:inline-block;margin-right:4px}
.stone.black{background:radial-gradient(circle at 30% 30%,#555,#111)}
.stone.white{background:radial-gradient(circle at 30% 30%,#fff,#ccc)}
</style></head><body>
<div id="ui">
  <span id="turn"><span class="stone black"></span>黑棋先行</span>
  <span id="info"></span>
  <button onclick="reset()" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#888;padding:6px 16px;border-radius:8px;cursor:pointer;font-family:monospace">重新开始</button>
</div>
<canvas id="c"></canvas>
<script>
// ═══════════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const SIZE = 15;
const CELL = Math.min(600, window.innerHeight - 80) / SIZE;
const PAD = 20;
const W = H = SIZE * CELL + PAD * 2;
canvas.width = W; canvas.height = H;

// ═══════════════════════════════════════════════════════════
//  ENTITY CLASSES
// ═══════════════════════════════════════════════════════════

class Stone {
  constructor(row, col, player) {
    this.row = row; this.col = col;
    this.player = player; // 'B' | 'W'
    this.x = PAD + col * CELL;
    this.y = PAD + row * CELL;
    this.scale = 0; // for animation
    this.targetScale = 1;
  }

  tick() {
    this.scale += (this.targetScale - this.scale) * 0.3;
  }

  draw() {
    const r = CELL * 0.42 * this.scale;
    if (r < 0.5) return;
    const g = ctx.createRadialGradient(this.x - 3, this.y - 3, 0, this.x, this.y, r);
    if (this.player === 'B') {
      g.addColorStop(0, '#666'); g.addColorStop(1, '#111');
    } else {
      g.addColorStop(0, '#fff'); g.addColorStop(1, '#ccc');
    }
    ctx.shadowColor = this.player === 'B' ? '#555' : '#fff';
    ctx.shadowBlur = 8;
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = this.player === 'B' ? '#333' : '#999';
    ctx.lineWidth = 0.5;
    ctx.stroke();
    ctx.shadowBlur = 0;
  }
}

class Particle {
  constructor(x, y, color) {
    this.x = x; this.y = y; this.color = color;
    const a = Math.random() * Math.PI * 2;
    const sp = 2 + Math.random() * 4;
    this.vx = Math.cos(a) * sp; this.vy = Math.sin(a) * sp;
    this.life = 1; this.decay = 0.03;
    this.r = 2 + Math.random() * 3;
  }

  tick() {
    this.x += this.vx; this.y += this.vy;
    this.vx *= 0.92; this.vy *= 0.92;
    this.life -= this.decay;
  }

  draw() {
    ctx.globalAlpha = this.life;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r * this.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// ═══════════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════════
let board, currentPlayer, gameOver, stones, particles, winLine;

function init() {
  board = Array.from({ length: SIZE }, () => Array(SIZE).fill(null));
  currentPlayer = 'B';
  gameOver = false;
  stones = [];
  particles = [];
  winLine = null;
  updateUI();
}

function updateUI() {
  const stoneClass = currentPlayer === 'B' ? 'stone black' : 'stone white';
  const stoneText = currentPlayer === 'B' ? '黑' : '白';
  document.getElementById('turn').innerHTML = `<span class="${stoneClass}"></span>${stoneText}棋`;
  document.getElementById('info').textContent = '';
}

function burst(x, y, color, count) {
  for (let i = 0; i < count; i++) particles.push(new Particle(x, y, color));
}

// ═══════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════
function drawBackground() {
  ctx.fillStyle = '#1a0d0d'; ctx.fillRect(0, 0, W, H);

  // Wood grain texture
  ctx.strokeStyle = 'rgba(80,40,20,0.1)';
  ctx.lineWidth = 1;
  for (let y = 0; y < H; y += 4) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Grid
  ctx.strokeStyle = '#3a2a2a'; ctx.lineWidth = 1;
  for (let i = 0; i < SIZE; i++) {
    ctx.beginPath();
    ctx.moveTo(PAD + i * CELL, PAD);
    ctx.lineTo(PAD + i * CELL, PAD + (SIZE - 1) * CELL);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(PAD, PAD + i * CELL);
    ctx.lineTo(PAD + (SIZE - 1) * CELL, PAD + i * CELL);
    ctx.stroke();
  }

  // Star points
  const stars = [[3, 3], [3, 11], [7, 7], [11, 3], [11, 11]];
  stars.forEach(([r, c]) => {
    ctx.fillStyle = '#5a3a3a';
    ctx.beginPath();
    ctx.arc(PAD + c * CELL, PAD + r * CELL, 4, 0, Math.PI * 2);
    ctx.fill();
  });

  // Last move marker
  if (stones.length > 0) {
    const last = stones[stones.length - 1];
    ctx.strokeStyle = last.player === 'B' ? '#ff4444' : '#4488ff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(last.x, last.y, CELL * 0.15, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Win line
  if (winLine) {
    const [r1, c1, r2, c2] = winLine;
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 3;
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.moveTo(PAD + c1 * CELL, PAD + r1 * CELL);
    ctx.lineTo(PAD + c2 * CELL, PAD + r2 * CELL);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }
}

function draw() {
  drawBackground();

  // Animate stones
  stones.forEach(s => { s.tick(); s.draw(); });

  // Particles
  particles.forEach(p => { p.tick(); p.draw(); });
  particles = particles.filter(p => p.life > 0);

  // Game over overlay
  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, W, H);
    const winnerColor = currentPlayer === 'B' ? '#fff' : '#111';
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 28px monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 15;
    ctx.fillText(`${currentPlayer === 'B' ? '⚫' : '⚪'} 五子连珠获胜!`, W / 2, H / 2);
    ctx.shadowBlur = 0;
  }

  requestAnimationFrame(draw);
}

// ═══════════════════════════════════════════════════════════
//  LOGIC
// ═══════════════════════════════════════════════════════════
function checkWin(r, c) {
  const dirs = [[1, 0], [0, 1], [1, 1], [1, -1]];
  for (const [dr, dc] of dirs) {
    let count = 1;
    let r1 = r, c1 = c, r2 = r, c2 = c;
    for (let i = 1; i < 5; i++) {
      const nr = r + dr * i, nc = c + dc * i;
      if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && board[nr][nc] === currentPlayer) { count++; r2 = nr; c2 = nc; }
      else break;
    }
    for (let i = 1; i < 5; i++) {
      const nr = r - dr * i, nc = c - dc * i;
      if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && board[nr][nc] === currentPlayer) { count++; r1 = nr; c1 = nc; }
      else break;
    }
    if (count >= 5) { winLine = [r1, c1, r2, c2]; return true; }
  }
  return false;
}

canvas.addEventListener('click', e => {
  if (gameOver) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width, scaleY = canvas.height / rect.height;
  const mx = (e.clientX - rect.left) * scaleX, my = (e.clientY - rect.top) * scaleY;
  const col = Math.round((mx - PAD) / CELL), row = Math.round((my - PAD) / CELL);
  if (row < 0 || row >= SIZE || col < 0 || col >= SIZE || board[row][col]) return;

  board[row][col] = currentPlayer;
  const stone = new Stone(row, col, currentPlayer);
  stones.push(stone);
  burst(stone.x, stone.y, currentPlayer === 'B' ? '#555' : '#fff', 8);

  if (checkWin(row, col)) {
    gameOver = true;
    const winnerText = currentPlayer === 'B' ? '⚫ 黑棋' : '⚪ 白棋';
    document.getElementById('info').textContent = `${winnerText} 五连!`;
    burst(stone.x, stone.y, '#ffd700', 30);
  } else {
    currentPlayer = currentPlayer === 'B' ? 'W' : 'B';
    updateUI();
  }
});

function reset() {
  init(); draw();
}

draw();
init();
</script></body></html>
