<!DOCTYPE html>
<html lang="zh"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>🔴 四子棋 Connect4</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
body{background:radial-gradient(ellipse at top,#0a0a1a,#050510);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:monospace;color:#fff}
#board{display:grid;grid-template-columns:repeat(7,56px);gap:6px;padding:20px;background:linear-gradient(180deg,#1a1a3a,#0d0d1a);border-radius:16px;border:2px solid rgba(100,100,200,.2);box-shadow:0 0 40px rgba(0,0,100,.4)}
.col{width:56px;height:56px;border-radius:50%;background:rgba(0,0,0,.4);border:none;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;font-size:28px}
.col:hover{background:rgba(0,200,255,.1);transform:scale(1.05)}
.slot{width:52px;height:52px;border-radius:50%;background:rgba(0,0,0,.6);transition:all .3s;display:flex;align-items:center;justify-content:center;font-size:26px;
  box-shadow:inset 0 2px 4px rgba(0,0,0,.5)}
.slot.r1{background:linear-gradient(135deg,#ff4444,#cc0000);box-shadow:inset 0 2px 4px rgba(0,0,0,.5),0 0 12px rgba(255,0,0,.3)}
.slot.r2{background:linear-gradient(135deg,#ffca28,#ff8800);box-shadow:inset 0 2px 4px rgba(0,0,0,.5),0 0 12px rgba(255,200,0,.3)}
#hud{display:flex;gap:30px;margin-bottom:16px;align-items:center}
#turn{font-size:20px;font-weight:700;padding:6px 20px;border-radius:20px;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.1)}
#reset{background:rgba(0,200,255,.1);border:1px solid rgba(0,200,255,.3);color:#00c8ff;padding:8px 24px;border-radius:8px;cursor:pointer;font-family:monospace;font-size:14px;font-weight:700;transition:all .2s}
#reset:hover{background:rgba(0,200,255,.2)}
#msg{font-size:16px;color:#ffca28;min-height:24px;margin-top:12px;text-shadow:0 0 10px rgba(255,200,0,.5)}
</style></head><body>
<div id="hud"><div id="turn">🔴 红方先手</div><button id="reset" onclick="reset()">↺ 重来</button></div>
<div id="board"></div>
<div id="msg"></div>
<script>
const ROWS=6,COLS=7,EMPTY=0,R1=1,R2=2;
let grid,cur,over;
function init(){grid=Array.from({length:ROWS},()=>Array(COLS).fill(EMPTY));cur=R1;over=false;document.getElementById('msg').textContent='';draw();}
function draw(){
  const b=document.getElementById('board');b.innerHTML='';
  const icon=(v)=>v===R1?'🔴':v===R2?'🟡':'';
  const cls=(v)=>v===R1?'r1':v===R2?'r2':'';
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const slot=document.createElement('div');slot.className='slot '+cls(grid[r][c]);slot.textContent=icon(grid[r][c]);
    slot.style.animation=`drop .3s ease`;b.appendChild(slot);}
  document.getElementById('turn').textContent=(cur===R1?'🔴':'🟡')+' '+(cur===R1?'红':'黄')+'方手';
  document.getElementById('turn').style.color=cur===R1?'#ff6666':'#ffca28';
}
function drop(c){
  if(over)return;
  for(let r=ROWS-1;r>=0;r--){if(grid[r][c]===EMPTY){grid[r][c]=cur;break;}}
  if(checkWin()){over=true;document.getElementById('msg').textContent='🎉 '+(cur===R1?'🔴 红':'🟡 黄')+'方获胜！';draw();return;}
  if(ROWS*COLS-grid.flat().filter(v=>v===EMPTY).length===0){over=true;document.getElementById('msg').textContent='🤝 平局！';draw();return;}
  cur=cur===R1?R2:R1;draw();}
function checkWin(){
  const dirs=[[0,1],[1,0],[1,1],[1,-1]];
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    if(grid[r][c]!==cur)continue;
    for(const[dr,dc]of dirs){
      let ok=true;
      for(let k=1;k<4;k++){const nr=r+dr*k,nc=c+dc*k;
        if(nr<0||nr>=ROWS||nc<0||nc>=COLS||grid[nr][nc]!==cur){ok=false;break;}}
      if(ok)return true;}}
  return false;}
function reset(){init();}
const b=document.getElementById('board');
for(let c=0;c<COLS;c++){
  const col=document.createElement('button');col.className='col';
  col.onclick=()=>drop(c);b.appendChild(col);}
init();
</script></body></html>
