<!DOCTYPE html>
<html lang="zh"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>🦖 跑酷小恐龙</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;overflow:hidden;display:flex;justify-content:center;align-items:center;height:100vh}
canvas{border-radius:8px;display:block}
#hud{position:fixed;top:16px;left:50%;transform:translateX(-50%);display:flex;gap:24px;z-index:10}
.stat{background:rgba(0,0,0,.7);border:1px solid rgba(0,200,100,.2);padding:8px 20px;border-radius:8px;text-align:center}
.stat .v{font-size:22px;font-weight:900;color:#00ff88;text-shadow:0 0 10px rgba(0,255,136,.6)}
.stat .l{font-size:10px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:2px}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;backdrop-filter:blur(4px)}
#overlay h1{font-size:42px;color:#00ff88;text-shadow:0 0 20px rgba(0,255,136,.6);margin-bottom:8px}
#overlay p{color:rgba(255,255,255,.4);margin-bottom:24px}
#start-btn{background:#00ff88;color:#000;padding:14px 48px;border:none;border-radius:12px;font-size:18px;font-weight:900;cursor:pointer;font-family:monospace;box-shadow:0 0 30px rgba(0,255,136,.4)}
#start-btn:hover{transform:scale(1.05)}
</style></head><body>
<div id="hud">
  <div class="stat"><div class="v" id="s">0</div><div class="l">分数</div></div>
  <div class="stat"><div class="v" id="h">0</div><div class="l">最高</div></div>
</div>
<div id="overlay">
  <h1>🦖 跑酷小恐龙</h1>
  <p>空格/上/W 跳跃 · 躲避障碍坚持越久</p>
  <button id="start-btn" onclick="start()">▶ 开始</button>
</div>
<canvas id="c"></canvas>
<script>
// ============================================================
// CLASSES
// ============================================================
class Particle {
  constructor(x, y, color, vx, vy, r, decay) {
    this.x = x; this.y = y;
    this.vx = vx !== undefined ? vx : (Math.random() - 0.5) * 4;
    this.vy = vy !== undefined ? vy : -Math.random() * 4;
    this.color = color;
    this.r = r !== undefined ? r : 2 + Math.random() * 3;
    this.life = 1;
    this.decay = decay !== undefined ? decay : 0.04;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy += 0.15;
    this.life -= this.decay;
  }
  draw(ctx) {
    ctx.globalAlpha = Math.max(0, this.life);
    ctx.fillStyle = this.color;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 4;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r * this.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }
  isDead() { return this.life <= 0; }
}

class Cloud {
  constructor(x, y, speed, scale) {
    this.x = x; this.y = y; this.speed = speed; this.scale = scale || 1;
  }
  update(W) {
    this.x -= this.speed;
    if (this.x < -80) this.x = W + 80;
  }
  draw(ctx, frame) {
    const ox = (frame * this.speed * 0.1) % 20;
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    ctx.beginPath();
    ctx.ellipse(this.x + ox, this.y, 40 * this.scale, 14 * this.scale, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(this.x + ox - 20 * this.scale, this.y + 6 * this.scale, 25 * this.scale, 10 * this.scale, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

class Dino {
  constructor(x, y, w, h) {
    this.x = x; this.y = y; this.w = w; this.h = h;
    this.vvy = 0; this.onGround = true;
  }
  jump() { if (this.onGround) { this.vvy = -14; this.onGround = false; } }
  update(groundY) {
    this.vvy += 0.7;
    this.y += this.vvy;
    if (this.y >= groundY - this.h) {
      this.y = groundY - this.h;
      this.vvy = 0;
      this.onGround = true;
    }
  }
  getBounds() { return { x: this.x, y: this.y, w: this.w, h: this.h }; }
  draw(ctx, frame) {
    const px = this.x, py = this.y, pw = this.w, ph = this.h;
    ctx.fillStyle = '#00ff88'; ctx.shadowColor = '#00ff88'; ctx.shadowBlur = 10;
    ctx.beginPath(); ctx.roundRect(px, py, pw, ph * 0.7, 6); ctx.fill();
    ctx.beginPath(); ctx.roundRect(px + pw - 10, py - ph * 0.3, pw * 0.6, ph * 0.45, 4); ctx.fill();
    ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(px + pw, py - ph * 0.15, 3, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
    const legOff = Math.sin(frame * 0.3) * 8;
    ctx.fillStyle = '#00cc66';
    ctx.fillRect(px + 4, py + ph * 0.6, 8, ph * 0.4);
    ctx.fillRect(px + pw - 12, py + ph * 0.6 + legOff * 0.5, 8, ph * 0.4 - legOff * 0.5);
    ctx.fillStyle = '#00cc66';
    ctx.beginPath(); ctx.moveTo(px, py + ph * 0.2); ctx.lineTo(px - 12, py + ph * 0.1); ctx.lineTo(px, py + ph * 0.5); ctx.fill();
  }
}

class Obstacle {
  constructor(x, y, w, h, type) {
    this.x = x; this.y = y; this.w = w; this.h = h; this.type = type;
    this.vx = -4;
  }
  update(speed) { this.x += speed; }
  isOffScreen(W) { return this.x < -80; }
  getBounds() { return { x: this.x, y: this.y, w: this.w, h: this.h }; }
  draw(ctx, frame) {
    if (this.type === 'cactus') {
      ctx.fillStyle = '#00aa44'; ctx.shadowColor = '#00ff88'; ctx.shadowBlur = 5;
      ctx.fillRect(this.x + this.w / 2 - 4, this.y, 8, this.h);
      ctx.fillRect(this.x, this.y + this.h * 0.3, 10, 6);
      ctx.fillRect(this.x + this.w - 10, this.y + this.h * 0.5, 10, 6);
      ctx.fillRect(this.x + this.w / 2 - 8, this.y + this.h * 0.6, 6, 6);
      ctx.fillRect(this.x + this.w / 2 + 2, this.y + this.h * 0.5, 6, 6);
      ctx.shadowBlur = 0;
    } else {
      ctx.fillStyle = '#ffca28'; ctx.shadowColor = '#ffca28'; ctx.shadowBlur = 8;
      ctx.beginPath(); ctx.ellipse(this.x + this.w / 2, this.y + this.h / 2, this.w / 2, this.h / 2, 0, 0, Math.PI * 2); ctx.fill();
      const wingY = Math.sin(frame * 0.2) * 8;
      ctx.beginPath(); ctx.ellipse(this.x + this.w * 0.3, this.y - wingY, this.w * 0.25, this.h * 0.3, 0, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(this.x + this.w * 0.7, this.y + wingY, this.w * 0.25, this.h * 0.3, 0, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 0;
    }
  }
}

// ============================================================
// GAME
// ============================================================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = Math.min(600, window.innerWidth - 20);
const H = Math.min(400, window.innerHeight - 80);
canvas.width = W; canvas.height = H;

let player, obstacles, particles, clouds, score, high, gameOver, frame, speed, groundY;
high = parseInt(localStorage.getItem('dino_hs') || '0');
document.getElementById('h').textContent = high;
groundY = H - 60;

function init() {
  player = new Dino(60, groundY - 40, 36, 40);
  obstacles = []; particles = [];
  clouds = [
    new Cloud(80, 60, 0.3, 1.2),
    new Cloud(280, 45, 0.5, 0.8),
    new Cloud(480, 80, 0.35, 1.0),
    new Cloud(W + 150, 55, 0.4, 1.1),
  ];
  score = 0; frame = 0; speed = 4; gameOver = false;
  document.getElementById('s').textContent = 0;
}

function spawnObs() {
  const types = ['cactus', 'bird'];
  const type = types[Math.floor(Math.random() * types.length)];
  const y = type === 'bird' ? groundY - 80 : groundY - 40;
  const w = type === 'bird' ? 50 : 25;
  const h = type === 'bird' ? 30 : 40;
  obstacles.push(new Obstacle(W + 20, y, w, h, type));
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) particles.push(new Particle(x, y, color));
}

function spawnDust(x, y) {
  for (let i = 0; i < 5; i++) {
    particles.push(new Particle(x + Math.random() * 10 - 5, y, '#8B6914',
      (Math.random() - 0.5) * 2, -Math.random() * 2, 2 + Math.random() * 2, 0.06));
  }
}

function jump() {
  if (gameOver) { start(); return; }
  if (player.onGround) {
    player.jump();
    spawnDust(player.x + player.w / 2, player.y + player.h);
  }
}

document.addEventListener('keydown', e => {
  if (['Space', 'ArrowUp', 'KeyW'].includes(e.code)) { e.preventDefault(); jump(); }
});
canvas.addEventListener('click', jump);

function update() {
  if (gameOver) return;
  frame++;
  if (frame % 5 === 0) {
    score++;
    document.getElementById('s').textContent = score;
    if (score > high) {
      high = score;
      document.getElementById('h').textContent = high;
      localStorage.setItem('dino_hs', high);
    }
  }
  if (frame % Math.max(50, 120 - speed * 5) === 0) spawnObs();
  player.update(groundY);
  // Spawn ground dust while running
  if (player.onGround && frame % 8 === 0) {
    spawnDust(player.x + player.w / 2, groundY);
  }
  if (frame % Math.max(20, 60 - speed * 3) === 0) speed = Math.min(12, speed + 0.05);
  obstacles.forEach(o => o.update(speed));
  obstacles = obstacles.filter(o => !o.isOffScreen(W));
  for (const o of obstacles) {
    const b1 = player.getBounds(), b2 = o.getBounds();
    if (b1.x < b2.x + b2.w && b1.x + b1.w > b2.x && b1.y < b2.y + b2.h && b1.y + b1.h > b2.y) {
      gameOver = true;
      for (let i = 0; i < 20; i++) spawnParticles(player.x + player.w / 2, player.y + player.h / 2, '#ff4444', 1);
      for (let i = 0; i < 15; i++) spawnParticles(player.x + player.w / 2, player.y + player.h / 2, '#ff8800', 1);
      setTimeout(() => {
        document.getElementById('overlay').querySelector('h1').textContent = '💥 撞到了！';
        document.getElementById('overlay').style.display = 'flex';
      }, 400);
    }
  }
  particles.forEach(p => p.update());
  particles = particles.filter(p => !p.isDead());
}

function draw() {
  // Sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#1a1a3a'); sky.addColorStop(1, '#0a0a1a');
  ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);
  // Stars
  for (let i = 0; i < 30; i++) {
    const sx = (i * 137.5) % W, sy = (i * 73.3) % (groundY - 40);
    const brightness = 0.3 + 0.3 * Math.sin(frame * 0.05 + i);
    ctx.fillStyle = `rgba(255,255,255,${brightness})`;
    ctx.beginPath(); ctx.arc(sx, sy, 1, 0, Math.PI * 2); ctx.fill();
  }
  // Sun glow
  const sun = ctx.createRadialGradient(W - 80, 60, 0, W - 80, 60, 60);
  sun.addColorStop(0, 'rgba(255,200,100,.2)'); sun.addColorStop(1, 'rgba(255,200,100,0)');
  ctx.fillStyle = sun; ctx.fillRect(0, 0, W, H);
  // Clouds
  clouds.forEach(c => { c.update(W); c.draw(ctx, frame); });
  // Ground
  ctx.fillStyle = '#0a1a0a'; ctx.fillRect(0, groundY, W, H - groundY);
  ctx.strokeStyle = '#1a3a1a'; ctx.lineWidth = 2;
  for (let i = 0; i < W; i += 20) {
    ctx.beginPath(); ctx.moveTo(i, groundY); ctx.lineTo(i + 10, groundY + 2); ctx.stroke();
  }
  // Distance mountains
  ctx.fillStyle = 'rgba(20,40,20,0.6)';
  ctx.beginPath(); ctx.moveTo(0, groundY);
  for (let i = 0; i <= W; i += 40) {
    const mh = 20 + 15 * Math.sin(i * 0.03);
    ctx.lineTo(i, groundY - mh);
  }
  ctx.lineTo(W, groundY); ctx.fill();
  // Particles (behind player)
  particles.forEach(p => p.draw(ctx));
  // Player
  player.draw(ctx, frame);
  // Obstacles
  obstacles.forEach(o => o.draw(ctx, frame));
}

function start() {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('overlay').querySelector('h1').textContent = '🦖 跑酷小恐龙';
  init(); loop();
}
function loop() { update(); draw(); requestAnimationFrame(loop); }
document.getElementById('overlay').style.display = 'flex'; init(); loop();
</script></body></html>
