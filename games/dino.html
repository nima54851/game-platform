<!DOCTYPE html>
<html lang="zh"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>🦖 跑酷小恐龙</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;overflow:hidden;display:flex;justify-content:center;align-items:center;height:100vh;user-select:none}
canvas{display:block}
#hud{position:fixed;top:14px;left:50%;transform:translateX(-50%);display:flex;gap:14px;z-index:10}
.stat{background:rgba(13,17,23,.85);border:1px solid rgba(0,255,136,.25);padding:7px 18px;border-radius:8px;text-align:center;backdrop-filter:blur(6px)}
.stat .v{font-size:22px;font-weight:900;color:#00ff88;text-shadow:0 0 12px rgba(0,255,136,.7)}
.stat .l{font-size:9px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:2px}
#speed-bar{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);background:rgba(13,17,23,.85);border:1px solid rgba(0,200,255,.2);padding:5px 18px;border-radius:8px;font-size:11px;color:rgba(0,200,255,.7);letter-spacing:1px;z-index:10}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;backdrop-filter:blur(6px)}
#overlay h1{font-size:42px;color:#00ff88;text-shadow:0 0 24px rgba(0,255,136,.8);margin-bottom:8px;letter-spacing:2px}
#overlay p{color:rgba(255,255,255,.4);margin-bottom:24px;font-size:14px;text-align:center;line-height:2}
.btn{background:#00ff88;color:#000;padding:13px 48px;border:none;border-radius:12px;font-size:17px;font-weight:900;cursor:pointer;font-family:monospace;box-shadow:0 0 24px rgba(0,255,136,.35)}
.btn:hover{transform:scale(1.05)}
</style></head><body>
<div id="hud">
  <div class="stat"><div class="v" id="s">0</div><div class="l">分数</div></div>
  <div class="stat"><div class="v" id="h">0</div><div class="l">最高</div></div>
</div>
<div id="speed-bar">⚡ 速度 ×<span id="spd">1.0</span></div>
<div id="overlay">
  <h1>🦖 跑酷小恐龙</h1>
  <p>空格 / ↑ / 点击 跳跃<br>躲避障碍，挑战最高分</p>
  <button class="btn" onclick="start()">▶ 开始游戏</button>
</div>

<script src="../assets/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════
//  THREE.JS INIT
// ═══════════════════════════════════════════════
const W = Math.min(800, innerWidth - 16);
const H = Math.min(420, innerHeight - 80);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x0d1117);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d1117);

// 透视摄像机，更像 Chrome Dino 风格
const camera = new THREE.PerspectiveCamera(62, W / H, 0.1, 2000);
camera.position.set(W * 0.25, 160, 260);
camera.lookAt(W * 0.25, 60, 0);

const GROUND_Y = H - 55; // 地面 Y

// ═══════════════════════════════════════════════
//  PARALLAX BACKGROUND LAYERS
// ═══════════════════════════════════════════════

// Layer 0: Stars — 水平滚动，模拟向右侧跑
const starsGroup = new THREE.Group();
scene.add(starsGroup);
const starData = [];
for (let i = 0; i < 80; i++) {
  const geo = new THREE.CircleGeometry(1 + Math.random(), 5);
  const mat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.2 + Math.random() * 0.5 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(Math.random() * W * 2, GROUND_Y + 20 + Math.random() * (H - GROUND_Y - 40), -5);
  mesh.userData = { speed: 0.4 + Math.random() * 0.3, phase: Math.random() * Math.PI * 2 };
  starsGroup.add(mesh);
  starData.push(mesh);
}

// Layer 1: 远山
const mountainsGroup = new THREE.Group();
scene.add(mountainsGroup);
for (let i = 0; i < 14; i++) {
  const peakH = 50 + Math.random() * 80;
  const baseW = 60 + Math.random() * 50;
  const shape = new THREE.Shape();
  shape.moveTo(-baseW / 2, 0);
  shape.lineTo(0, peakH);
  shape.lineTo(baseW / 2, 0);
  const geo = new THREE.ShapeGeometry(shape);
  const mat = new THREE.MeshBasicMaterial({ color: 0x0a1f0a });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(i * 70 - 50, GROUND_Y, -80);
  mesh.userData.speed = 0.25;
  mountainsGroup.add(mesh);
}

// Layer 2: 近山
const hillsGroup = new THREE.Group();
scene.add(hillsGroup);
for (let i = 0; i < 18; i++) {
  const peakH = 30 + Math.random() * 45;
  const baseW = 50 + Math.random() * 40;
  const shape = new THREE.Shape();
  shape.moveTo(-baseW / 2, 0);
  shape.lineTo(0, peakH);
  shape.lineTo(baseW / 2, 0);
  const geo = new THREE.ShapeGeometry(shape);
  const mat = new THREE.MeshBasicMaterial({ color: 0x0d2a0d });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(i * 55 - 30, GROUND_Y, -30);
  mesh.userData.speed = 0.55;
  hillsGroup.add(mesh);
}

// Speed lines (horizontal streaks that rush past)
const speedLines = [];
for (let i = 0; i < 20; i++) {
  const geo = new THREE.PlaneGeometry(30 + Math.random() * 60, 1.5);
  const mat = new THREE.MeshBasicMaterial({ color: 0x00ff88, transparent: true, opacity: 0.15 + Math.random() * 0.15 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(Math.random() * W * 2, GROUND_Y - 20 - Math.random() * (H - GROUND_Y - 60), -2);
  mesh.userData = { speed: 8 + Math.random() * 6, baseX: -100 };
  scene.add(mesh);
  speedLines.push(mesh);
}

// Ground
const groundGeo = new THREE.PlaneGeometry(W + 400, H - GROUND_Y + 20);
const groundMat = new THREE.MeshBasicMaterial({ color: 0x091409 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.position.set(W / 2, GROUND_Y - (H - GROUND_Y) / 2 + 10, 0);
scene.add(ground);

// Ground dashes
const dashPts = [];
for (let x = -100; x < W + 300; x += 30) {
  dashPts.push(new THREE.Vector3(x, GROUND_Y, 3));
  dashPts.push(new THREE.Vector3(x + 14, GROUND_Y + 1, 3));
}
const dashGeo = new THREE.BufferGeometry().setFromPoints(dashPts);
const dashMat = new THREE.LineBasicMaterial({ color: 0x1a3a1a });
scene.add(new THREE.LineSegments(dashGeo, dashMat));

// ═══════════════════════════════════════════════
//  DINOSAUR — 面向右（向障碍物方向跑）
// ═══════════════════════════════════════════════
const dinoGroup = new THREE.Group();
scene.add(dinoGroup);
const DINO_X = W * 0.22;

function buildDino() {
  while (dinoGroup.children.length) dinoGroup.remove(dinoGroup.children[0]);
  const GREEN = 0x00ff88;
  const DK = 0x00cc66;

  // 身体
  const body = new THREE.Mesh(new THREE.BoxGeometry(32, 20, 10), new THREE.MeshBasicMaterial({ color: GREEN }));
  body.position.set(0, 8, 0);
  dinoGroup.add(body);

  // 头部（朝向右侧）
  const head = new THREE.Mesh(new THREE.BoxGeometry(22, 16, 9), new THREE.MeshBasicMaterial({ color: GREEN }));
  head.position.set(22, 20, 0);
  dinoGroup.add(head);

  // 眼睛（头右侧）
  const eye = new THREE.Mesh(new THREE.CircleGeometry(3, 8), new THREE.MeshBasicMaterial({ color: 0x000000 }));
  eye.position.set(32, 24, 4.5);
  dinoGroup.add(eye);

  // 嘴巴
  const mouth = new THREE.Mesh(new THREE.BoxGeometry(8, 3, 2), new THREE.MeshBasicMaterial({ color: DK }));
  mouth.position.set(36, 16, 4);
  dinoGroup.add(mouth);

  // 尾巴（左侧）
  const tail = new THREE.Mesh(new THREE.ConeGeometry(5, 18, 4), new THREE.MeshBasicMaterial({ color: DK }));
  tail.position.set(-26, 10, 0);
  tail.rotation.z = Math.PI / 2;
  dinoGroup.add(tail);

  // 腿 × 2
  const legGeo = new THREE.BoxGeometry(8, 18, 6);
  const leg1 = new THREE.Mesh(legGeo, new THREE.MeshBasicMaterial({ color: DK }));
  leg1.position.set(-6, -9, 2);
  leg1.name = 'leg1';
  dinoGroup.add(leg1);
  const leg2 = new THREE.Mesh(legGeo.clone(), new THREE.MeshBasicMaterial({ color: DK }));
  leg2.position.set(10, -9, 2);
  leg2.name = 'leg2';
  dinoGroup.add(leg2);

  // 手臂
  const arm = new THREE.Mesh(new THREE.BoxGeometry(4, 10, 4), new THREE.MeshBasicMaterial({ color: DK }));
  arm.position.set(4, 2, 3);
  arm.rotation.z = -0.5;
  dinoGroup.add(arm);
}
buildDino();

// ═══════════════════════════════════════════════
//  OBSTACLES
// ═══════════════════════════════════════════════
const obstaclesGroup = new THREE.Group();
scene.add(obstaclesGroup);
const obstacles3D = [];

function createCactus(x, groundY) {
  const group = new THREE.Group();
  const mat = new THREE.MeshBasicMaterial({ color: 0x00aa44 });
  // 主干
  const stem = new THREE.Mesh(new THREE.BoxGeometry(9, 42, 7), mat);
  stem.position.set(0, 21, 0);
  group.add(stem);
  // 左侧臂
  const a1h = new THREE.Mesh(new THREE.BoxGeometry(14, 6, 6), mat);
  a1h.position.set(-9, 30, 0);
  group.add(a1h);
  const a1v = new THREE.Mesh(new THREE.BoxGeometry(6, 14, 6), mat);
  a1v.position.set(-16, 37, 0);
  group.add(a1v);
  // 右侧臂
  const a2h = new THREE.Mesh(new THREE.BoxGeometry(14, 6, 6), mat);
  a2h.position.set(9, 20, 0);
  group.add(a2h);
  const a2v = new THREE.Mesh(new THREE.BoxGeometry(6, 12, 6), mat);
  a2v.position.set(16, 26, 0);
  group.add(a2v);
  // 发光圈
  const ring = new THREE.Mesh(
    new THREE.RingGeometry(24, 26, 20),
    new THREE.MeshBasicMaterial({ color: 0x00ff44, side: THREE.DoubleSide, transparent: true, opacity: 0.18 })
  );
  ring.position.set(0, 20, 0);
  group.add(ring);
  group.position.set(x, groundY, 20);
  group.userData = { type: 'cactus', active: true, speed: 0 };
  return group;
}

function createBird(x, groundY) {
  const group = new THREE.Group();
  const mat = new THREE.MeshBasicMaterial({ color: 0xffca28 });
  // 身体
  const body = new THREE.Mesh(new THREE.CapsuleGeometry(6, 18, 4, 8), mat);
  body.rotation.z = Math.PI / 2;
  group.add(body);
  // 上下翅膀
  const wingGeo = new THREE.BoxGeometry(22, 7, 3);
  const w1 = new THREE.Mesh(wingGeo, mat);
  w1.position.set(-5, 9, 0);
  w1.name = 'wing1';
  group.add(w1);
  const w2 = new THREE.Mesh(wingGeo.clone(), mat);
  w2.position.set(-5, -9, 0);
  w2.name = 'wing2';
  group.add(w2);
  // 尾
  const tail = new THREE.Mesh(new THREE.ConeGeometry(4, 9, 3), mat);
  tail.position.set(-15, 0, 0);
  tail.rotation.z = Math.PI / 2;
  group.add(tail);
  // 红眼
  const eyeMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
  [3, -3].forEach(oy => {
    const eye = new THREE.Mesh(new THREE.CircleGeometry(2.5, 6), eyeMat);
    eye.position.set(9, oy, 3);
    group.add(eye);
  });
  group.position.set(x, groundY - 85, 20);
  group.userData = { type: 'bird', active: true, speed: 0, wingPhase: 0 };
  return group;
}

// ═══════════════════════════════════════════════
//  PARTICLES
// ═══════════════════════════════════════════════
const dustList = [], boomList = [];

function spawnDust(x, y) {
  for (let i = 0; i < 7; i++) {
    const geo = new THREE.CircleGeometry(2 + Math.random() * 3, 5);
    const mat = new THREE.MeshBasicMaterial({ color: 0x4a3010, transparent: true, opacity: 0.85 });
    const m = new THREE.Mesh(geo, mat);
    m.position.set(x + (Math.random() - 0.5) * 12, y, 22);
    m.userData = { vx: -1 - Math.random(), vy: -(Math.random() * 2.5), life: 1, decay: 0.06 + Math.random() * 0.04 };
    scene.add(m);
    dustList.push(m);
  }
}

function spawnBoom(x, y) {
  const cols = [0xff4444, 0xff8800, 0xffff00, 0xff6600];
  for (let i = 0; i < 30; i++) {
    const c = cols[Math.floor(Math.random() * cols.length)];
    const geo = new THREE.CircleGeometry(3 + Math.random() * 6, 6);
    const mat = new THREE.MeshBasicMaterial({ color: c, transparent: true, opacity: 1 });
    const m = new THREE.Mesh(geo, mat);
    m.position.set(x, y, 25);
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 7;
    m.userData = { vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 1, decay: 0.03 + Math.random() * 0.03 };
    scene.add(m);
    boomList.push(m);
  }
}

function updateParticles() {
  for (let i = dustList.length - 1; i >= 0; i--) {
    const p = dustList[i];
    p.position.x += p.userData.vx; p.position.y += p.userData.vy;
    p.userData.life -= p.userData.decay; p.material.opacity = p.userData.life;
    if (p.userData.life <= 0) { scene.remove(p); dustList.splice(i, 1); }
  }
  for (let i = boomList.length - 1; i >= 0; i--) {
    const p = boomList[i];
    p.position.x += p.userData.vx; p.position.y += p.userData.vy;
    p.userData.vy -= 0.2; p.userData.life -= p.userData.decay; p.material.opacity = p.userData.life;
    if (p.userData.life <= 0) { scene.remove(p); boomList.splice(i, 1); }
  }
}

// ═══════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════
let score = 0, high = parseInt(localStorage.getItem('dino_hs') || '0');
let dinoY = GROUND_Y - 35, dinoVY = 0, dinoOnGround = true;
let gameOver = false, frame = 0, speed = 4.5;
const groundY = GROUND_Y;

document.getElementById('h').textContent = high;

function init() {
  while (obstaclesGroup.children.length) obstaclesGroup.remove(obstaclesGroup.children[0]);
  obstacles3D.length = 0;
  dustList.forEach(p => scene.remove(p)); dustList.length = 0;
  boomList.forEach(p => scene.remove(p)); boomList.length = 0;
  score = 0; frame = 0; speed = 4.5; gameOver = false;
  dinoY = groundY - 35; dinoVY = 0; dinoOnGround = true;
  dinoGroup.position.set(DINO_X, dinoY, 10);
  document.getElementById('s').textContent = 0;
  document.getElementById('spd').textContent = '1.0';
  document.getElementById('speed-bar').style.display = 'none';
}

function jump() {
  if (gameOver) { start(); return; }
  if (dinoOnGround) {
    dinoVY = -14; dinoOnGround = false;
    spawnDust(DINO_X + 18, dinoY + 36);
  }
}

document.addEventListener('keydown', e => {
  if (['Space', 'ArrowUp', 'KeyW'].includes(e.code)) { e.preventDefault(); jump(); }
});
renderer.domElement.addEventListener('click', jump);

function spawnObs() {
  const isBird = Math.random() > 0.72;
  const m = isBird ? createBird(W + 35, groundY) : createCactus(W + 35, groundY);
  m.userData.speed = speed;
  obstaclesGroup.add(m);
  obstacles3D.push(m);
}

function checkCollide() {
  const dx = DINO_X - 10, dw = 34, dy = dinoY + 5, dh = 30;
  for (const obs of obstacles3D) {
    if (!obs.userData.active) continue;
    const ox = obs.position.x, oy = obs.position.y;
    const ow = obs.userData.type === 'bird' ? 36 : 22;
    const oh = obs.userData.type === 'bird' ? 20 : 42;
    if (dx < ox + ow / 2 && dx + dw > ox - ow / 2 && dy < oy + oh && dy + dh > oy) return true;
  }
  return false;
}

function update() {
  if (gameOver) return;
  frame++;

  // Score
  if (frame % 5 === 0) {
    score++;
    document.getElementById('s').textContent = score;
    if (score > high) {
      high = score; document.getElementById('h').textContent = high;
      localStorage.setItem('dino_hs', high);
    }
  }

  // Speed ramp
  if (frame % 60 === 0) speed = Math.min(12, speed + 0.15);
  document.getElementById('spd').textContent = (speed / 4.5).toFixed(1);

  // Dino physics
  dinoVY += 0.75;
  dinoY += dinoVY;
  if (dinoY >= groundY - 35) { dinoY = groundY - 35; dinoVY = 0; dinoOnGround = true; }
  dinoGroup.position.y = dinoY;

  // Leg animation
  const leg1 = dinoGroup.getObjectByName('leg1');
  const leg2 = dinoGroup.getObjectByName('leg2');
  if (leg1 && leg2) {
    const t = frame * 0.35;
    leg1.position.y = -9 + Math.abs(Math.sin(t)) * 7;
    leg2.position.y = -9 + Math.abs(Math.sin(t + Math.PI)) * 7;
  }

  // Running dust
  if (dinoOnGround && frame % 7 === 0) spawnDust(DINO_X + Math.random() * 10, groundY);

  // Obstacles
  if (frame % Math.max(35, Math.round(80 - speed * 4)) === 0) spawnObs();
  for (let i = obstacles3D.length - 1; i >= 0; i--) {
    const obs = obstacles3D[i];
    obs.position.x -= speed;
    if (obs.userData.type === 'bird') {
      obs.userData.wingPhase = (obs.userData.wingPhase || 0) + 0.14;
      const w1 = obs.getObjectByName('wing1'), w2 = obs.getObjectByName('wing2');
      if (w1) w1.position.y = 9 + Math.sin(obs.userData.wingPhase) * 9;
      if (w2) w2.position.y = -9 + Math.sin(obs.userData.wingPhase + Math.PI) * 9;
    }
    if (obs.position.x < -80) { obstaclesGroup.remove(obs); obstacles3D.splice(i, 1); }
  }

  // Stars scroll left
  starData.forEach(s => {
    s.position.x -= speed * 0.4;
    if (s.position.x < -W) s.position.x += W * 2 + 200;
    s.material.opacity = 0.2 + 0.5 * Math.abs(Math.sin(frame * s.userData.speed * 0.05 + s.userData.phase));
  });

  // Mountains
  mountainsGroup.children.forEach(m => {
    m.position.x -= speed * 0.25;
    if (m.position.x < -200) m.position.x += 14 * 70 + 400;
  });

  // Hills
  hillsGroup.forEach && hillsGroup.children.forEach(h => {
    h.position.x -= speed * 0.55;
    if (h.position.x < -150) h.position.x += 18 * 55 + 200;
  });

  // Speed lines
  speedLines.forEach(sl => {
    sl.position.x -= speed * sl.userData.speed;
    if (sl.position.x < -150) sl.position.x = W + 100 + Math.random() * 100;
    sl.material.opacity = 0.08 + (speed / 12) * 0.2;
  });

  // Particles
  updateParticles();

  // Collision
  if (checkCollide()) {
    gameOver = true;
    spawnBoom(DINO_X, dinoY + 20);
    setTimeout(() => {
      const ov = document.getElementById('overlay');
      ov.querySelector('h1').textContent = '💥 撞到了！得分：' + score;
      ov.querySelector('p').textContent = '最高分：' + high + ' · 再来一次';
      ov.style.display = 'flex';
    }, 600);
  }
}

function animate() { requestAnimationFrame(animate); update(); renderer.render(scene, camera); }

function start() {
  const ov = document.getElementById('overlay');
  ov.style.display = 'none';
  ov.querySelector('h1').textContent = '🦖 跑酷小恐龙';
  ov.querySelector('p').textContent = '空格 / ↑ / 点击 跳跃\n躲避障碍，挑战最高分';
  document.getElementById('speed-bar').style.display = 'block';
  init();
  animate();
}

// Init scene first (show background even before starting)
dinoGroup.position.set(DINO_X, groundY - 35, 10);
animate();

document.getElementById('overlay').style.display = 'flex';
</script></body></html>
