<!DOCTYPE html>
<html lang="zh"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>🦖 跑酷小恐龙</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;overflow:hidden;display:flex;justify-content:center;align-items:center;height:100vh}
canvas{display:block;border-radius:8px}
#hud{position:fixed;top:16px;left:50%;transform:translateX(-50%);display:flex;gap:24px;z-index:10}
.stat{background:rgba(0,0,0,.7);border:1px solid rgba(0,200,100,.2);padding:8px 20px;border-radius:8px;text-align:center}
.stat .v{font-size:22px;font-weight:900;color:#00ff88;text-shadow:0 0 10px rgba(0,255,136,.6)}
.stat .l{font-size:10px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:2px}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;backdrop-filter:blur(4px)}
#overlay h1{font-size:42px;color:#00ff88;text-shadow:0 0 20px rgba(0,255,136,.6);margin-bottom:8px}
#overlay p{color:rgba(255,255,255,.4);margin-bottom:24px}
#start-btn{background:#00ff88;color:#000;padding:14px 48px;border:none;border-radius:12px;font-size:18px;font-weight:900;cursor:pointer;font-family:monospace;box-shadow:0 0 30px rgba(0,255,136,.4)}
#start-btn:hover{transform:scale(1.05)}
</style></head><body>
<div id="hud">
  <div class="stat"><div class="v" id="s">0</div><div class="l">分数</div></div>
  <div class="stat"><div class="v" id="h">0</div><div class="l">最高</div></div>
</div>
<div id="overlay">
  <h1>🦖 跑酷小恐龙</h1>
  <p>空格/上/W 跳跃 · 躲避障碍坚持越久</p>
  <button id="start-btn" onclick="start()">▶ 开始</button>
</div>

<script src="../assets/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════
//  THREE.JS SETUP
// ═══════════════════════════════════════════════════════════
const W = Math.min(700, window.innerWidth - 20);
const H = Math.min(420, window.innerHeight - 80);

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.1;
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a3a);

const camera = new THREE.OrthographicCamera(0, W, H, 0, 0.1, 2000);
camera.position.z = 500;

const GROUND_Y = H - 60;

// Shared materials
const dinoMat = new THREE.MeshBasicMaterial({ color: 0x00ff88 });
const cactusMat = new THREE.MeshBasicMaterial({ color: 0x00aa44 });
const birdMat = new THREE.MeshBasicMaterial({ color: 0xffca28 });
const cloudMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.08 });
const mountainMat = new THREE.MeshBasicMaterial({ color: 0x142814 });
const hillMat = new THREE.MeshBasicMaterial({ color: 0x1a3a1a });
const starMat = new THREE.MeshBasicMaterial({ color: 0xffffff });

// ═══════════════════════════════════════════════════════════
//  PARALLAX BACKGROUND LAYERS (Three.js meshes)
// ═══════════════════════════════════════════════════════════

// Layer 1: Stars
const starsGroup = new THREE.Group();
for (let i = 0; i < 60; i++) {
  const geo = new THREE.CircleGeometry(1.5, 6);
  const mat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.3 + Math.random() * 0.4 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(Math.random() * W, Math.random() * (GROUND_Y - 40), 0);
  mesh.userData.phase = Math.random() * Math.PI * 2;
  mesh.userData.speed = 0.02 + Math.random() * 0.03;
  mesh.userData.wrapping = true;  // 向左滚动
  starsGroup.add(mesh);
}
scene.add(starsGroup);

// Layer 2: Far mountains
const mountainsGroup = new THREE.Group();
for (let i = 0; i < 12; i++) {
  const peakH = 60 + Math.random() * 80;
  const baseW = 80 + Math.random() * 60;
  const shape = new THREE.Shape();
  shape.moveTo(-baseW / 2, 0);
  shape.lineTo(0, peakH);
  shape.lineTo(baseW / 2, 0);
  shape.lineTo(-baseW / 2, 0);
  const geo = new THREE.ShapeGeometry(shape);
  const mat = new THREE.MeshBasicMaterial({ color: 0x0a1a0a, transparent: true, opacity: 0.5 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(i * 65 + Math.random() * 20, GROUND_Y, -50);
  mountainsGroup.add(mesh);
}
scene.add(mountainsGroup);

// Layer 3: Mid hills
const hillsGroup = new THREE.Group();
for (let i = 0; i < 16; i++) {
  const peakH = 30 + Math.random() * 40;
  const baseW = 60 + Math.random() * 40;
  const shape = new THREE.Shape();
  shape.moveTo(-baseW / 2, 0);
  shape.lineTo(0, peakH);
  shape.lineTo(baseW / 2, 0);
  shape.lineTo(-baseW / 2, 0);
  const geo = new THREE.ShapeGeometry(shape);
  const mat = new THREE.MeshBasicMaterial({ color: 0x1a3a1a, transparent: true, opacity: 0.7 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(i * 48 + Math.random() * 15, GROUND_Y, -30);
  hillsGroup.add(mesh);
}
scene.add(hillsGroup);

// Clouds
const cloudsGroup = new THREE.Group();
const cloudMeshes = [];
for (let i = 0; i < 5; i++) {
  const group = new THREE.Group();
  for (let j = 0; j < 4; j++) {
    const geo = new THREE.CircleGeometry(25 + Math.random() * 15, 8);
    const mat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.06 + Math.random() * 0.04 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set((j - 1.5) * 22, (j % 2) * 8, 0);
    group.add(mesh);
  }
  group.position.set(Math.random() * W, 30 + Math.random() * 60, -10);
  group.userData.speed = 0.15 + Math.random() * 0.2;
  cloudsGroup.add(group);
  cloudMeshes.push(group);
}
scene.add(cloudsGroup);

// Near scenery (trees/rocks)
const sceneryGroup = new THREE.Group();
scene.add(sceneryGroup);
function addScenery(x) {
  const isTree = Math.random() > 0.4;
  const mesh = new THREE.Group();
  if (isTree) {
    // Trunk
    const trunk = new THREE.Mesh(
      new THREE.BoxGeometry(4, 20, 4),
      new THREE.MeshBasicMaterial({ color: 0x5a3a1a })
    );
    trunk.position.set(0, 10, 0);
    mesh.add(trunk);
    // Foliage
    const foliage = new THREE.Mesh(
      new THREE.ConeGeometry(12, 28, 6),
      new THREE.MeshBasicMaterial({ color: Math.random() > 0.5 ? 0x228B22 : 0x2d6a2d })
    );
    foliage.position.set(0, 34, 0);
    mesh.add(foliage);
    const foliage2 = new THREE.Mesh(
      new THREE.ConeGeometry(9, 20, 6),
      new THREE.MeshBasicMaterial({ color: 0x1a5a1a })
    );
    foliage2.position.set(0, 46, 0);
    mesh.add(foliage2);
  } else {
    // Rock
    const rock = new THREE.Mesh(
      new THREE.DodecahedronGeometry(10, 0),
      new THREE.MeshBasicMaterial({ color: 0x666655 })
    );
    rock.position.set(0, 6, 0);
    mesh.add(rock);
  }
  mesh.position.set(x, GROUND_Y, -5);
  mesh.userData.speed = 0.6 + Math.random() * 0.4;
  sceneryGroup.add(mesh);
  return mesh;
}
// Pre-populate scenery
for (let i = 0; i < 20; i++) {
  addScenery(i * 40 + Math.random() * 30);
}

// Ground
const groundGeo = new THREE.PlaneGeometry(W + 200, H - GROUND_Y);
const groundMat = new THREE.MeshBasicMaterial({ color: 0x0a1a0a });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.position.set(W / 2, GROUND_Y + (H - GROUND_Y) / 2, 5);
scene.add(ground);

// Ground line
const linePoints = [];
for (let x = 0; x < W; x += 20) {
  linePoints.push(new THREE.Vector3(x, GROUND_Y, 6));
  linePoints.push(new THREE.Vector3(x + 10, GROUND_Y + 2, 6));
}
const lineGeo = new THREE.BufferGeometry().setFromPoints(linePoints);
const lineMat = new THREE.LineBasicMaterial({ color: 0x1a3a1a });
scene.add(new THREE.LineSegments(lineGeo, lineMat));

// ═══════════════════════════════════════════════════════════
//  DINOSAUR MESH (Three.js)
// ═══════════════════════════════════════════════════════════
const dinoGroup = new THREE.Group();
scene.add(dinoGroup);

function buildDino() {
  while (dinoGroup.children.length) dinoGroup.remove(dinoGroup.children[0]);
  // Body
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(30, 22, 10),
    new THREE.MeshBasicMaterial({ color: 0x00ff88 })
  );
  body.position.set(0, 5, 0);
  dinoGroup.add(body);
  // Head
  const head = new THREE.Mesh(
    new THREE.BoxGeometry(20, 16, 8),
    new THREE.MeshBasicMaterial({ color: 0x00ff88 })
  );
  head.position.set(20, 18, 0);
  dinoGroup.add(head);
  // Eye
  const eye = new THREE.Mesh(
    new THREE.CircleGeometry(3, 8),
    new THREE.MeshBasicMaterial({ color: 0x000000 })
  );
  eye.position.set(28, 22, 4);
  dinoGroup.add(eye);
  // Tail
  const tail = new THREE.Mesh(
    new THREE.ConeGeometry(5, 16, 4),
    new THREE.MeshBasicMaterial({ color: 0x00cc66 })
  );
  tail.position.set(-22, 8, 0);
  tail.rotation.z = Math.PI / 2;
  dinoGroup.add(tail);
  // Legs
  const legGeo = new THREE.BoxGeometry(8, 18, 6);
  const legMat = new THREE.MeshBasicMaterial({ color: 0x00cc66 });
  const leg1 = new THREE.Mesh(legGeo, legMat);
  leg1.position.set(-5, -11, 2);
  leg1.name = 'leg1';
  dinoGroup.add(leg1);
  const leg2 = new THREE.Mesh(legGeo, legMat.clone());
  leg2.position.set(10, -11, 2);
  leg2.name = 'leg2';
  dinoGroup.add(leg2);
  // Arm
  const arm = new THREE.Mesh(
    new THREE.BoxGeometry(4, 10, 4),
    new THREE.MeshBasicMaterial({ color: 0x00cc66 })
  );
  arm.position.set(5, 0, 3);
  arm.rotation.z = -0.5;
  dinoGroup.add(arm);
}

buildDino();
dinoGroup.position.set(80, GROUND_Y - 40, 10);

// ═══════════════════════════════════════════════════════════
//  OBSTACLES (Three.js meshes)
// ═══════════════════════════════════════════════════════════
const obstaclesGroup = new THREE.Group();
scene.add(obstaclesGroup);
const obstacles3D = [];

function createCactus(x, y) {
  const group = new THREE.Group();
  const mat = new THREE.MeshBasicMaterial({ color: 0x00aa44 });
  // Main stem
  const stem = new THREE.Mesh(new THREE.BoxGeometry(8, 40, 6), mat);
  stem.position.set(0, 20, 0);
  group.add(stem);
  // Arms
  const arm1 = new THREE.Mesh(new THREE.BoxGeometry(12, 6, 5), mat);
  arm1.position.set(-8, 28, 0);
  group.add(arm1);
  const arm1v = new THREE.Mesh(new THREE.BoxGeometry(6, 12, 5), mat);
  arm1v.position.set(-14, 34, 0);
  group.add(arm1v);
  const arm2 = new THREE.Mesh(new THREE.BoxGeometry(12, 6, 5), mat);
  arm2.position.set(8, 18, 0);
  group.add(arm2);
  const arm2v = new THREE.Mesh(new THREE.BoxGeometry(6, 10, 5), mat);
  arm2v.position.set(14, 24, 0);
  group.add(arm2v);
  // Glow ring
  const ring = new THREE.Mesh(
    new THREE.RingGeometry(25, 27, 16),
    new THREE.MeshBasicMaterial({ color: 0x00ff44, transparent: true, opacity: 0.2, side: THREE.DoubleSide })
  );
  ring.position.set(0, 20, 0);
  group.add(ring);
  group.position.set(x, y, 15);
  group.userData = { type: 'cactus', active: true };
  return group;
}

function createBird(x, y, frame) {
  const group = new THREE.Group();
  const mat = new THREE.MeshBasicMaterial({ color: 0xffca28 });
  // Body
  const body = new THREE.Mesh(new THREE.CapsuleGeometry(6, 16, 4, 8), mat);
  body.rotation.z = Math.PI / 2;
  group.add(body);
  // Wings
  const wingGeo = new THREE.BoxGeometry(20, 6, 3);
  const wing1 = new THREE.Mesh(wingGeo, mat);
  wing1.position.set(-5, 8, 0);
  wing1.name = 'wing1';
  group.add(wing1);
  const wing2 = new THREE.Mesh(wingGeo.clone(), mat);
  wing2.position.set(-5, -8, 0);
  wing2.name = 'wing2';
  group.add(wing2);
  // Tail
  const tail = new THREE.Mesh(new THREE.ConeGeometry(4, 8, 3), mat);
  tail.position.set(-14, 0, 0);
  tail.rotation.z = Math.PI / 2;
  group.add(tail);
  // Eye
  const eyeMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
  const eye1 = new THREE.Mesh(new THREE.CircleGeometry(2, 6), eyeMat);
  eye1.position.set(8, 3, 3);
  group.add(eye1);
  const eye2 = new THREE.Mesh(new THREE.CircleGeometry(2, 6), eyeMat);
  eye2.position.set(8, -3, 3);
  group.add(eye2);
  group.position.set(x, y, 15);
  group.userData = { type: 'bird', active: true };
  return group;
}

// ═══════════════════════════════════════════════════════════
//  PARTICLE SYSTEM (Three.js)
// ═══════════════════════════════════════════════════════════
const particleGroups = {
  dust: [],
  explosion: [],
};

function spawnDust(x, y) {
  for (let i = 0; i < 6; i++) {
    const geo = new THREE.CircleGeometry(2 + Math.random() * 3, 5);
    const mat = new THREE.MeshBasicMaterial({ color: 0x8B6914, transparent: true, opacity: 0.8 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x + (Math.random() - 0.5) * 10, y, 20);
    mesh.userData = {
      vx: (Math.random() - 0.5) * 2, vy: -Math.random() * 2,
      life: 1.0, decay: 0.05
    };
    scene.add(mesh);
    particleGroups.dust.push(mesh);
  }
}

function spawnExplosion(x, y) {
  const colors = [0xff4444, 0xff8800, 0xffff00, 0xff6600];
  for (let i = 0; i < 25; i++) {
    const color = colors[Math.floor(Math.random() * colors.length)];
    const geo = new THREE.CircleGeometry(3 + Math.random() * 5, 6);
    const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, y, 25);
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 6;
    mesh.userData = {
      vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
      life: 1.0, decay: 0.025 + Math.random() * 0.025
    };
    scene.add(mesh);
    particleGroups.explosion.push(mesh);
  }
}

function spawnMeteor(x, y) {
  for (let i = 0; i < 8; i++) {
    const geo = new THREE.CircleGeometry(2 + Math.random() * 3, 5);
    const mat = new THREE.MeshBasicMaterial({ color: 0xffcc44, transparent: true, opacity: 0.9 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x + (Math.random() - 0.5) * 15, y, 20);
    mesh.userData = {
      vx: (Math.random() - 0.5) * 3, vy: -Math.random() * 3 - 1,
      life: 1.0, decay: 0.03
    };
    scene.add(mesh);
    particleGroups.explosion.push(mesh);
  }
}

function updateParticles() {
  const all = [...particleGroups.dust, ...particleGroups.explosion];
  for (let i = all.length - 1; i >= 0; i--) {
    const p = all[i];
    p.position.x += p.userData.vx;
    p.position.y += p.userData.vy;
    p.userData.vy -= 0.15;
    p.userData.life -= p.userData.decay;
    p.material.opacity = p.userData.life;
    if (p.userData.life <= 0) {
      scene.remove(p);
      all.splice(i, 1);
    }
  }
  particleGroups.dust = all.filter(p => p.userData.decay > 0.04);
  particleGroups.explosion = all.filter(p => p.userData.decay <= 0.04);
}

// ═══════════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════════
let player, obstacles, score, high, gameOver, frame, speed, gameState;
let speedLines = [];
let dinoY, dinoVY, dinoOnGround;
high = parseInt(localStorage.getItem('dino_hs') || '0');
document.getElementById('h').textContent = high;
let dinoLeg1, dinoLeg2;

function init() {
  // Clear obstacles
  while (obstaclesGroup.children.length) obstaclesGroup.remove(obstaclesGroup.children[0]);
  obstacles3D.length = 0;
  // Clear particles
  [...particleGroups.dust, ...particleGroups.explosion].forEach(p => scene.remove(p));
  particleGroups.dust.length = 0;
  particleGroups.explosion.length = 0;

  score = 0; frame = 0; speed = 4; gameOver = false;
  dinoY = GROUND_Y - 40; dinoVY = 0; dinoOnGround = true;
  dinoGroup.position.set(80, dinoY, 10);
  document.getElementById('s').textContent = 0;
}

function spawnObs() {
  const type = Math.random() > 0.7 ? 'bird' : 'cactus';
  const y = type === 'bird' ? GROUND_Y - 90 : GROUND_Y - 20;
  let mesh;
  if (type === 'cactus') {
    mesh = createCactus(W + 30, y);
  } else {
    mesh = createBird(W + 30, y, frame);
    mesh.userData.wingPhase = Math.random() * Math.PI * 2;
  }
  mesh.userData.speed = speed;
  obstaclesGroup.add(mesh);
  obstacles3D.push(mesh);
}

function checkCollide() {
  const dx = 80, dw = 28, dy = dinoY + 10, dh = 30;
  for (const obs of obstacles3D) {
    if (!obs.userData.active) continue;
    const ox = obs.position.x;
    const ow = obs.userData.type === 'cactus' ? 20 : 40;
    const oy = obs.position.y;
    const oh = obs.userData.type === 'cactus' ? 40 : 30;
    if (dx < ox + ow / 2 && dx + dw > ox - ow / 2 && dy < oy + oh && dy + dh > oy) {
      return true;
    }
  }
  return false;
}

function jump() {
  if (gameOver) { start(); return; }
  if (dinoOnGround) {
    dinoVY = -14; dinoOnGround = false;
    spawnDust(80 + 15, dinoY + 40);
  }
}

document.addEventListener('keydown', e => {
  if (['Space', 'ArrowUp', 'KeyW'].includes(e.code)) { e.preventDefault(); jump(); }
});
renderer.domElement.addEventListener('click', jump);

function update() {
  if (gameOver) return;
  frame++;

  // Score
  if (frame % 5 === 0) {
    score++;
    document.getElementById('s').textContent = score;
    if (score > high) {
      high = score; document.getElementById('h').textContent = high;
      localStorage.setItem('dino_hs', high);
    }
  }

  // Speed ramp
  if (frame % Math.max(50, 120 - speed * 5) === 0) {
    if (Math.random() > 0.5) spawnObs();
  }
  if (frame % Math.max(20, 60 - speed * 3) === 0) speed = Math.min(12, speed + 0.08);

  // Dinosaur physics
  dinoVY += 0.7;
  dinoY += dinoVY;
  if (dinoY >= GROUND_Y - 40) {
    dinoY = GROUND_Y - 40; dinoVY = 0; dinoOnGround = true;
  }
  dinoGroup.position.y = dinoY;

  // Animate legs
  const leg1 = dinoGroup.getObjectByName('leg1');
  const leg2 = dinoGroup.getObjectByName('leg2');
  if (leg1 && leg2 && dinoOnGround) {
    const t = frame * 0.3;
    leg1.position.y = -11 + Math.abs(Math.sin(t)) * 6;
    leg2.position.y = -11 + Math.abs(Math.sin(t + Math.PI)) * 6;
  }

  // Running dust
  if (dinoOnGround && frame % 8 === 0) spawnDust(80 + Math.random() * 10, GROUND_Y);

  // Update obstacles
  for (let i = obstacles3D.length - 1; i >= 0; i--) {
    const obs = obstacles3D[i];
    obs.position.x -= speed;
    if (obs.userData.type === 'bird') {
      obs.userData.wingPhase = (obs.userData.wingPhase || 0) + 0.12;
      const wing1 = obs.getObjectByName('wing1');
      const wing2 = obs.getObjectByName('wing2');
      if (wing1) wing1.position.y = 8 + Math.sin(obs.userData.wingPhase) * 8;
      if (wing2) wing2.position.y = -8 + Math.sin(obs.userData.wingPhase + Math.PI) * 8;
    }
    if (obs.position.x < -80) {
      obstaclesGroup.remove(obs);
      obstacles3D.splice(i, 1);
    }
  }

  // Update parallax layers
  starsGroup.children.forEach(s => {
    s.material.opacity = 0.3 + 0.4 * Math.sin(frame * s.userData.speed + s.userData.phase);
  });
  mountainsGroup.children.forEach(m => {
    m.position.x -= speed * 0.15;
    if (m.position.x < -100) m.position.x += 12 * 65 + 200;
  });
  hillsGroup.children.forEach(h => {
    h.position.x -= speed * 0.3;
    if (h.position.x < -100) h.position.x += 16 * 48 + 100;
  });
  cloudMeshes.forEach(c => {
    c.position.x -= c.userData.speed;
    if (c.position.x < -80) c.position.x = W + 80;
  });
  // Scenery
  sceneryGroup.children.forEach(s => {
    s.position.x -= s.userData.speed;
    if (s.position.x < -40) {
      s.position.x = W + 40 + Math.random() * 20;
    }
  });

    // Stars scroll left
  starsGroup.children.forEach(s => {
    if (s.userData.wrapping) {
      s.position.x -= speed * 0.05;
      if (s.position.x < -5) s.position.x = W + 5;
    }
  });
  // Speed lines (motion blur effect)
  if (gameState !== 'idle' && frame % 3 === 0) {
    const sl = new THREE.Mesh(
      new THREE.PlaneGeometry(2, 2),
      new THREE.MeshBasicMaterial({ color: 0x88ffbb, transparent: true, opacity: 0.15 })
    );
    sl.position.set(W * Math.random(), Math.random() * (GROUND_Y - 20) + 20, 2);
    sl.userData.slLife = 0.15;
    scene.add(sl);
    speedLines.push(sl);
  }
  for (let si = speedLines.length - 1; si >= 0; si--) {
    const sl = speedLines[si];
    sl.userData.slLife -= 0.016;
    sl.position.x -= speed * 3;
    sl.material.opacity = Math.max(0, sl.userData.slLife / 0.15 * 0.15);
    if (sl.userData.slLife <= 0 || sl.position.x < -10) {
      scene.remove(sl);
      speedLines.splice(si, 1);
    }
  }
  // Particles
  updateParticles();

  // Collision
  if (checkCollide()) {
    gameOver = true;
    spawnExplosion(80 + 15, dinoY + 20);
    spawnMeteor(80 + 15, dinoY + 20);
    setTimeout(() => {
      document.getElementById('overlay').querySelector('h1').textContent = '💥 撞到了！';
      document.getElementById('overlay').style.display = 'flex';
    }, 500);
  }
}

function start() {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('overlay').querySelector('h1').textContent = '🦖 跑酷小恐龙';
  init();
  animate();
}

function animate() {
  requestAnimationFrame(animate);
  update();
  renderer.render(scene, camera);
}

document.getElementById('overlay').style.display = 'flex';
</script></body></html>
