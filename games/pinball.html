<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>霓虹弹珠台</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; }
canvas { display: block; }
#hud {
  position: fixed; top: 0; left: 0; right: 0;
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 24px; pointer-events: none; z-index: 10;
}
#hud-left { display: flex; flex-direction: column; gap: 6px; }
#hud-center { text-align: center; }
#hud-right { text-align: right; }
.score-label { font-family: 'Courier New', monospace; font-size: 11px; color: rgba(0,255,255,0.5); letter-spacing: 3px; text-transform: uppercase; }
.score-value {
  font-family: 'Courier New', monospace; font-size: 28px; font-weight: bold;
  color: #0ff; text-shadow: 0 0 10px #0ff, 0 0 30px #0ff;
}
#combo-bar-wrap {
  width: 120px; height: 8px; background: rgba(255,255,255,0.1);
  border-radius: 4px; overflow: hidden; margin-top: 4px;
}
#combo-bar {
  height: 100%; width: 0%; background: linear-gradient(90deg, #f0f, #ff0);
  border-radius: 4px; transition: width 0.2s, background 0.3s;
}
#combo-label { font-family: 'Courier New', monospace; font-size: 10px; color: rgba(255,0,255,0.6); letter-spacing: 2px; }
#lives-display { display: flex; gap: 6px; justify-content: flex-end; margin-top: 4px; }
.life-ball {
  width: 14px; height: 14px; border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #fff, #0ff);
  box-shadow: 0 0 6px #0ff, 0 0 12px #0ff;
  transition: opacity 0.3s;
}
.life-ball.dead { background: rgba(255,255,255,0.1); box-shadow: none; }
#overlay {
  position: fixed; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
  z-index: 20; transition: opacity 0.5s;
}
#overlay.hidden { opacity: 0; pointer-events: none; }
#overlay-title {
  font-family: 'Courier New', monospace; font-size: 48px; font-weight: bold;
  color: #0ff; text-shadow: 0 0 20px #0ff, 0 0 60px #0ff, 0 0 100px #08f;
  margin-bottom: 8px; letter-spacing: 8px;
}
#overlay-sub {
  font-family: 'Courier New', monospace; font-size: 14px;
  color: rgba(0,255,255,0.5); margin-bottom: 36px; letter-spacing: 3px;
}
#overlay-controls {
  font-family: 'Courier New', monospace; font-size: 12px;
  color: rgba(255,255,255,0.3); margin-bottom: 30px; text-align: center; line-height: 2;
}
#start-btn {
  padding: 14px 48px; font-family: 'Courier New', monospace; font-size: 18px;
  font-weight: bold; letter-spacing: 4px; color: #000; background: #0ff;
  border: none; cursor: pointer; clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  box-shadow: 0 0 20px #0ff, 0 0 60px #0ff; text-transform: uppercase;
  transition: box-shadow 0.2s, background 0.2s;
}
#start-btn:hover { background: #fff; box-shadow: 0 0 40px #fff, 0 0 80px #0ff; }
#game-over-text { display: none; font-family: 'Courier New', monospace; font-size: 36px; color: #f0f; text-shadow: 0 0 20px #f0f; margin-bottom: 10px; letter-spacing: 6px; }
#final-score-text { display: none; font-family: 'Courier New', monospace; font-size: 20px; color: #ff0; text-shadow: 0 0 10px #ff0; margin-bottom: 30px; }
#flash {
  position: fixed; inset: 0; pointer-events: none; z-index: 15;
  opacity: 0; transition: opacity 0.1s;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="flash"></div>
<div id="hud">
  <div id="hud-left">
    <div class="score-label">SCORE</div>
    <div class="score-value" id="score-display">0</div>
    <div id="combo-label">COMBO</div>
    <div id="combo-bar-wrap"><div id="combo-bar"></div></div>
  </div>
  <div id="hud-center">
    <div class="score-label">HIGH SCORE</div>
    <div class="score-value" id="highscore-display" style="font-size:20px;">0</div>
  </div>
  <div id="hud-right">
    <div class="score-label">LIVES</div>
    <div id="lives-display">
      <div class="life-ball" id="life-0"></div>
      <div class="life-ball" id="life-1"></div>
      <div class="life-ball" id="life-2"></div>
    </div>
    <div style="margin-top:8px;font-family:'Courier New',monospace;font-size:10px;color:rgba(0,255,255,0.3);letter-spacing:1px;">
      MULTI: <span id="multi-display" style="color:#ff0;text-shadow:0 0 6px #ff0;">x1</span>
    </div>
  </div>
</div>
<div id="overlay">
  <div id="overlay-title">霓虹弹珠台</div>
  <div id="overlay-sub">NEON PINBALL</div>
  <div id="game-over-text">GAME OVER</div>
  <div id="final-score-text"></div>
  <div id="overlay-controls">
    Z — 左挡板 &nbsp;|&nbsp; / — 右挡板<br>
    SPACE — 发射弹珠
  </div>
  <button id="start-btn" onclick="start()">▶ 开始</button>
</div>

<script>
// ─── Canvas Setup ───────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); init(); });

// ─── Constants ──────────────────────────────────────────────────
const GRAVITY = 900;
const FRICTION = 0.998;
const BALL_R = 12;
const BUMPER_R = 28;
const FLIPPER_LEN = 100;
const FLIPPER_W = 14;
const FLIPPER_SPEED = 14;
const FLIPPER_RETURN = 8;
const PLUNGER_X_RATIO = 0.88;
const PLUNGER_PULL_MAX = 80;
const RESTITUTION_WALL = 0.75;
const RESTITUTION_BUMPER = 1.1;
const RESTITUTION_FLIPPER = 1.15;
const GATE_SCORE = 250;
const BUMPER_SCORE = 100;
const FLIPPER_SAVE_SCORE = 50;

// ─── Game State ─────────────────────────────────────────────────
let state = 'attract'; // attract | playing | plunger | dead | gameover
let score = 0, highScore = 0, lives = 3, combo = 0, multiplier = 1;
let plungerPull = 0, plungerCharging = false;
let flashTimer = 0, attractTimer = 0;
let particles = [];
let trail = [];

// ─── Attract Demo Ball ──────────────────────────────────────────
let demoBall = { x: 0, y: 0, vx: 0, vy: 0, r: BALL_R };

// ─── Physics Objects ────────────────────────────────────────────
let ball = { x: 0, y: 0, vx: 0, vy: 0, r: BALL_R, active: false };
let flippers = {};
let bumpers = [];
let gates = [];
let walls = []; // { x1,y1,x2,y2 }
let plunger = { x: 0, y: 0, r: 16 };
let drainZone = { x: 0, y: 0, w: 0, h: 0 };

// ─── Input ───────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') {
    e.preventDefault();
    if (state === 'plunger' || state === 'attract') plungerCharging = true;
  }
  if (e.code === 'KeyZ' && flippers.left) flippers.left.pressed = true;
  if (e.code === 'Slash' && flippers.right) flippers.right.pressed = true;
});
window.addEventListener('keyup', e => {
  keys[e.code] = false;
  if (e.code === 'Space') {
    if (state === 'plunger' && plungerCharging) {
      launchBall();
    }
    plungerCharging = false;
    plungerPull = 0;
  }
  if (e.code === 'KeyZ' && flippers.left) flippers.left.pressed = false;
  if (e.code === 'Slash' && flippers.right) flippers.right.pressed = false;
});

// ─── Init ────────────────────────────────────────────────────────
function init() {
  const cx = W / 2, cy = H / 2;
  const tableW = Math.min(W, H * 0.55);
  const leftEdge = cx - tableW / 2;
  const rightEdge = cx + tableW / 2;

  // Flippers
  const flipY = H - 90;
  const flipHingeGap = 70;
  flippers = {
    left: {
      x: cx - flipHingeGap / 2 - FLIPPER_LEN, y: flipY,
      angle: 0.55, targetAngle: 0.55,
      length: FLIPPER_LEN, side: 'left', pressed: false,
      pivotX: cx - flipHingeGap / 2, pivotY: flipY
    },
    right: {
      x: cx + flipHingeGap / 2, y: flipY,
      angle: Math.PI - 0.55, targetAngle: Math.PI - 0.55,
      length: FLIPPER_LEN, side: 'right', pressed: false,
      pivotX: cx + flipHingeGap / 2, pivotY: flipY
    }
  };

  // Bumpers (5 in upper area)
  bumpers = [
    { x: cx,             y: cy - 100, r: BUMPER_R, color: '#ff2244', score: BUMPER_SCORE, pulse: 0, hits: 0 },
    { x: cx - 90,        y: cy - 40,  r: BUMPER_R, color: '#ffdd00', score: BUMPER_SCORE, pulse: 0, hits: 0 },
    { x: cx + 90,        y: cy - 40,  r: BUMPER_R, color: '#00ffcc', score: BUMPER_SCORE, pulse: 0, hits: 0 },
    { x: cx - 55,        y: cy + 20,  r: BUMPER_R, color: '#ff00ff', score: BUMPER_SCORE, pulse: 0, hits: 0 },
    { x: cx + 55,        y: cy + 20,  r: BUMPER_R, color: '#88ff00', score: BUMPER_SCORE, pulse: 0, hits: 0 },
  ];

  // Gates (3 lanes in upper section)
  const gateW = 40, gateH = 8;
  gates = [
    { x: cx - 130, y: cy - 160, w: gateW, h: gateH, lit: false, litTimer: 0, color: '#ff00ff' },
    { x: cx - gateW / 2, y: cy - 170, w: gateW, h: gateH, lit: false, litTimer: 0, color: '#00ffcc' },
    { x: cx + 90, y: cy - 160, w: gateW, h: gateH, lit: false, litTimer: 0, color: '#ffdd00' },
  ];

  // Walls (side rails + angled guide walls)
  walls = [
    // Left outer wall
    { x1: leftEdge, y1: H * 0.08, x2: leftEdge + 30, y2: flipY - 30 },
    // Right outer wall
    { x1: rightEdge, y1: H * 0.08, x2: rightEdge - 30, y2: flipY - 30 },
    // Left angled rail to flipper
    { x1: leftEdge + 30, y1: flipY - 30, x2: cx - flipHingeGap / 2 - 5, y2: flipY + 5 },
    // Right angled rail to flipper
    { x1: rightEdge - 30, y1: flipY - 30, x2: cx + flipHingeGap / 2 + 5, y2: flipY + 5 },
    // Upper bumper area side walls
    { x1: leftEdge, y1: H * 0.08, x2: leftEdge, y2: H * 0.12 },
    { x1: rightEdge, y1: H * 0.08, x2: rightEdge, y2: H * 0.12 },
    // Top wall
    { x1: leftEdge, y1: H * 0.08, x2: rightEdge, y2: H * 0.08 },
    // Inner walls near flipper area
    { x1: leftEdge + 10, y1: flipY - 60, x2: cx - flipHingeGap / 2 - 15, y2: flipY - 10 },
    { x1: rightEdge - 10, y1: flipY - 60, x2: cx + flipHingeGap / 2 + 15, y2: flipY - 10 },
  ];

  // Plunger
  plunger.x = rightEdge - 30;
  plunger.y = H - 40;

  // Drain zone (between flippers below)
  drainZone = { x: cx - flipHingeGap / 2, y: flipY + 20, w: flipHingeGap, h: 60 };

  // Demo ball for attract mode
  demoBall.x = cx;
  demoBall.y = cy - 60;
  demoBall.vx = (Math.random() - 0.5) * 300;
  demoBall.vy = 100;
  demoBall.r = BALL_R;
}

// ─── Attract Mode Demo ──────────────────────────────────────────
function updateAttract(dt) {
  attractTimer += dt;
  demoBall.vy += GRAVITY * 0.5 * dt;
  demoBall.vx *= 0.999;
  demoBall.x += demoBall.vx * dt;
  demoBall.y += demoBall.vy * dt;

  // Bounce off table sides
  const leftEdge = W / 2 - Math.min(W, H * 0.55) / 2;
  const rightEdge = W / 2 + Math.min(W, H * 0.55) / 2;
  if (demoBall.x - demoBall.r < leftEdge) { demoBall.x = leftEdge + demoBall.r; demoBall.vx = Math.abs(demoBall.vx) * 0.7; }
  if (demoBall.x + demoBall.r > rightEdge) { demoBall.x = rightEdge - demoBall.r; demoBall.vx = -Math.abs(demoBall.vx) * 0.7; }
  if (demoBall.y - demoBall.r < H * 0.08) { demoBall.y = H * 0.08 + demoBall.r; demoBall.vy = Math.abs(demoBall.vy) * 0.7; }

  // Demo bumpers
  bumpers.forEach(b => {
    const dx = demoBall.x - b.x, dy = demoBall.y - b.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < b.r + demoBall.r) {
      const nx = dx / dist, ny = dy / dist;
      demoBall.x = b.x + nx * (b.r + demoBall.r + 2);
      demoBall.y = b.y + ny * (b.r + demoBall.r + 2);
      const dot = demoBall.vx * nx + demoBall.vy * ny;
      demoBall.vx -= 2 * dot * nx * RESTITUTION_BUMPER;
      demoBall.vy -= 2 * dot * ny * RESTITUTION_BUMPER;
      b.pulse = 1.0;
    }
  });

  // Demo walls
  walls.forEach(w => {
    const res = lineCircle(w.x1, w.y1, w.x2, w.y2, demoBall.x, demoBall.y, demoBall.r);
    if (res) {
      demoBall.x += res.nx * res.pen;
      demoBall.y += res.ny * res.pen;
      const dot = demoBall.vx * res.nx + demoBall.vy * res.ny;
      demoBall.vx -= 2 * dot * res.nx * RESTITUTION_WALL;
      demoBall.vy -= 2 * dot * res.ny * RESTITUTION_WALL;
    }
  });

  // Demo flippers (auto-animate)
  const t = attractTimer * 2;
  flippers.left.angle = 0.55 - 0.45 * (Math.sin(t) * 0.5 + 0.5);
  flippers.right.angle = Math.PI - 0.55 + 0.45 * (Math.sin(t + 0.3) * 0.5 + 0.5);

  // Demo flipper collision
  ['left', 'right'].forEach(side => {
    const f = flippers[side];
    const res = flipperBall(f, demoBall);
    if (res) {
      demoBall.x += res.nx * res.pen;
      demoBall.y += res.ny * res.pen;
      const dot = demoBall.vx * res.nx + demoBall.vy * res.ny;
      const speed = Math.sqrt(demoBall.vx ** 2 + demoBall.vy ** 2);
      const boost = 1 + 0.5 * Math.abs(Math.cos(f.angle + (side === 'left' ? 0 : Math.PI)));
      demoBall.vx -= 2 * dot * res.nx * boost;
      demoBall.vy -= 2 * dot * res.ny * boost;
    }
  });

  // Respawn if drains
  if (demoBall.y > H + 50) {
    demoBall.x = W / 2;
    demoBall.y = H * 0.3;
    demoBall.vx = (Math.random() - 0.5) * 300;
    demoBall.vy = 80;
  }
}

// ─── Line-Circle Collision ───────────────────────────────────────
function lineCircle(x1, y1, x2, y2, cx, cy, r) {
  const dx = x2 - x1, dy = y2 - y1;
  const fx = x1 - cx, fy = y1 - cy;
  const a = dx * dx + dy * dy;
  if (a === 0) return null;
  const b = 2 * (fx * dx + fy * dy);
  const c = fx * fx + fy * fy - r * r;
  let disc = b * b - 4 * a * c;
  if (disc < 0) return null;
  disc = Math.sqrt(disc);
  const t = (-b - disc) / (2 * a);
  if (t < 0 || t > 1) return null;
  const hitX = x1 + t * dx, hitY = y1 + t * dy;
  const nx = (cx - hitX), ny = (cy - hitY);
  const len = Math.sqrt(nx * nx + ny * ny);
  return len > 0 ? { nx: nx / len, ny: ny / len, pen: r - len + 0.5 } : null;
}

// ─── Flipper-Ball Collision ─────────────────────────────────────
function flipperBall(f, b) {
  const cos = Math.cos(f.angle), sin = Math.sin(f.angle);
  // Transform ball to flipper local space
  const lx = (b.x - f.pivotX) * cos + (b.y - f.pivotY) * sin;
  const ly = -(b.x - f.pivotX) * sin + (b.y - f.pivotY) * cos;
  // Endpoint of flipper in local space
  const ex = -f.length, ey = 0;
  // Closest point on flipper segment
  const t = Math.max(0, Math.min(1, (lx * ex + ly * ey) / (ex * ex + ey * ey)));
  const cx2 = t * ex, cy2 = t * ey;
  const dx = lx - cx2, dy = ly - cy2;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist < FLIPPER_W / 2 + b.r) {
    const pen = FLIPPER_W / 2 + b.r - dist;
    const nx = dx / dist, ny = dy / dist;
    // Transform normal back to world
    const wnx = nx * cos - ny * sin;
    const wny = nx * sin + ny * cos;
    return { nx: wnx, ny: wny, pen: pen };
  }
  return null;
}

// ─── Particle System ────────────────────────────────────────────
function spawnParticles(x, y, color, count, speed) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = speed * (0.5 + Math.random() * 0.5);
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: 1.0,
      decay: 1.5 + Math.random() * 1.5,
      size: 2 + Math.random() * 4,
      color
    });
  }
}

// ─── Update Game ───────────────────────────────────────────────
function update(dt) {
  if (state === 'attract') {
    updateAttract(dt);
    bumpers.forEach(b => { if (b.pulse > 0) b.pulse = Math.max(0, b.pulse - dt * 3); });
    return;
  }

  if (state !== 'playing' && state !== 'plunger') return;

  // Plunger charging
  if (plungerCharging && state === 'plunger') {
    plungerPull = Math.min(PLUNGER_PULL_MAX, plungerPull + 300 * dt);
  }

  // Ball physics
  if (ball.active) {
    ball.vy += GRAVITY * dt;
    ball.vx *= FRICTION;
    ball.vy *= FRICTION;
    ball.x += ball.vx * dt;
    ball.y += ball.vy * dt;

    // Trail
    trail.push({ x: ball.x, y: ball.y, life: 1.0 });
    if (trail.length > 30) trail.shift();
  }

  // Flipper movement
  const flipTargetL = flippers.left.pressed ? 0.15 : 0.55;
  const flipTargetR = flippers.right.pressed ? Math.PI - 0.15 : Math.PI - 0.55;
  const deltaL = flipTargetL - flippers.left.angle;
  const deltaR = flipTargetR - flippers.right.angle;
  flippers.left.angle += deltaL * Math.min(1, FLIPPER_SPEED * dt * 10);
  flippers.right.angle += deltaR * Math.min(1, FLIPPER_SPEED * dt * 10);

  // Ball-wall collisions
  if (ball.active) {
    const tableLeft = W / 2 - Math.min(W, H * 0.55) / 2;
    const tableRight = W / 2 + Math.min(W, H * 0.55) / 2;
    if (ball.x - ball.r < tableLeft) { ball.x = tableLeft + ball.r; ball.vx = Math.abs(ball.vx) * RESTITUTION_WALL; }
    if (ball.x + ball.r > tableRight) { ball.x = tableRight - ball.r; ball.vx = -Math.abs(ball.vx) * RESTITUTION_WALL; }
    if (ball.y - ball.r < H * 0.08) { ball.y = H * 0.08 + ball.r; ball.vy = Math.abs(ball.vy) * RESTITUTION_WALL; }

    // Wall segments
    walls.forEach(w => {
      const res = lineCircle(w.x1, w.y1, w.x2, w.y2, ball.x, ball.y, ball.r);
      if (res) {
        ball.x += res.nx * res.pen;
        ball.y += res.ny * res.pen;
        const dot = ball.vx * res.nx + ball.vy * res.ny;
        ball.vx -= 2 * dot * res.nx * RESTITUTION_WALL;
        ball.vy -= 2 * dot * res.ny * RESTITUTION_WALL;
      }
    });

    // Bumper collisions
    bumpers.forEach(b => {
      const dx = ball.x - b.x, dy = ball.y - b.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < b.r + ball.r) {
        const nx = dx / dist, ny = dy / dist;
        ball.x = b.x + nx * (b.r + ball.r + 2);
        ball.y = b.y + ny * (b.r + ball.r + 2);
        const dot = ball.vx * nx + ball.vy * ny;
        ball.vx -= 2 * dot * nx * RESTITUTION_BUMPER;
        ball.vy -= 2 * dot * ny * RESTITUTION_BUMPER;
        b.pulse = 1.0;
        b.hits++;
        addScore(BUMPER_SCORE, b.color);
        combo++;
        multiplier = Math.min(8, 1 + Math.floor(combo / 3));
        spawnParticles(b.x, b.y, b.color, 12, 250);
        screenFlash(b.color);
      }
    });

    // Gate collisions (pass-through detection)
    gates.forEach(g => {
      if (!g.lit && ball.vy > 0 &&
          ball.x > g.x && ball.x < g.x + g.w &&
          ball.y > g.y - 10 && ball.y < g.y + g.h + 10) {
        g.lit = true;
        g.litTimer = 1.5;
        addScore(GATE_SCORE * multiplier, g.color);
        combo++;
        multiplier = Math.min(8, 1 + Math.floor(combo / 3));
        spawnParticles(g.x + g.w / 2, g.y, g.color, 20, 180);
        screenFlash(g.color);
      }
    });

    // Flipper collisions
    ['left', 'right'].forEach(side => {
      const f = flippers[side];
      const res = flipperBall(f, ball);
      if (res) {
        ball.x += res.nx * res.pen;
        ball.y += res.ny * res.pen;
        const dot = ball.vx * res.nx + ball.vy * res.ny;
        const flipSpeed = Math.abs(f.angle - (side === 'left' ? 0.55 : Math.PI - 0.55)) * 200;
        const boost = 1 + 0.8 * (flipSpeed / 10);
        ball.vx -= 2 * dot * res.nx * RESTITUTION_FLIPPER * boost;
        ball.vy -= 2 * dot * res.ny * RESTITUTION_FLIPPER * boost;
        if (Math.abs(dot) > 50) {
          addScore(FLIPPER_SAVE_SCORE, '#0ff');
          spawnParticles(ball.x, ball.y, '#0ff', 5, 100);
        }
      }
    });

    // Drain check
    if (ball.y > drainZone.y + drainZone.h + ball.r) {
      ball.active = false;
      lives--;
      updateLives();
      combo = 0; multiplier = 1;
      trail = [];
      if (lives <= 0) {
        state = 'gameover';
        showGameOver();
      } else {
        state = 'plunger';
        ball.x = plunger.x;
        ball.y = plunger.y - 30;
        ball.vx = 0; ball.vy = 0;
      }
    }
  }

  // Gate timers
  gates.forEach(g => { if (g.litTimer > 0) g.litTimer -= dt; if (g.litTimer <= 0) g.lit = false; });

  // Bumper pulse decay
  bumpers.forEach(b => { if (b.pulse > 0) b.pulse = Math.max(0, b.pulse - dt * 3); });

  // Particles
  particles.forEach(p => {
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vy += 300 * dt;
    p.life -= p.decay * dt;
  });
  particles = particles.filter(p => p.life > 0);

  // Trail
  trail.forEach(t => t.life -= dt * 2);
  trail = trail.filter(t => t.life > 0);

  // Flash
  if (flashTimer > 0) flashTimer -= dt;
}

// ─── Launch Ball ────────────────────────────────────────────────
function launchBall() {
  const power = 400 + plungerPull * 12;
  ball.vx = -60 + Math.random() * 20;
  ball.vy = -power;
  ball.active = true;
  state = 'playing';
  plungerPull = 0;
  trail = [];
}

// ─── Score & UI ─────────────────────────────────────────────────
function addScore(points, color) {
  score += points * multiplier;
  if (score > highScore) highScore = score;
  document.getElementById('score-display').textContent = score.toLocaleString();
  document.getElementById('highscore-display').textContent = highScore.toLocaleString();
  document.getElementById('multi-display').textContent = 'x' + multiplier;
  document.getElementById('combo-bar').style.width = Math.min(100, combo * 8) + '%';
}

function updateLives() {
  for (let i = 0; i < 3; i++) {
    const el = document.getElementById('life-' + i);
    if (el) el.classList.toggle('dead', i >= lives);
  }
}

function screenFlash(color) {
  const f = document.getElementById('flash');
  f.style.background = color;
  f.style.opacity = '0.15';
  flashTimer = 0.15;
  setTimeout(() => f.style.opacity = '0', 150);
}

// ─── Start / Game Over ──────────────────────────────────────────
function start() {
  score = 0; lives = 3; combo = 0; multiplier = 1;
  ball.x = plunger.x; ball.y = plunger.y - 30;
  ball.vx = 0; ball.vy = 0; ball.active = false;
  trail = []; particles = [];
  state = 'plunger';
  document.getElementById('score-display').textContent = '0';
  document.getElementById('multi-display').textContent = 'x1';
  document.getElementById('combo-bar').style.width = '0%';
  updateLives();
  const ov = document.getElementById('overlay');
  ov.classList.add('hidden');
  document.getElementById('game-over-text').style.display = 'none';
  document.getElementById('final-score-text').style.display = 'none';
  document.getElementById('start-btn').textContent = '▶ 重玩';
  bumpers.forEach(b => { b.hits = 0; b.pulse = 0; });
}

function showGameOver() {
  setTimeout(() => {
    const ov = document.getElementById('overlay');
    document.getElementById('game-over-text').style.display = 'block';
    document.getElementById('final-score-text').style.display = 'block';
    document.getElementById('final-score-text').textContent = '最终得分: ' + score.toLocaleString();
    document.getElementById('start-btn').textContent = '▶ 重玩';
    ov.classList.remove('hidden');
  }, 1200);
}

// ─── Draw Functions ─────────────────────────────────────────────
function draw() {
  // Clear
  ctx.fillStyle = '#04040f';
  ctx.fillRect(0, 0, W, H);

  const cx = W / 2, cy = H / 2;
  const tableW = Math.min(W, H * 0.55);
  const tableLeft = cx - tableW / 2, tableRight = cx + tableW / 2;

  // Table background gradient
  const tGrad = ctx.createLinearGradient(tableLeft, H * 0.08, tableLeft, H);
  tGrad.addColorStop(0, '#0a0a1a');
  tGrad.addColorStop(1, '#080815');
  ctx.fillStyle = tGrad;
  ctx.fillRect(tableLeft, H * 0.08, tableW, H - H * 0.08);

  // Table border glow
  ctx.save();
  ctx.shadowBlur = 15; ctx.shadowColor = '#0ff';
  ctx.strokeStyle = '#0ff'; ctx.lineWidth = 2;
  ctx.strokeRect(tableLeft, H * 0.08, tableW, H - H * 0.08);
  ctx.restore();

  // Grid lines (subtle)
  ctx.save();
  ctx.globalAlpha = 0.04;
  ctx.strokeStyle = '#0ff'; ctx.lineWidth = 1;
  for (let y = H * 0.08; y < H; y += 40) {
    ctx.beginPath(); ctx.moveTo(tableLeft, y); ctx.lineTo(tableRight, y); ctx.stroke();
  }
  for (let x = tableLeft; x < tableRight; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, H * 0.08); ctx.lineTo(x, H); ctx.stroke();
  }
  ctx.restore();

  // ── Walls ──
  ctx.save();
  ctx.shadowBlur = 10; ctx.shadowColor = '#0af';
  ctx.strokeStyle = '#0af'; ctx.lineWidth = 3; ctx.lineCap = 'round';
  walls.forEach(w => {
    ctx.beginPath(); ctx.moveTo(w.x1, w.y1); ctx.lineTo(w.x2, w.y2); ctx.stroke();
  });
  ctx.restore();

  // ── Bumpers ──
  bumpers.forEach(b => {
    const pulseScale = 1 + b.pulse * 0.3;
    const glowIntensity = 20 + b.pulse * 40;

    ctx.save();
    ctx.shadowBlur = glowIntensity; ctx.shadowColor = b.color;

    // Outer ring
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r * pulseScale, 0, Math.PI * 2);
    ctx.strokeStyle = b.color; ctx.lineWidth = 3 + b.pulse * 4;
    ctx.stroke();

    // Inner fill
    const bGrad = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r * pulseScale);
    bGrad.addColorStop(0, b.color + '44');
    bGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = bGrad;
    ctx.fill();

    // Center dot
    ctx.beginPath();
    ctx.arc(b.x, b.y, 6 * pulseScale, 0, Math.PI * 2);
    ctx.fillStyle = b.color;
    ctx.fill();

    // Score label
    ctx.shadowBlur = 0;
    ctx.fillStyle = b.color;
    ctx.font = 'bold 11px Courier New';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(BUMPER_SCORE, b.x, b.y);

    ctx.restore();
  });

  // ── Gates ──
  gates.forEach(g => {
    ctx.save();
    const alpha = g.lit ? 1.0 : 0.3;
    const glow = g.lit ? 20 : 5;
    ctx.shadowBlur = glow; ctx.shadowColor = g.color;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = g.color;
    ctx.fillRect(g.x, g.y, g.w, g.h);
    // Gate posts
    ctx.fillRect(g.x - 3, g.y - 4, 4, g.h + 8);
    ctx.fillRect(g.x + g.w - 1, g.y - 4, 4, g.h + 8);
    // Score label
    ctx.shadowBlur = 0;
    ctx.globalAlpha = alpha * 0.8;
    ctx.fillStyle = '#fff';
    ctx.font = '9px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText(GATE_SCORE, g.x + g.w / 2, g.y - 8);
    ctx.restore();
  });

  // ── Plunger ──
  ctx.save();
  ctx.shadowBlur = 15; ctx.shadowColor = '#ff0';
  ctx.fillStyle = '#ff0';
  // Lane
  ctx.fillRect(plunger.x - 8, plunger.y - 60, 16, 60);
  // Pull indicator
  const pullH = plungerPull / PLUNGER_PULL_MAX;
  if (state === 'plunger') {
    ctx.fillStyle = `rgba(255, ${Math.floor(255 - pullH * 200)}, 0, 0.8)`;
    ctx.fillRect(plunger.x - 8, plunger.y - 60 * pullH, 16, 60 * pullH);
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
    ctx.strokeRect(plunger.x - 8, plunger.y - 60, 16, 60);
    // Power bar
    ctx.fillStyle = '#ff0';
    ctx.font = '10px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('POWER', plunger.x, plunger.y - 68);
  }
  ctx.restore();

  // ── Flippers ──
  ['left', 'right'].forEach(side => {
    const f = flippers[side];
    ctx.save();
    ctx.shadowBlur = 20; ctx.shadowColor = '#0ff';
    ctx.strokeStyle = '#0ff'; ctx.lineWidth = FLIPPER_W;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(f.pivotX, f.pivotY);
    const ex = f.pivotX + Math.cos(f.angle) * f.length * (side === 'left' ? -1 : 1);
    const ey = f.pivotY + Math.sin(f.angle) * f.length * (side === 'left' ? -1 : 1);
    ctx.lineTo(ex, ey);
    ctx.stroke();
    // Hinge
    ctx.beginPath();
    ctx.arc(f.pivotX, f.pivotY, FLIPPER_W / 2 + 2, 0, Math.PI * 2);
    ctx.fillStyle = '#fff'; ctx.fill();
    ctx.restore();
  });

  // ── Drain zone indicator ──
  ctx.save();
  ctx.globalAlpha = 0.08;
  ctx.fillStyle = '#f00';
  ctx.fillRect(drainZone.x, drainZone.y, drainZone.w, drainZone.h);
  ctx.restore();

  // ── Trail ──
  trail.forEach((t, i) => {
    ctx.save();
    ctx.globalAlpha = t.life * 0.5;
    ctx.shadowBlur = 10; ctx.shadowColor = '#ff0';
    ctx.fillStyle = '#ff0';
    ctx.beginPath();
    ctx.arc(t.x, t.y, BALL_R * t.life * 0.7, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });

  // ── Ball ──
  const activeBall = (state === 'attract') ? demoBall : ball;
  if (activeBall.active || state === 'plunger' || state === 'attract') {
    ctx.save();
    ctx.shadowBlur = 30; ctx.shadowColor = '#ffe';
    // Ball gradient
    const bGrad = ctx.createRadialGradient(
      activeBall.x - activeBall.r * 0.3, activeBall.y - activeBall.r * 0.3, 0,
      activeBall.x, activeBall.y, activeBall.r
    );
    bGrad.addColorStop(0, '#ffffff');
    bGrad.addColorStop(0.4, '#fff7aa');
    bGrad.addColorStop(1, '#ffcc00');
    ctx.fillStyle = bGrad;
    ctx.beginPath();
    ctx.arc(activeBall.x, activeBall.y, activeBall.r, 0, Math.PI * 2);
    ctx.fill();
    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.beginPath();
    ctx.arc(activeBall.x - activeBall.r * 0.3, activeBall.y - activeBall.r * 0.3, activeBall.r * 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // ── Particles ──
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.shadowBlur = 8; ctx.shadowColor = p.color;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });

  // ── Attract title overlay ──
  if (state === 'attract') {
    ctx.save();
    ctx.globalAlpha = 0.3 + 0.1 * Math.sin(attractTimer * 3);
    ctx.shadowBlur = 30; ctx.shadowColor = '#0ff';
    ctx.fillStyle = '#0ff';
    ctx.font = 'bold 22px Courier New';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('PRESS START', W / 2, H * 0.55);
    ctx.restore();

    // Attract instructions
    ctx.save();
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = 'rgba(0,255,255,0.5)';
    ctx.font = '12px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('Z — LEFT FLIPPER    / — RIGHT FLIPPER    SPACE — LAUNCH', W / 2, H * 0.55 + 30);
    ctx.restore();
  }

  // ── Plunger hint ──
  if (state === 'plunger') {
    ctx.save();
    ctx.globalAlpha = 0.5 + 0.3 * Math.sin(Date.now() / 300);
    ctx.shadowBlur = 10; ctx.shadowColor = '#ff0';
    ctx.fillStyle = '#ff0';
    ctx.font = '12px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('HOLD SPACE TO CHARGE — RELEASE TO LAUNCH', W / 2, H * 0.55);
    ctx.restore();
  }

  // ── Flash overlay ──
  if (flashTimer > 0) {
    ctx.save();
    ctx.globalAlpha = flashTimer * 0.3;
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }

  // ── Decorative side panels ──
  ctx.save();
  ctx.globalAlpha = 0.1;
  ctx.fillStyle = '#0ff';
  ctx.fillRect(0, 0, tableLeft, H);
  ctx.fillRect(tableRight, 0, W - tableRight, H);
  ctx.restore();
}

// ─── Game Loop ──────────────────────────────────────────────────
let lastTime = 0;
function loop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.033);
  lastTime = ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

// ─── Boot ────────────────────────────────────────────────────────
init();
requestAnimationFrame(ts => { lastTime = ts; requestAnimationFrame(loop); });
</script>
